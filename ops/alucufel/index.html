<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARTAL — ALUCUFEL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<style>
    main { max-width: 620px; padding-top: 28px; }
    .welcome { color: var(--artal-blue); font-size: 15px; margin: 0 0 4px; font-weight: bold; }
</style>
</head>
<body>

<header>
    <div class="header-title">
        <a class="btn-back" href="../index.html" title="Volver al panel general">← Panel</a>
        <img class="logo" src="../../logo.png" alt="ARTAL">
        <h1>ALUCUFEL</h1>
    </div>
    <div class="who">
        <span id="user-name"></span>
        <button id="notif-btn" title="Recibir avisos en este dispositivo">🔔 Notificaciones</button>
        <button id="signout-btn">Cerrar sesión</button>
    </div>
</header>

<main>
    <p class="welcome" id="welcome-msg"></p>
    <div class="grid">
        <a class="card-link" href="cotizaciones.html"><span class="tile-badge" id="badge-cotizaciones"></span><div class="emoji">📐</div><div class="title">Cotizaciones</div><div class="desc">Costear solicitudes pendientes</div></a>
        <a class="card-link" href="fabrica.html"><span class="tile-badge" id="badge-fabrica"></span><div class="emoji">🏭</div><div class="title">Fábrica</div><div class="desc">Pedidos en producción</div></a>
    </div>
</main>

<script type="module">
    import { requireAuth, auth, signOut } from '../auth-common.js';
    import { enableNotifications } from '../notifications.js';
    import { db } from '../firebase-config.js';
    import { collection, query, where, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js';

    const usuario = await requireAuth(['contratista', 'fabrica']);
    document.getElementById('user-name').textContent = usuario.nombre;
    document.getElementById('welcome-msg').textContent = 'Hola, ' + usuario.nombre;
    // El "← Panel" lleva al Panel de Control (solo admin). Este ES el inicio de ALUCUFEL, así que
    // para quien no sea admin se oculta (si no, caería en el panel y vería "Sin autorización").
    if (!usuario.roles.includes('admin')) {
        const back = document.querySelector('.btn-back');
        if (back) back.style.display = 'none';
    }
    document.getElementById('signout-btn').onclick = () => signOut(auth);
    document.getElementById('notif-btn').onclick = () => enableNotifications(document.getElementById('notif-btn'));

    function setBadge(id, count) {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = count > 99 ? '99+' : String(count);
        el.classList.toggle('show', count > 0);
    }

    onSnapshot(query(collection(db, 'orders'), where('status', '==', 'solicitada')), (snap) => {
        setBadge('badge-cotizaciones', snap.size);
    });
    onSnapshot(query(collection(db, 'orders'), where('status', 'in', ['pendiente_fabrica', 'en_fabrica'])), (snap) => {
        setBadge('badge-fabrica', snap.size);
    });
</script>

</body>
</html>
