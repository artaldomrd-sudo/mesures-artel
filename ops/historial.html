<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARTAL — Historial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
    main { max-width: 900px; }
    #search-input, #audit-search, #carpeta-search { width: 100%; padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 10px; font-family: 'Arimo'; font-size: 15px; min-height: 48px; background: #fff; box-sizing: border-box; }
    .carpeta { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px 16px; border-left: 6px solid #8e44ad; }
    .carpeta > h3 { margin: 0 0 2px; color: var(--artal-blue); font-size: 16px; }
    .carpeta .cliente { font-size: 12px; color: #888; }
    .carpeta-doc { border-top: 1px solid #f0f0f0; padding: 9px 0; margin-top: 6px; }
    .carpeta-doc .doc-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .carpeta-doc .doc-tag { font-size: 10px; font-weight: bold; text-transform: uppercase; padding: 2px 8px; border-radius: 12px; color: #fff; }
    .carpeta-doc .doc-tag.cot { background: #3498db; }
    .carpeta-doc .doc-tag.fab { background: #8e44ad; }
    .carpeta-doc .doc-tag.compra { background: #16a085; }
    .carpeta-doc .doc-links { font-size: 12.5px; color: #666; margin-top: 5px; display: flex; gap: 12px; flex-wrap: wrap; }
    .carpeta-doc .doc-links a { color: var(--artal-blue); font-weight: bold; text-decoration: none; }
    .audit-proyecto { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px 16px; border-left: 6px solid var(--artal-blue); }
    .audit-proyecto h3 { margin: 0 0 2px; color: var(--artal-blue); font-size: 16px; }
    .audit-proyecto .cliente { font-size: 12px; color: #888; font-weight: normal; }
    .audit-timeline { list-style: none; margin: 8px 0 0; padding: 0; }
    .audit-timeline li { font-size: 13px; color: #444; padding: 7px 0; border-top: 1px solid #f0f0f0; display: flex; gap: 8px; flex-wrap: wrap; align-items: baseline; }
    .audit-estado { font-weight: bold; }
    .audit-estado.completado { color: #2ecc71; }
    .audit-estado.en_proceso { color: #3498db; }
    .audit-estado.pendiente { color: #e67e22; }
    .audit-meta { color: #888; }
    .cat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
    .cat-tile {
        background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px 14px;
        border: 3px solid transparent; cursor: pointer; text-align: center; font-family: 'Arimo';
        transition: 0.15s; color: var(--artal-blue);
    }
    .cat-tile:hover { transform: translateY(-2px); }
    .cat-tile.active { border-color: var(--artal-yellow); background: var(--artal-blue); color: #fff; }
    .cat-tile .emoji { font-size: 26px; }
    .cat-tile .count { font-size: 26px; font-weight: bold; margin-top: 4px; }
    .cat-tile .label { font-size: 12.5px; font-weight: bold; margin-top: 2px; }
    #alerts-section { display: none; }
    #alerts-section.show { display: flex; flex-direction: column; gap: 10px; }
    .alert-card { background: #fff; border-left: 6px solid #e74c3c; border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px 16px; }
    .alert-card .alert-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
    .alert-card .alert-head b { color: var(--artal-blue); font-size: 15px; }
    .alert-card .alert-tag { font-size: 10.5px; font-weight: bold; text-transform: uppercase; background: #e74c3c; color: #fff; padding: 3px 8px; border-radius: 12px; }
    .alert-card p { font-size: 13px; color: #444; margin: 8px 0; }
    .alert-card button { padding: 8px 14px; border: none; border-radius: 7px; background: var(--artal-blue); color: #fff; font-weight: bold; font-family: 'Arimo'; cursor: pointer; }
    h2.section-title { font-size: 15px; color: #e74c3c; margin: 0; }
    .status-change-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .status-change-row select { flex: 1; min-width: 200px; padding: 9px; border: 1.5px solid #ddd; border-radius: 7px; font-family: 'Arimo'; font-size: 13px; }
    .status-change-row button { padding: 9px 14px; border: none; border-radius: 7px; background: #e67e22; color: #fff; font-weight: bold; font-family: 'Arimo'; cursor: pointer; font-size: 13px; }
    .assign-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
    .assign-row label { font-size: 12px; color: #666; font-weight: bold; }
    .assign-row select { flex: 1; min-width: 160px; padding: 9px; border: 1.5px solid #ddd; border-radius: 7px; font-family: 'Arimo'; font-size: 13px; }
    .assign-row button { padding: 9px 14px; border: none; border-radius: 7px; background: var(--artal-blue); color: #fff; font-weight: bold; font-family: 'Arimo'; cursor: pointer; font-size: 13px; }
</style>
</head>
<body>

<header>
    <div class="header-title">
        <a class="btn-back" href="index.html" title="Volver al panel">← Panel</a>
        <img class="logo" src="../logo.png" alt="ARTAL">
        <h1>Historial</h1>
    </div>
    <div class="who">
        <span id="user-name"></span>
        <button id="signout-btn">Cerrar sesión</button>
    </div>
</header>

<main>
    <div class="tabs">
        <button class="tab-btn active" id="tab-pedidos" onclick="setVista('pedidos')">Pedidos</button>
        <button class="tab-btn" id="tab-carpetas" onclick="setVista('carpetas')">Carpetas por obra</button>
        <button class="tab-btn" id="tab-auditoria" onclick="setVista('auditoria')">Auditoría</button>
    </div>

    <div id="pedidos-view">
        <h2 class="section-title" id="alerts-title" style="display:none;">⚠ Alertas pendientes</h2>
        <div id="alerts-section"></div>
        <input type="text" id="search-input" list="clientes-datalist" placeholder="🔎 Buscar por cliente u obra…" autocomplete="off">
        <datalist id="clientes-datalist"></datalist>
        <div class="cat-grid" id="cat-grid"></div>
        <div id="orders-list"><p class="empty">Cargando…</p></div>
    </div>

    <div id="carpetas-view" style="display:none;">
        <input type="text" id="carpeta-search" placeholder="🔎 Buscar obra o cliente…" autocomplete="off">
        <div id="carpetas-list"><p class="empty">Cargando…</p></div>
    </div>

    <div id="auditoria-view" style="display:none;">
        <input type="text" id="audit-search" placeholder="🔎 Buscar proyecto…" autocomplete="off">
        <div id="audit-list"><p class="empty">Cargando…</p></div>
    </div>
</main>

<script type="module">
    import { requireAuth, auth, signOut } from './auth-common.js';
    import { db } from './firebase-config.js';
    import { collection, doc, deleteDoc, updateDoc, onSnapshot, query, where } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js';
    import { openOrderPreview } from './order-preview.js';
    import { buildClientMap, clientList } from './clients.js';
    window.openOrderPreview = openOrderPreview;

    // Solo admin: es un archivo histórico completo de todos los pedidos, no una pantalla
    // operativa de un rol específico. requireAuth([]) solo deja pasar a quien tenga rol admin.
    const usuario = await requireAuth([]);
    document.getElementById('user-name').textContent = usuario.nombre;
    document.getElementById('signout-btn').onclick = () => signOut(auth);

    const STATUS_LABEL = {
        solicitada: 'Cotización: solicitada al contratista',
        costeada: 'Cotización: costeada, falta enviar',
        enviada_cliente: 'Cotización: enviada al cliente',
        pendiente_fabrica: 'Fabricación: pendiente',
        en_fabrica: 'Fabricación: en proceso',
        parcialmente_listo: 'Parcialmente listo para cargar',
        listo_para_cargar: 'Listo para cargar/instalar',
        completado: 'Completado (entregado e instalado)'
    };

    const STATUS_OPTIONS_BY_TYPE = {
        COTIZACION: ['solicitada', 'costeada', 'enviada_cliente'],
        FABRICACION: ['pendiente_fabrica', 'en_fabrica', 'parcialmente_listo', 'listo_para_cargar', 'completado'],
        COMPRA_DIRECTA: ['listo_para_cargar', 'completado']
    };

    const CATEGORIES = [
        { key: 'todos', emoji: '🗂️', label: 'Todos', statuses: null },
        { key: 'cot_pendiente', emoji: '📐', label: 'Cotización pendiente', statuses: ['solicitada', 'costeada'] },
        { key: 'cot_enviada', emoji: '💵', label: 'Cotización enviada', statuses: ['enviada_cliente'] },
        { key: 'fab_pendiente', emoji: '🏭', label: 'Fabricación pendiente', statuses: ['pendiente_fabrica', 'en_fabrica'] },
        { key: 'fab_parcial', emoji: '🟠', label: 'Parcialmente listo', statuses: ['parcialmente_listo'] },
        { key: 'fab_lista', emoji: '🚚', label: 'Lista para cargar/instalar', statuses: ['listo_para_cargar'] },
        { key: 'fab_completa', emoji: '✅', label: 'Completadas', statuses: ['completado'] }
    ];
    let currentCategory = 'todos';

    function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }

    function itemLabel(o, itemId) {
        const it = (o.items || []).find(x => String(x.id) === String(itemId));
        return it ? `${it.tipo || 'Elemento'} — ${it.ubicacion || 'sin ubicación'}` : 'Ítem ' + itemId;
    }

    function collectAlerts() {
        const alerts = [];
        allOrders.forEach(({ id, data: o }) => {
            const nombre = (esc(o.cliente) || 'Sin cliente') + ' — ' + esc(o.obra);
            if (o.comentarioFabrica && o.comentarioFabricaAtendido !== true) {
                alerts.push({ orderId: id, nombre, tag: 'Fábrica', texto: o.comentarioFabrica, atender: () => atenderFabrica(id) });
            }
            Object.entries(o.itemStatus || {}).forEach(([itemId, s]) => {
                if (s && s.estado === 'problema' && s.atendido !== true) {
                    alerts.push({ orderId: id, nombre, tag: 'Chofer · ' + itemLabel(o, itemId), texto: s.comentario, atender: () => atenderItem(id, 'itemStatus', itemId) });
                }
            });
            Object.entries(o.itemStatusInstalador || {}).forEach(([itemId, s]) => {
                if (s && s.estado === 'problema' && s.atendido !== true) {
                    alerts.push({ orderId: id, nombre, tag: 'Instalador · ' + itemLabel(o, itemId), texto: s.comentario, atender: () => atenderItem(id, 'itemStatusInstalador', itemId) });
                }
            });
        });
        return alerts;
    }

    function renderAlerts() {
        const alerts = collectAlerts();
        const section = document.getElementById('alerts-section');
        const title = document.getElementById('alerts-title');
        if (!alerts.length) {
            section.classList.remove('show');
            title.style.display = 'none';
            section.innerHTML = '';
            return;
        }
        title.style.display = 'block';
        section.classList.add('show');
        section.innerHTML = alerts.map((a, idx) => `
            <div class="alert-card">
                <div class="alert-head">
                    <b>${a.nombre}</b>
                    <span class="alert-tag">${esc(a.tag)}</span>
                </div>
                <p>${esc(a.texto)}</p>
                <button data-idx="${idx}">Marcar atendido</button>
            </div>`).join('');
        section.querySelectorAll('button[data-idx]').forEach(btn => {
            btn.onclick = () => alerts[Number(btn.dataset.idx)].atender();
        });
    }

    window.atenderFabrica = async function (id) {
        await updateDoc(doc(db, 'orders', id), { comentarioFabricaAtendido: true });
    };
    window.atenderItem = async function (id, field, itemId) {
        await updateDoc(doc(db, 'orders', id), { [`${field}.${itemId}.atendido`]: true });
    };

    function renderTiles() {
        const grid = document.getElementById('cat-grid');
        grid.innerHTML = CATEGORIES.map(cat => {
            const count = cat.statuses
                ? allOrders.filter(({ data: o }) => cat.statuses.includes(o.status)).length
                : allOrders.length;
            return `
            <div class="cat-tile ${cat.key === currentCategory ? 'active' : ''}" onclick="setCategory('${cat.key}')">
                <div class="emoji">${cat.emoji}</div>
                <div class="count">${count}</div>
                <div class="label">${esc(cat.label)}</div>
            </div>`;
        }).join('');
    }

    window.setCategory = function (key) {
        currentCategory = key;
        renderTiles();
        render();
    };

    let allOrders = [];
    let choferesCache = [];
    let instaladoresCache = [];

    onSnapshot(query(collection(db, 'usuarios'), where('rol', 'array-contains', 'chofer')), (snap) => {
        choferesCache = snap.docs.map(d => ({ email: d.id, ...d.data() }));
        render();
    });
    onSnapshot(query(collection(db, 'usuarios'), where('rol', 'array-contains', 'instalador')), (snap) => {
        instaladoresCache = snap.docs.map(d => ({ email: d.id, ...d.data() }));
        render();
    });

    function orderDate(o) {
        const f = o.fechaCotizado || o.fechaSolicitada || o.fechaCompra;
        return f && f.toMillis ? f.toMillis() : 0;
    }

    function progresoExtra(o) {
        const bits = [];
        if (o.entregado) bits.push('Entregado ✓');
        if (o.instalado) bits.push('Instalado ✓');
        return bits.length ? ' · ' + bits.join(' · ') : '';
    }

    function orderCardHTML(id, o) {
        const extraLinks = [];
        if (o.contratistaPdfUrl) extraLinks.push(`<a href="${esc(o.contratistaPdfUrl)}" target="_blank">PDF contratista</a>`);
        if (o.cotizacionFinalPdfUrl) extraLinks.push(`<a href="${esc(o.cotizacionFinalPdfUrl)}" target="_blank">PDF final cliente</a>`);
        if (o.compraPdfUrl) extraLinks.push(`<a href="${esc(o.compraPdfUrl)}" target="_blank">Orden de compra</a>`);
        if (o.recepcionInstalador && o.recepcionInstalador.firma) extraLinks.push(`<a href="#" onclick="verFirma('${id}','rec'); return false;">Firma recepción (${esc(o.recepcionInstalador.nombre)})</a>`);
        if (o.clienteAprobacion && o.clienteAprobacion.firma) extraLinks.push(`<a href="#" onclick="verFirma('${id}','cli'); return false;">Firma cliente (${esc(o.clienteAprobacion.nombre)})</a>`);

        const isFab = (o.docType || '').indexOf('FAB') === 0;
        const isCompra = o.docType === 'COMPRA_DIRECTA';
        const statusOptions = isCompra ? STATUS_OPTIONS_BY_TYPE.COMPRA_DIRECTA
            : isFab ? STATUS_OPTIONS_BY_TYPE.FABRICACION : STATUS_OPTIONS_BY_TYPE.COTIZACION;
        const metaLine = isCompra
            ? `Compra directa · Proveedor: ${esc(o.proveedor)} · ${esc(o.totalItems) || 0} artículo(s)${progresoExtra(o)}`
            : `${esc(o.docType)} · ${esc(o.material)} ${esc(o.color)} · ${esc(o.totalItems) || 0} ítems${progresoExtra(o)}`;
        const verLink = isCompra ? '' : `<a href="#" onclick="openOrderPreview('${id}'); return false;">Ver hoja</a>`;

        return `
        <div class="order-card">
            <div class="order-head">
                <b>${esc(o.cliente) || 'Sin cliente'} — ${esc(o.obra)}</b>
                <span class="badge">${esc(STATUS_LABEL[o.status] || o.status)}</span>
            </div>
            <div class="order-meta">
                <span>${metaLine}</span>
                ${verLink}
                ${extraLinks.join(' ')}
                <a href="#" onclick="eliminarPedido('${id}'); return false;" style="color:#e74c3c;">🗑 Eliminar</a>
            </div>
            <div class="status-change-row">
                <select id="status-select-${id}">
                    ${statusOptions.map(s => `<option value="${s}" ${s === o.status ? 'selected' : ''}>${esc(STATUS_LABEL[s])}</option>`).join('')}
                </select>
                <button onclick="cambiarEstado('${id}')">Cambiar estado</button>
            </div>
            ${(isFab || isCompra) ? `
            <div class="assign-row">
                <label>Chofer:</label>
                <select id="asignar-chofer-${id}">
                    <option value="">(sin asignar — cualquiera)</option>
                    ${choferesCache.map(u => `<option value="${esc(u.email)}" ${o.asignadoChoferEmail === u.email ? 'selected' : ''}>${esc(u.nombre)}</option>`).join('')}
                </select>
                <label>Instalador:</label>
                <select id="asignar-instalador-${id}">
                    <option value="">(sin asignar — cualquiera)</option>
                    ${instaladoresCache.map(u => `<option value="${esc(u.email)}" ${o.asignadoInstaladorEmail === u.email ? 'selected' : ''}>${esc(u.nombre)}</option>`).join('')}
                </select>
                <button onclick="guardarAsignacion('${id}')">Guardar asignación</button>
            </div>` : ''}
        </div>`;
    }

    function render() {
        const term = document.getElementById('search-input').value.trim().toLowerCase();
        const cat = CATEGORIES.find(c => c.key === currentCategory);
        const filtered = allOrders.filter(({ data: o }) => {
            if (cat.statuses && !cat.statuses.includes(o.status)) return false;
            if (!term) return true;
            const haystack = ((o.cliente || '') + ' ' + (o.obra || '')).toLowerCase();
            return haystack.includes(term);
        });
        const list = document.getElementById('orders-list');
        if (!filtered.length) { list.innerHTML = '<p class="empty">No se encontraron pedidos.</p>'; return; }
        list.innerHTML = filtered.map(({ id, data }) => orderCardHTML(id, data)).join('');
    }

    document.getElementById('search-input').addEventListener('input', render);

    window.eliminarPedido = async function (id) {
        const o = (allOrders.find(o => o.id === id) || {}).data || {};
        if (!confirm(`¿Eliminar definitivamente "${o.cliente || ''} — ${o.obra || ''}"? Esta acción no se puede deshacer.`)) return;
        try {
            await deleteDoc(doc(db, 'orders', id));
        } catch (e) {
            alert('No se pudo eliminar: ' + e.message);
        }
    };

    // Corrección manual de estado (ej. se marcó "listo para cargar" por error). Al mover un
    // pedido de fabricación a cualquier estado que no sea "completado", se destraban
    // entregado/instalado para que vuelva a aparecer en chofer/instalador si corresponde.
    window.cambiarEstado = async function (id) {
        const nuevoEstado = document.getElementById('status-select-' + id).value;
        const o = (allOrders.find(o => o.id === id) || {}).data || {};
        if (nuevoEstado === o.status) return;
        if (!confirm(`¿Cambiar el estado de "${o.cliente || ''} — ${o.obra || ''}" a "${STATUS_LABEL[nuevoEstado] || nuevoEstado}"?`)) return;
        try {
            const cambios = { status: nuevoEstado };
            if (nuevoEstado !== 'completado' && ('entregado' in o || 'instalado' in o)) {
                cambios.entregado = false;
                cambios.instalado = false;
            }
            await updateDoc(doc(db, 'orders', id), cambios);
        } catch (e) {
            alert('No se pudo cambiar el estado: ' + e.message);
        }
    };

    // Asignar chofer/instalador a un pedido de fabricación. Si se deja "(sin asignar)", el
    // pedido queda visible para cualquier chofer/instalador (bolsa compartida) — asignar solo
    // lo restringe a esa persona (más tú, que siempre ves todo).
    window.guardarAsignacion = async function (id) {
        const choferEmail = document.getElementById('asignar-chofer-' + id).value;
        const instaladorEmail = document.getElementById('asignar-instalador-' + id).value;
        const chofer = choferesCache.find(u => u.email === choferEmail);
        const instalador = instaladoresCache.find(u => u.email === instaladorEmail);
        try {
            await updateDoc(doc(db, 'orders', id), {
                asignadoChoferEmail: choferEmail || null,
                asignadoChoferNombre: chofer ? chofer.nombre : null,
                asignadoInstaladorEmail: instaladorEmail || null,
                asignadoInstaladorNombre: instalador ? instalador.nombre : null
            });
            alert('Asignación guardada.');
        } catch (e) {
            alert('No se pudo guardar la asignación: ' + e.message);
        }
    };

    renderTiles();

    let clientesCache = [];
    function refreshClientesDatalist() {
        document.getElementById('clientes-datalist').innerHTML =
            clientList(buildClientMap(allOrders.map(o => o.data), clientesCache)).map(c => `<option value="${esc(c.nombre)}">`).join('');
    }
    onSnapshot(collection(db, 'clientes'), (snap) => { clientesCache = snap.docs.map(d => d.data()); refreshClientesDatalist(); });

    onSnapshot(collection(db, 'orders'), (snap) => {
        allOrders = snap.docs.map(d => ({ id: d.id, data: d.data() }));
        allOrders.sort((a, b) => orderDate(b.data) - orderDate(a.data));
        refreshClientesDatalist();
        renderTiles();
        renderAlerts();
        render();
        renderCarpetas();
    }, (err) => {
        document.getElementById('orders-list').innerHTML = '<p class="empty">Error cargando historial: ' + err.message + '</p>';
    });

    // ============ Auditoría por proyecto ============
    // Muestra el registro de cambios de estado de las instalaciones (colección append-only
    // movimientosInstalaciones), agrupado por obra/proyecto, con quién y cuándo hizo cada cambio.
    const AUDIT_ESTADO = { pendiente: 'Pendiente', en_proceso: 'En proceso', completado: 'Completado' };
    let auditMovs = [];

    // Ver firma: la firma se guarda como imagen incrustada (data:image...). Los navegadores
    // bloquean abrir un data: en pestaña nueva (por eso salía about:blank), así que la mostramos
    // en un recuadro dentro de la página.
    window.verFirma = function (orderId, tipo) {
        const o = (allOrders.find(x => x.id === orderId) || {}).data || {};
        const info = tipo === 'rec' ? o.recepcionInstalador : o.clienteAprobacion;
        if (!info || !info.firma) { alert('No hay firma guardada.'); return; }
        const titulo = (tipo === 'rec' ? 'Firma de recepción' : 'Firma del cliente') + (info.nombre ? ' — ' + info.nombre : '');
        const ov = document.createElement('div');
        ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
        ov.innerHTML = `<div style="background:#fff;border-radius:12px;max-width:440px;width:100%;padding:16px;text-align:center;font-family:Arimo,sans-serif;">
            <div style="font-weight:bold;color:#0A3D62;margin-bottom:10px;">${esc(titulo)}</div>
            <img src="${info.firma}" alt="firma" style="max-width:100%;border:1px solid #eee;border-radius:8px;background:#fff;">
            <button style="margin-top:12px;padding:10px 18px;border:none;border-radius:8px;background:#0A3D62;color:#fff;font-weight:bold;cursor:pointer;font-family:Arimo;">Cerrar</button>
        </div>`;
        ov.querySelector('button').onclick = () => ov.remove();
        ov.onclick = (e) => { if (e.target === ov) ov.remove(); };
        document.body.appendChild(ov);
    };

    window.setVista = function (v) {
        ['pedidos', 'carpetas', 'auditoria'].forEach(k => {
            document.getElementById('tab-' + k).classList.toggle('active', v === k);
            document.getElementById(k + '-view').style.display = v === k ? 'block' : 'none';
        });
    };

    function fmtFechaHora(ts) {
        return (ts && ts.toDate) ? ts.toDate().toLocaleString('es-DO', { dateStyle: 'medium', timeStyle: 'short' }) : '';
    }

    function renderAudit() {
        const term = document.getElementById('audit-search').value.trim().toLowerCase();
        const list = document.getElementById('audit-list');
        // Agrupa por proyecto (cliente + obra). La clave conserva el texto original para el título.
        const grupos = new Map();
        auditMovs.forEach(m => {
            const obra = (m.obra || '').trim();
            const cliente = (m.cliente || '').trim();
            const titulo = obra || cliente || 'Sin proyecto';
            const key = (cliente + '|||' + obra).toLowerCase();
            if (!grupos.has(key)) grupos.set(key, { titulo, cliente, movs: [] });
            grupos.get(key).movs.push(m);
        });

        let grupos2 = Array.from(grupos.values());
        if (term) grupos2 = grupos2.filter(g => (g.titulo + ' ' + g.cliente).toLowerCase().includes(term));
        // Cada grupo: entradas en orden cronológico; grupos ordenados por actividad más reciente.
        grupos2.forEach(g => g.movs.sort((a, b) => (a.fecha && a.fecha.toMillis ? a.fecha.toMillis() : 0) - (b.fecha && b.fecha.toMillis ? b.fecha.toMillis() : 0)));
        grupos2.sort((a, b) => {
            const la = a.movs[a.movs.length - 1], lb = b.movs[b.movs.length - 1];
            return (lb.fecha && lb.fecha.toMillis ? lb.fecha.toMillis() : 0) - (la.fecha && la.fecha.toMillis ? la.fecha.toMillis() : 0);
        });

        if (!grupos2.length) { list.innerHTML = '<p class="empty">No hay registros de auditoría todavía.</p>'; return; }

        list.innerHTML = grupos2.map(g => `
            <div class="audit-proyecto">
                <h3>${esc(g.titulo)}</h3>
                ${g.cliente && g.cliente.toLowerCase() !== g.titulo.toLowerCase() ? `<div class="cliente">${esc(g.cliente)}</div>` : ''}
                <ul class="audit-timeline">
                    ${g.movs.map(m => `
                        <li>
                            <span class="audit-estado ${esc(m.estado)}">${esc(AUDIT_ESTADO[m.estado] || m.estado)}</span>
                            <span class="audit-meta">· ${esc(m.por) || esc(m.porEmail) || 'alguien'} · ${esc(fmtFechaHora(m.fecha))}</span>
                        </li>`).join('')}
                </ul>
            </div>`).join('');
    }

    document.getElementById('audit-search').addEventListener('input', renderAudit);

    // ============ Carpetas por obra ============
    // Agrupa TODOS los documentos (cotización, fabricación, compra) por cliente+obra, para tener
    // el expediente completo de cada obra en un solo lugar. Así, cuando llega la fabricación de
    // una obra que ya tenía cotización, ambas quedan reunidas en la misma "carpeta".
    function docTag(o) {
        if (o.docType === 'COMPRA_DIRECTA') return { cls: 'compra', label: 'Compra directa' };
        if ((o.docType || '').indexOf('FAB') === 0) return { cls: 'fab', label: 'Fabricación' };
        return { cls: 'cot', label: 'Cotización' };
    }

    function renderCarpetas() {
        const term = document.getElementById('carpeta-search').value.trim().toLowerCase();
        const grupos = new Map();
        allOrders.forEach(({ id, data: o }) => {
            const cliente = (o.cliente || '').trim();
            const obra = (o.obra || '').trim();
            const titulo = obra || cliente || 'Sin obra';
            const key = (cliente + '|||' + obra).toLowerCase();
            if (!grupos.has(key)) grupos.set(key, { titulo, cliente, docs: [] });
            grupos.get(key).docs.push({ id, o });
        });
        let arr = Array.from(grupos.values());
        if (term) arr = arr.filter(g => (g.titulo + ' ' + g.cliente).toLowerCase().includes(term));
        arr.sort((a, b) => Math.max(...b.docs.map(d => orderDate(d.o))) - Math.max(...a.docs.map(d => orderDate(d.o))));

        const list = document.getElementById('carpetas-list');
        if (!arr.length) { list.innerHTML = '<p class="empty">No hay obras registradas.</p>'; return; }
        list.innerHTML = arr.map(g => `
            <div class="carpeta">
                <h3>${esc(g.titulo)}</h3>
                ${g.cliente && g.cliente.toLowerCase() !== g.titulo.toLowerCase() ? `<div class="cliente">${esc(g.cliente)}</div>` : ''}
                ${g.docs.slice().sort((a, b) => orderDate(b.o) - orderDate(a.o)).map(({ id, o }) => {
                    const t = docTag(o);
                    const links = [];
                    if (o.docType !== 'COMPRA_DIRECTA') links.push(`<a href="#" onclick="openOrderPreview('${id}'); return false;">Ver ficha</a>`);
                    if (o.contratistaPdfUrl) links.push(`<a href="${esc(o.contratistaPdfUrl)}" target="_blank">PDF contratista</a>`);
                    if (o.cotizacionFinalPdfUrl) links.push(`<a href="${esc(o.cotizacionFinalPdfUrl)}" target="_blank">PDF final cliente</a>`);
                    if (o.compraPdfUrl) links.push(`<a href="${esc(o.compraPdfUrl)}" target="_blank">Orden de compra</a>`);
                    if (o.recepcionInstalador && o.recepcionInstalador.firma) links.push(`<a href="#" onclick="verFirma('${id}','rec'); return false;">Firma recepción</a>`);
                    if (o.clienteAprobacion && o.clienteAprobacion.firma) links.push(`<a href="#" onclick="verFirma('${id}','cli'); return false;">Firma cliente</a>`);
                    return `
                    <div class="carpeta-doc">
                        <div class="doc-head">
                            <span class="doc-tag ${t.cls}">${t.label}</span>
                            <span style="font-size:12.5px;color:#555;">${esc(STATUS_LABEL[o.status] || o.status)}${progresoExtra(o)}</span>
                        </div>
                        <div class="doc-links">${links.join('')}</div>
                    </div>`;
                }).join('')}
            </div>`).join('');
    }

    document.getElementById('carpeta-search').addEventListener('input', renderCarpetas);

    onSnapshot(collection(db, 'movimientosInstalaciones'), (snap) => {
        auditMovs = snap.docs.map(d => d.data());
        renderAudit();
    }, (err) => {
        document.getElementById('audit-list').innerHTML = '<p class="empty">Error cargando auditoría: ' + err.message + '</p>';
    });
</script>

</body>
</html>
