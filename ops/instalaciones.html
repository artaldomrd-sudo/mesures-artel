<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARTAL — Instalaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
    main { max-width: 720px; }
    .month-nav { display: flex; align-items: center; justify-content: space-between; background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 10px 14px; }
    .month-nav button { background: var(--artal-blue); color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-weight: bold; cursor: pointer; font-family: 'Arimo'; min-height: 40px; }
    .month-nav b { color: var(--artal-blue); font-size: 15px; text-transform: capitalize; }

    .new-job-btn { background: var(--artal-yellow); color: var(--artal-blue); border: none; border-radius: 10px; padding: 14px; font-weight: bold; font-size: 15px; cursor: pointer; font-family: 'Arimo'; min-height: 48px; }

    .sin-agendar { background: #fff8e8; border: 1.5px solid var(--artal-yellow); border-radius: var(--radius); padding: 12px 14px; }
    .sin-agendar h3 { margin: 0 0 8px; font-size: 13px; color: var(--artal-blue); text-transform: uppercase; letter-spacing: 0.5px; }
    .sin-agendar .pedido-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; padding: 8px 0; border-top: 1px solid #f0e6cc; }
    .sin-agendar .pedido-row:first-of-type { border-top: none; }
    .sin-agendar .pedido-row b { color: var(--artal-blue); font-size: 14px; }
    .sin-agendar .pedido-row button { background: var(--artal-blue); color: #fff; border: none; border-radius: 7px; padding: 8px 12px; font-weight: bold; cursor: pointer; font-family: 'Arimo'; font-size: 12.5px; min-height: 38px; }

    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 12px; }
    .grid-weekday { text-align: center; font-size: 11px; font-weight: bold; color: #999; text-transform: uppercase; padding-bottom: 4px; }
    .grid-day { min-height: 44px; padding: 8px 0 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; color: var(--artal-blue); position: relative; transition: 0.1s; }
    .grid-day:hover { background: var(--artal-light); }
    .grid-day.empty { cursor: default; }
    .grid-day.today { border: 2px solid var(--artal-yellow); }
    .grid-day.selected { background: var(--artal-blue); color: #fff; }
    .grid-day .dot { width: 5px; height: 5px; border-radius: 50%; background: #9b59b6; position: absolute; bottom: 6px; }
    .grid-day.selected .dot { background: var(--artal-yellow); }
    .selected-day-bar { display: flex; align-items: center; justify-content: space-between; }
    .selected-day-bar a { color: var(--artal-blue); font-size: 12.5px; font-weight: bold; text-decoration: none; }

    .day-group { display: flex; flex-direction: column; gap: 8px; }
    .day-label { font-size: 12.5px; font-weight: bold; color: var(--artal-blue); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 6px; }
    .job-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px 16px; border-left: 6px solid #9b59b6; }
    .job-card.estado-pendiente { border-left-color: var(--artal-yellow); }
    .job-card.estado-en_proceso { border-left-color: #3498db; }
    .job-card.estado-completado { border-left-color: #2ecc71; }
    .job-head { display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap; align-items: center; }
    .job-head b { color: var(--artal-blue); font-size: 15px; }
    .job-head .hora { font-size: 13px; color: #666; font-weight: bold; }
    .estado-badge { font-size: 10.5px; font-weight: bold; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; letter-spacing: 0.5px; }
    .estado-badge.pendiente { background: var(--artal-yellow); color: var(--artal-blue); }
    .estado-badge.en_proceso { background: #3498db; color: #fff; }
    .estado-badge.completado { background: #2ecc71; color: #fff; }
    .job-meta { font-size: 12.5px; color: #666; margin-top: 6px; }
    .job-meta a { color: var(--artal-blue); font-weight: bold; text-decoration: none; }
    .nav-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .nav-btn { display: inline-flex; align-items: center; gap: 5px; text-decoration: none; border-radius: 8px; padding: 9px 14px; font-weight: bold; font-size: 13px; font-family: 'Arimo'; min-height: 40px; }
    .nav-btn.waze { background: #33ccff; color: #fff; }
    .nav-btn.maps { background: #34a853; color: #fff; }
    .nav-btn.copiar { background: var(--artal-light); color: var(--artal-blue); border: 1.5px solid #ddd; cursor: pointer; }
    .admin-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
    .admin-row select { padding: 8px; border: 1.5px solid #ddd; border-radius: 7px; font-family: 'Arimo'; font-size: 12.5px; min-height: 38px; }
    .admin-row button { padding: 8px 12px; border: none; border-radius: 7px; font-weight: bold; cursor: pointer; font-family: 'Arimo'; font-size: 12.5px; min-height: 38px; }
    .btn-editar { background: var(--artal-blue); color: #fff; }
    .btn-eliminar { background: #e74c3c; color: #fff; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: #fff; border-radius: var(--radius); width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; padding: 20px; }
    .modal-box h2 { color: var(--artal-blue); font-size: 17px; margin: 0 0 14px; }
    .modal-box label { font-size: 12.5px; font-weight: bold; color: var(--artal-blue); display: block; margin: 12px 0 4px; }
    .modal-box .hint { font-size: 11.5px; color: #888; font-weight: normal; margin: 2px 0 0; }
    .modal-box input, .modal-box select, .modal-box textarea { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 8px; font-family: 'Arimo'; font-size: 14px; min-height: 44px; box-sizing: border-box; }
    .modal-box textarea { min-height: 60px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
    .modal-actions button { flex: 1; padding: 12px; border: none; border-radius: 9px; font-weight: bold; cursor: pointer; font-family: 'Arimo'; min-height: 46px; }
    .btn-guardar { background: #2ecc71; color: #fff; }
    .btn-cancelar { background: transparent; color: #888; border: 1.5px solid #ddd !important; }
    .recordar-group { display: flex; flex-direction: column; gap: 6px; }
    .recordar-group label { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: normal; color: #333; margin: 0; cursor: pointer; }
    .recordar-group input { width: auto; min-height: 0; }
</style>
</head>
<body>

<header>
    <div class="header-title">
        <a class="btn-back" id="btn-back" href="index.html" title="Volver">← Volver</a>
        <img class="logo" src="../logo.png" alt="ARTAL">
        <h1>Instalaciones</h1>
    </div>
    <div class="who">
        <span id="user-name"></span>
        <button id="notif-btn" title="Recibir avisos en este dispositivo">🔔 Notificaciones</button>
        <button id="signout-btn">Cerrar sesión</button>
    </div>
</header>

<main>
    <button class="new-job-btn" id="new-job-btn" onclick="abrirNuevo()" style="display:none;">+ Nuevo trabajo de instalación</button>

    <div id="sin-agendar-wrap"></div>

    <div class="month-nav">
        <button onclick="cambiarMes(-1)">‹ Anterior</button>
        <b id="month-label"></b>
        <button onclick="cambiarMes(1)">Siguiente ›</button>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
    <div class="selected-day-bar" id="selected-day-bar" style="display:none;">
        <span id="selected-day-label"></span>
        <a href="#" onclick="limpiarSeleccion(); return false;">Ver todo el mes</a>
    </div>
    <div id="jobs-list"><p class="empty">Cargando…</p></div>
</main>

<div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
        <h2 id="modal-title">Nuevo trabajo de instalación</h2>

        <label>Cliente</label>
        <input type="text" id="job-cliente" list="clientes-datalist" placeholder="Nombre del cliente" autocomplete="off">
        <datalist id="clientes-datalist"></datalist>

        <label>Obra / Ubicación</label>
        <input type="text" id="job-obra" list="obras-datalist" placeholder="Obra o proyecto" autocomplete="off">
        <datalist id="obras-datalist"></datalist>

        <label>Dirección / referencia (opcional)</label>
        <input type="text" id="job-direccion" placeholder="Ej: Residencial Las Palmas, calle 3, casa 12">

        <label>Coordenadas GPS
            <div class="hint">Pega "latitud,longitud" (ej: 19.7934,-70.6884) o un link de Google Maps.</div>
        </label>
        <input type="text" id="job-gps" placeholder="19.7934,-70.6884">

        <label>Fecha y hora</label>
        <input type="datetime-local" id="job-fecha">

        <label>Instalador asignado</label>
        <select id="job-instalador"></select>

        <label>Recordatorios (puedes marcar varios)</label>
        <div id="job-recordar" class="recordar-group">
            <label><input type="checkbox" value="30"> 30 min antes</label>
            <label><input type="checkbox" value="60"> 1 hora antes</label>
            <label><input type="checkbox" value="180"> 3 horas antes</label>
            <label><input type="checkbox" value="720"> 12 horas antes</label>
            <label><input type="checkbox" value="1440"> 1 día antes</label>
        </div>

        <label>Estado</label>
        <select id="job-estado">
            <option value="pendiente">Pendiente</option>
            <option value="en_proceso">En proceso</option>
            <option value="completado">Completado</option>
        </select>

        <label>Notas (opcional)</label>
        <textarea id="job-notas" placeholder="Instrucciones, contacto en obra, etc."></textarea>

        <div class="modal-actions">
            <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
            <button class="btn-guardar" onclick="guardarJob()">Guardar</button>
        </div>
    </div>
</div>

<script type="module">
    import { requireAuth, auth, signOut } from './auth-common.js';
    import { db } from './firebase-config.js';
    import { enableNotifications } from './notifications.js';
    import { openOrderPreview } from './order-preview.js';
    import { buildClientMap, clientList } from './clients.js';
    import {
        collection, query, where, onSnapshot, addDoc, updateDoc, deleteDoc, doc, Timestamp, serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js';
    window.openOrderPreview = openOrderPreview;

    // Gerencia (admin) gestiona; instalador y ayudante entran a ver su agenda + GPS. lector solo ve.
    const usuario = await requireAuth(['instalador', 'ayudante']);
    const esAdmin = usuario.roles.includes('admin');
    // El botón "Volver" lleva a cada quien a SU inicio (el panel es solo de admin): así un
    // ayudante/instalador no cae en el Panel de Control y ve "Sin autorización".
    (function () {
        const home = esAdmin ? 'index.html'
            : usuario.roles.includes('instalador') ? 'instalacion.html'
            : usuario.roles.includes('ayudante') ? 'ayudante.html'
            : 'index.html';
        const b = document.getElementById('btn-back');
        if (b) b.setAttribute('href', home);
    })();
    // Admin gestiona todo; el instalador puede además cambiar el estado (En proceso/Completado)
    // de un trabajo aunque no pueda crear/editar/borrar.
    const puedeCambiarEstado = esAdmin || usuario.roles.includes('instalador');
    document.getElementById('user-name').textContent = usuario.nombre;
    document.getElementById('signout-btn').onclick = () => signOut(auth);
    document.getElementById('notif-btn').onclick = () => enableNotifications(document.getElementById('notif-btn'));
    if (esAdmin) document.getElementById('new-job-btn').style.display = 'block';

    function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }

    const ESTADO_LABEL = { pendiente: 'Pendiente', en_proceso: 'En proceso', completado: 'Completado' };

    // ---------- GPS ----------
    // Acepta "lat,long" (aunque venga dentro de un link) o, si no hay coordenadas, un link http.
    function parseGps(input) {
        if (!input) return null;
        const s = String(input).trim();
        const m = s.match(/(-?\d{1,3}\.\d{3,})\s*,\s*(-?\d{1,3}\.\d{3,})/);
        if (m) return { lat: m[1], lng: m[2] };
        if (/^https?:\/\//i.test(s)) return { url: s };
        return null;
    }
    function wazeUrl(g) { return `https://waze.com/ul?ll=${g.lat},${g.lng}&navigate=yes`; }
    function mapsUrl(g) { return g.url ? g.url : `https://www.google.com/maps/dir/?api=1&destination=${g.lat},${g.lng}`; }

    window.copiarGps = function (texto) {
        const t = decodeURIComponent(texto);
        if (navigator.clipboard) navigator.clipboard.writeText(t).then(
            () => alert('Coordenadas copiadas: ' + t),
            () => prompt('Copia las coordenadas:', t)
        );
        else prompt('Copia las coordenadas:', t);
    };

    // ---------- Datos ----------
    let currentMonth = new Date(); currentMonth.setDate(1);
    let selectedDay = null;
    let allJobs = [];        // {id, ...data}
    let ordersCache = [];    // {id, data}
    let instaladores = [];
    let clientMap = new Map();
    let clientesCache = [], ordersClientesCache = [];

    const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    const DIAS_SEMANA = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const sameDay = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    const jobDate = (j) => (j.fecha && j.fecha.toDate ? j.fecha.toDate() : null);

    function renderGrid() {
        const grid = document.getElementById('calendar-grid');
        const year = currentMonth.getFullYear(), month = currentMonth.getMonth();
        const firstWeekday = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const today = new Date();
        let html = DIAS_SEMANA.map(d => `<div class="grid-weekday">${d}</div>`).join('');
        for (let i = 0; i < firstWeekday; i++) html += `<div class="grid-day empty"></div>`;
        for (let day = 1; day <= daysInMonth; day++) {
            const cellDate = new Date(year, month, day);
            const has = allJobs.some(j => { const f = jobDate(j); return f && sameDay(f, cellDate); });
            const classes = ['grid-day'];
            if (sameDay(cellDate, today)) classes.push('today');
            if (selectedDay && sameDay(cellDate, selectedDay)) classes.push('selected');
            html += `<div class="${classes.join(' ')}" onclick="seleccionarDia(${year},${month},${day})">${day}${has ? '<span class="dot"></span>' : ''}</div>`;
        }
        grid.innerHTML = html;
    }

    window.seleccionarDia = function (y, m, d) { selectedDay = new Date(y, m, d); render(); };
    window.limpiarSeleccion = function () { selectedDay = null; render(); };
    window.cambiarMes = function (delta) {
        currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + delta, 1);
        selectedDay = null; render();
    };

    function jobCardHTML(j) {
        const f = jobDate(j);
        const hora = f ? f.toLocaleTimeString('es-DO', { hour: '2-digit', minute: '2-digit' }) : '';
        const lugar = [j.cliente, j.obra].filter(Boolean).join(' — ');
        const g = parseGps(j.gps);
        let navHtml = '';
        if (g) {
            const botones = [];
            if (g.lat) botones.push(`<a class="nav-btn waze" href="${wazeUrl(g)}" target="_blank" rel="noopener">🚗 Waze</a>`);
            botones.push(`<a class="nav-btn maps" href="${mapsUrl(g)}" target="_blank" rel="noopener">📍 Google Maps</a>`);
            if (g.lat) botones.push(`<button class="nav-btn copiar" onclick="copiarGps('${encodeURIComponent(g.lat + ',' + g.lng)}')">⧉ Copiar</button>`);
            navHtml = `<div class="nav-row">${botones.join('')}</div>`;
        } else if (j.gps) {
            navHtml = `<div class="job-meta" style="color:#c0392b;">GPS no reconocido: ${esc(j.gps)}</div>`;
        }
        const estado = j.estado || 'pendiente';
        return `
        <div class="job-card estado-${estado}">
            <div class="job-head">
                <b>${esc(lugar) || 'Sin cliente'}</b>
                <span class="hora">${hora}</span>
            </div>
            <div class="job-meta">
                <span class="estado-badge ${estado}">${esc(ESTADO_LABEL[estado] || estado)}</span>
                ${j.instaladorNombre ? ' · 🔧 ' + esc(j.instaladorNombre) : ' · 🔧 sin asignar'}
                ${j.direccion ? '<br>📌 ' + esc(j.direccion) : ''}
                ${j.notas ? '<br>' + esc(j.notas) : ''}
                ${j.orderId ? `<br><a href="#" onclick="openOrderPreview('${j.orderId}'); return false;">Ver ficha técnica</a>` : ''}
            </div>
            ${navHtml}
            ${puedeCambiarEstado ? `
            <div class="admin-row">
                <select onchange="cambiarEstado('${j.id}', this.value)">
                    ${Object.keys(ESTADO_LABEL).map(k => `<option value="${k}" ${k === estado ? 'selected' : ''}>${ESTADO_LABEL[k]}</option>`).join('')}
                </select>
                ${esAdmin ? `<button class="btn-editar" onclick="abrirEditar('${j.id}')">✏ Editar</button>
                <button class="btn-eliminar" onclick="eliminarJob('${j.id}')">🗑</button>` : ''}
            </div>` : ''}
        </div>`;
    }

    function renderSinAgendar() {
        const wrap = document.getElementById('sin-agendar-wrap');
        if (!esAdmin) { wrap.innerHTML = ''; return; }
        const agendados = new Set(allJobs.map(j => j.orderId).filter(Boolean));
        const listos = ordersCache.filter(o =>
            ['listo_para_cargar', 'parcialmente_listo'].includes(o.data.status) && !agendados.has(o.id)
        );
        if (!listos.length) { wrap.innerHTML = ''; return; }
        wrap.innerHTML = `
        <div class="sin-agendar">
            <h3>📦 Pedidos listos sin agendar (${listos.length})</h3>
            ${listos.map(o => `
                <div class="pedido-row">
                    <b>${esc(o.data.cliente) || 'Sin cliente'} — ${esc(o.data.obra)}</b>
                    <button onclick="agendarPedido('${o.id}')">📅 Agendar instalación</button>
                </div>`).join('')}
        </div>`;
    }

    function render() {
        document.getElementById('month-label').textContent = MESES[currentMonth.getMonth()] + ' ' + currentMonth.getFullYear();
        renderGrid();
        renderSinAgendar();

        const bar = document.getElementById('selected-day-bar');
        const list = document.getElementById('jobs-list');

        if (selectedDay) {
            bar.style.display = 'flex';
            document.getElementById('selected-day-label').textContent =
                selectedDay.toLocaleDateString('es-DO', { weekday: 'long', day: 'numeric', month: 'long' });
            const delDia = allJobs.filter(j => { const f = jobDate(j); return f && sameDay(f, selectedDay); })
                .sort((a, b) => jobDate(a) - jobDate(b));
            list.innerHTML = delDia.length
                ? `<div class="day-group">${delDia.map(jobCardHTML).join('')}</div>`
                : '<p class="empty">No hay instalaciones ese día.</p>';
            return;
        }

        bar.style.display = 'none';
        const start = new Date(currentMonth);
        const end = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1);
        const delMes = allJobs.filter(j => { const f = jobDate(j); return f && f >= start && f < end; })
            .sort((a, b) => jobDate(a) - jobDate(b));
        if (!delMes.length) { list.innerHTML = '<p class="empty">No hay instalaciones este mes.</p>'; return; }
        const groups = {};
        delMes.forEach(j => {
            const key = jobDate(j).toLocaleDateString('es-DO', { weekday: 'long', day: 'numeric', month: 'long' });
            (groups[key] = groups[key] || []).push(j);
        });
        list.innerHTML = Object.entries(groups).map(([label, jobs]) => `
            <div class="day-group">
                <div class="day-label">${esc(label)}</div>
                ${jobs.map(jobCardHTML).join('')}
            </div>`).join('');
    }

    onSnapshot(collection(db, 'instalaciones'), (snap) => {
        allJobs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        render();
    }, (err) => {
        document.getElementById('jobs-list').innerHTML = '<p class="empty">Error cargando instalaciones: ' + err.message + '</p>';
    });

    onSnapshot(collection(db, 'orders'), (snap) => {
        ordersCache = snap.docs.map(d => ({ id: d.id, data: d.data() }));
        ordersClientesCache = ordersCache.map(o => o.data);
        refreshClientMap();
        render();
    });
    onSnapshot(collection(db, 'clientes'), (snap) => {
        clientesCache = snap.docs.map(d => d.data());
        refreshClientMap();
    });

    // Instaladores: se leen todos los usuarios y se filtra por rol (string o array) para no
    // depender de que 'rol' sea siempre un array.
    onSnapshot(collection(db, 'usuarios'), (snap) => {
        instaladores = snap.docs.map(d => ({ email: d.id, ...d.data() })).filter(u => {
            const roles = Array.isArray(u.rol) ? u.rol : [u.rol];
            return roles.includes('instalador');
        });
        const sel = document.getElementById('job-instalador');
        sel.innerHTML = '<option value="">(sin asignar)</option>' +
            instaladores.map(u => `<option value="${esc(u.email)}">${esc(u.nombre)}</option>`).join('');
    });

    function refreshClientMap() {
        clientMap = buildClientMap(ordersClientesCache, clientesCache);
        document.getElementById('clientes-datalist').innerHTML =
            clientList(clientMap).map(c => `<option value="${esc(c.nombre)}">`).join('');
        actualizarObrasDatalist();
    }
    function actualizarObrasDatalist() {
        const entry = clientMap.get((document.getElementById('job-cliente').value || '').trim().toLowerCase());
        const obras = entry ? Array.from(entry.obras.values()) : [];
        document.getElementById('obras-datalist').innerHTML = obras.map(o => `<option value="${esc(o)}">`).join('');
    }
    document.getElementById('job-cliente').addEventListener('input', actualizarObrasDatalist);

    // ---------- Modal crear/editar ----------
    let editingId = null;

    function limpiarForm() {
        editingId = null;
        ['job-cliente','job-obra','job-direccion','job-gps','job-fecha','job-notas'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('job-instalador').value = '';
        document.getElementById('job-estado').value = 'pendiente';
        document.querySelectorAll('#job-recordar input').forEach(c => c.checked = false);
    }

    window.abrirNuevo = function () {
        limpiarForm();
        document.getElementById('modal-title').textContent = 'Nuevo trabajo de instalación';
        if (selectedDay) {
            const pad = (n) => String(n).padStart(2, '0'), d = selectedDay;
            document.getElementById('job-fecha').value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T09:00`;
        }
        document.getElementById('modal-overlay').classList.add('show');
    };

    window.agendarPedido = function (orderId) {
        const o = ordersCache.find(x => x.id === orderId);
        if (!o) return;
        limpiarForm();
        editingId = null;
        window._orderIdParaGuardar = orderId;
        document.getElementById('modal-title').textContent = 'Agendar instalación (desde pedido)';
        document.getElementById('job-cliente').value = o.data.cliente || '';
        document.getElementById('job-obra').value = o.data.obra || '';
        if (selectedDay) {
            const pad = (n) => String(n).padStart(2, '0'), d = selectedDay;
            document.getElementById('job-fecha').value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T09:00`;
        }
        document.getElementById('modal-overlay').classList.add('show');
    };

    window.abrirEditar = function (id) {
        const j = allJobs.find(x => x.id === id);
        if (!j) return;
        limpiarForm();
        editingId = id;
        window._orderIdParaGuardar = j.orderId || null;
        document.getElementById('modal-title').textContent = 'Editar instalación';
        document.getElementById('job-cliente').value = j.cliente || '';
        document.getElementById('job-obra').value = j.obra || '';
        document.getElementById('job-direccion').value = j.direccion || '';
        document.getElementById('job-gps').value = j.gps || '';
        document.getElementById('job-instalador').value = j.instaladorEmail || '';
        document.getElementById('job-estado').value = j.estado || 'pendiente';
        const recs = Array.isArray(j.recordatorios) ? j.recordatorios.map(String) : [];
        document.querySelectorAll('#job-recordar input').forEach(c => c.checked = recs.includes(c.value));
        document.getElementById('job-notas').value = j.notas || '';
        const f = jobDate(j);
        if (f) {
            const pad = (n) => String(n).padStart(2, '0');
            document.getElementById('job-fecha').value = `${f.getFullYear()}-${pad(f.getMonth()+1)}-${pad(f.getDate())}T${pad(f.getHours())}:${pad(f.getMinutes())}`;
        }
        document.getElementById('modal-overlay').classList.add('show');
    };

    window.cerrarModal = function () {
        document.getElementById('modal-overlay').classList.remove('show');
        window._orderIdParaGuardar = null;
    };

    window.guardarJob = async function () {
        const cliente = document.getElementById('job-cliente').value.trim();
        const obra = document.getElementById('job-obra').value.trim();
        const direccion = document.getElementById('job-direccion').value.trim();
        const gps = document.getElementById('job-gps').value.trim();
        const fechaStr = document.getElementById('job-fecha').value;
        const instaladorEmail = document.getElementById('job-instalador').value;
        const estado = document.getElementById('job-estado').value;
        const recordatorios = Array.from(document.querySelectorAll('#job-recordar input:checked')).map(c => Number(c.value));
        const notas = document.getElementById('job-notas').value.trim();

        if (!cliente) { alert('Escribe el cliente.'); return; }
        if (!fechaStr) { alert('Elige fecha y hora.'); return; }
        if (gps && !parseGps(gps)) {
            if (!confirm('El GPS no parece coordenadas ni un link válido. ¿Guardar de todos modos?')) return;
        }
        const inst = instaladores.find(u => u.email === instaladorEmail);

        const datos = {
            cliente, obra, direccion, gps,
            fecha: Timestamp.fromDate(new Date(fechaStr)),
            instaladorEmail: instaladorEmail || '',
            instaladorNombre: inst ? inst.nombre : '',
            estado, notas, recordatorios,
            // Al crear o editar se reinicia el estado de recordatorios para que vuelvan a
            // evaluarse (útil si se cambió la fecha o los avisos).
            recordatoriosEnviados: [],
            recordatoriosPendientes: recordatorios.length > 0,
            orderId: window._orderIdParaGuardar || null
        };

        try {
            if (editingId) {
                await updateDoc(doc(db, 'instalaciones', editingId), datos);
            } else {
                await addDoc(collection(db, 'instalaciones'), {
                    ...datos,
                    origen: datos.orderId ? 'pedido' : 'manual',
                    creadoPorNombre: usuario.nombre,
                    fechaCreacion: serverTimestamp()
                });
            }
            cerrarModal();
        } catch (e) {
            alert('No se pudo guardar: ' + e.message);
        }
    };

    window.cambiarEstado = async function (id, estado) {
        try { await updateDoc(doc(db, 'instalaciones', id), { estado }); }
        catch (e) { alert('No se pudo cambiar el estado: ' + e.message); }
    };

    window.eliminarJob = async function (id) {
        const j = allJobs.find(x => x.id === id);
        const lugar = j ? [j.cliente, j.obra].filter(Boolean).join(' — ') : '';
        if (!confirm(`¿Eliminar la instalación "${lugar}"? Esta acción no se puede deshacer.`)) return;
        try { await deleteDoc(doc(db, 'instalaciones', id)); }
        catch (e) { alert('No se pudo eliminar: ' + e.message); }
    };
</script>

</body>
</html>
