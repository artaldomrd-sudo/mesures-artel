<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARTAL — Calendario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
    main { max-width: 720px; }
    .month-nav { display: flex; align-items: center; justify-content: space-between; background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 10px 14px; }
    .month-nav button { background: var(--artal-blue); color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-weight: bold; cursor: pointer; font-family: 'Arimo'; min-height: 40px; }
    .month-nav b { color: var(--artal-blue); font-size: 15px; text-transform: capitalize; }

    .new-cita-btn { background: var(--artal-yellow); color: var(--artal-blue); border: none; border-radius: 10px; padding: 14px; font-weight: bold; font-size: 15px; cursor: pointer; font-family: 'Arimo'; min-height: 48px; }

    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 12px; }
    .grid-weekday { text-align: center; font-size: 11px; font-weight: bold; color: #999; text-transform: uppercase; padding-bottom: 4px; }
    .grid-day { min-height: 44px; padding: 8px 0 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; color: var(--artal-blue); position: relative; transition: 0.1s; }
    .grid-day:hover { background: var(--artal-light); }
    .grid-day.empty { cursor: default; }
    .grid-day.today { border: 2px solid var(--artal-yellow); }
    .grid-day.selected { background: var(--artal-blue); color: #fff; }
    .grid-day .dot { width: 5px; height: 5px; border-radius: 50%; background: #e67e22; position: absolute; bottom: 6px; }
    .grid-day.selected .dot { background: var(--artal-yellow); }
    .selected-day-bar { display: flex; align-items: center; justify-content: space-between; }
    .selected-day-bar a { color: var(--artal-blue); font-size: 12.5px; font-weight: bold; text-decoration: none; }

    .day-group { display: flex; flex-direction: column; gap: 8px; }
    .day-label { font-size: 12.5px; font-weight: bold; color: var(--artal-blue); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 6px; }
    .cita-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px 16px; border-left: 6px solid var(--artal-yellow); }
    .leyenda { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: #555; align-items: center; }
    .leyenda span { display: inline-flex; align-items: center; gap: 5px; }
    .leyenda .punto { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
    .cita-card .cita-head { display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap; align-items: center; }
    .cita-card b { color: var(--artal-blue); font-size: 15px; }
    .cita-card .hora { font-size: 13px; color: #666; font-weight: bold; }
    .cita-card .meta { font-size: 12.5px; color: #666; margin-top: 4px; }
    .cita-card.recordatorio { border-left-color: #e74c3c !important; background: #fff6f6; }
    .evento-badge { font-size: 10px; font-weight: bold; text-transform: uppercase; padding: 2px 8px; border-radius: 12px; letter-spacing: 0.5px; margin-left: 6px; }
    .evento-badge.rec { background: #e74c3c; color: #fff; }
    .cita-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .cita-actions button { flex: 1; min-width: 90px; padding: 9px 8px; border: none; border-radius: 7px; font-weight: bold; font-size: 12.5px; cursor: pointer; font-family: 'Arimo'; min-height: 40px; }
    .btn-asistio { background: #2ecc71; color: #fff; }
    .btn-modificar { background: var(--artal-blue); color: #fff; }
    .btn-borrar { background: transparent; color: #e74c3c; border: 1.5px solid #e74c3c !important; }
    .btn-reabrir { background: transparent; color: var(--artal-blue); border: 1.5px solid var(--artal-blue) !important; }
    .cita-card.completada { opacity: 0.62; }
    .evento-badge.done { background: #2ecc71; color: #fff; }
    .grid-day .dot.done { background: #bbb; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: #fff; border-radius: var(--radius); width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; padding: 20px; }
    .modal-box h2 { color: var(--artal-blue); font-size: 17px; margin: 0 0 14px; }
    .modal-box label { font-size: 12.5px; font-weight: bold; color: var(--artal-blue); display: block; margin: 12px 0 4px; }
    .modal-box input, .modal-box select, .modal-box textarea { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 8px; font-family: 'Arimo'; font-size: 14px; min-height: 44px; box-sizing: border-box; }
    .modal-box input[disabled] { background: #f3f4f6; color: #555; }
    .modal-box textarea { min-height: 60px; }
    .toggle-row { display: flex; gap: 8px; margin-top: 8px; }
    .toggle-row button { flex: 1; padding: 10px; border: 2px solid var(--artal-blue); background: #fff; color: var(--artal-blue); border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Arimo'; }
    .toggle-row button.active { background: var(--artal-blue); color: #fff; }
    .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
    .modal-actions button { flex: 1; padding: 12px; border: none; border-radius: 9px; font-weight: bold; cursor: pointer; font-family: 'Arimo'; min-height: 46px; }
    .btn-guardar { background: #2ecc71; color: #fff; }
    .btn-cancelar { background: transparent; color: #888; border: 1.5px solid #ddd !important; }
    .recordar-group { display: flex; flex-direction: column; gap: 6px; }
    .recordar-group label { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: normal; color: #333; margin: 0; cursor: pointer; }
    .recordar-group input { width: auto; min-height: 0; }
</style>
</head>
<body>

<header>
    <div class="header-title">
        <a class="btn-back" href="index.html" title="Volver al panel">← Panel</a>
        <img class="logo" src="../logo.png" alt="ARTAL">
        <h1>Calendario</h1>
    </div>
    <div class="who">
        <span id="user-name"></span>
        <button id="notif-btn" title="Recibir avisos de citas en este dispositivo">🔔 Notificaciones</button>
        <button id="signout-btn">Cerrar sesión</button>
    </div>
</header>

<main>
    <button class="new-cita-btn" onclick="abrirNuevaCita()">+ Nueva cita</button>
    <div class="leyenda">
        <span><i class="punto" style="background:#F6B93B;"></i>Dylan</span>
        <span><i class="punto" style="background:#3498db;"></i>Rolanny</span>
        <span><i class="punto" style="background:#2ecc71;"></i>Andrea</span>
        <span><i class="punto" style="background:#9b59b6;"></i>Otros</span>
    </div>
    <div class="month-nav">
        <button onclick="cambiarMes(-1)">‹ Anterior</button>
        <b id="month-label"></b>
        <button onclick="cambiarMes(1)">Siguiente ›</button>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
    <div class="selected-day-bar" id="selected-day-bar" style="display:none;">
        <span id="selected-day-label"></span>
        <a href="#" onclick="limpiarSeleccion(); return false;">Ver todo el mes</a>
    </div>
    <div id="citas-list"><p class="empty">Cargando…</p></div>
</main>

<div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
        <h2 id="modal-title">Nueva cita</h2>

        <div class="toggle-row">
            <button type="button" id="evento-cita-btn" class="active" onclick="setTipoEvento('cita')">📅 Cita</button>
            <button type="button" id="evento-rec-btn" onclick="setTipoEvento('recordatorio')">🔔 Recordatorio</button>
        </div>

        <div class="toggle-row">
            <button type="button" id="tipo-libre-btn" class="active" onclick="setTipoCita('libre')">Libre</button>
            <button type="button" id="tipo-pedido-btn" onclick="setTipoCita('pedido')">Ligada a un pedido</button>
        </div>

        <div id="pedido-select-wrap" style="display:none;">
            <label>Pedido</label>
            <select id="cita-pedido"></select>
        </div>

        <label>Título</label>
        <input type="text" id="cita-titulo" placeholder="Ej: Visita de instalación">

        <label>Descripción (opcional)</label>
        <textarea id="cita-descripcion" placeholder="Detalles adicionales…"></textarea>

        <label>Fecha y hora</label>
        <input type="datetime-local" id="cita-fecha">

        <div id="duracion-wrap">
            <label>Duración de la cita</label>
            <select id="cita-duracion">
                <option value="30">30 minutos</option>
                <option value="60" selected>1 hora</option>
                <option value="90">1 hora 30 min</option>
                <option value="120">2 horas</option>
                <option value="180">3 horas</option>
                <option value="240">4 horas</option>
                <option value="480">Medio día</option>
                <option value="0">Sin duración fija</option>
            </select>
        </div>

        <label>Recordatorios (puedes marcar varios)</label>
        <div id="cita-recordar" class="recordar-group">
            <label><input type="checkbox" value="15"> 15 min antes</label>
            <label><input type="checkbox" value="30"> 30 min antes</label>
            <label><input type="checkbox" value="60"> 1 hora antes</label>
            <label><input type="checkbox" value="180"> 3 horas antes</label>
            <label><input type="checkbox" value="720"> 12 horas antes</label>
            <label><input type="checkbox" value="1440"> 1 día antes</label>
        </div>

        <label>¿Para quién es?</label>
        <div class="toggle-row">
            <button type="button" id="para-gerente-btn" class="active" onclick="setAsignadoA('gerente')">Para mí (gerente)</button>
            <button type="button" id="para-instalador-btn" onclick="setAsignadoA('instalador')">Equipo de instalación</button>
        </div>

        <div id="instalador-select-wrap" style="display:none;">
            <label>Instalador asignado</label>
            <select id="cita-instalador"></select>
        </div>

        <label>¿Quién está agendando esto?</label>
        <select id="cita-creador"></select>

        <div class="modal-actions">
            <button class="btn-cancelar" onclick="cerrarNuevaCita()">Cancelar</button>
            <button class="btn-guardar" onclick="guardarCita()">Guardar cita</button>
        </div>
    </div>
</div>

<script type="module">
    import { requireAuth, auth, signOut } from './auth-common.js';
    import { db } from './firebase-config.js';
    import { enableNotifications } from './notifications.js';
    import {
        collection, query, where, onSnapshot, addDoc, updateDoc, deleteDoc, doc, getDoc, Timestamp, serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js';

    // Solo admin: el calendario lo agenda únicamente el gerente/oficina.
    const usuario = await requireAuth([]);
    document.getElementById('user-name').textContent = usuario.nombre;
    document.getElementById('signout-btn').onclick = () => signOut(auth);
    document.getElementById('notif-btn').onclick = () => enableNotifications(document.getElementById('notif-btn'));

    function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }

    // ---------- Agenda ----------
    let currentMonth = new Date(); currentMonth.setDate(1);
    let selectedDay = null; // Date (medianoche) del día tocado en la grilla, o null = ver todo el mes
    let allCitas = [];
    const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    const DIAS_SEMANA = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

    function sameDay(a, b) {
        return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }

    function renderGrid() {
        const grid = document.getElementById('calendar-grid');
        const year = currentMonth.getFullYear();
        const month = currentMonth.getMonth();
        const firstWeekday = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const today = new Date();

        let html = DIAS_SEMANA.map(d => `<div class="grid-weekday">${d}</div>`).join('');
        for (let i = 0; i < firstWeekday; i++) html += `<div class="grid-day empty"></div>`;
        for (let day = 1; day <= daysInMonth; day++) {
            const cellDate = new Date(year, month, day);
            const delDia = allCitas.filter(c => {
                const f = c.fecha && c.fecha.toDate ? c.fecha.toDate() : null;
                return f && sameDay(f, cellDate);
            });
            const hayPend = delDia.some(c => !c.completada);
            // Punto naranja si hay algo pendiente ese día; gris si solo quedan eventos ya
            // atendidos (historial) — así se distingue lo activo de lo pasado.
            const dot = hayPend ? '<span class="dot"></span>' : (delDia.length ? '<span class="dot done"></span>' : '');
            const classes = ['grid-day'];
            if (sameDay(cellDate, today)) classes.push('today');
            if (selectedDay && sameDay(cellDate, selectedDay)) classes.push('selected');
            html += `<div class="${classes.join(' ')}" onclick="seleccionarDia(${year}, ${month}, ${day})">${day}${dot}</div>`;
        }
        grid.innerHTML = html;
    }

    window.seleccionarDia = function (year, month, day) {
        selectedDay = new Date(year, month, day);
        render();
    };
    window.limpiarSeleccion = function () {
        selectedDay = null;
        render();
    };

    // Color del borde según quién agendó la cita, para reconocerlo de un vistazo.
    function colorCreador(nombre) {
        const n = (nombre || '').trim().toLowerCase();
        if (n === 'dylan') return '#F6B93B';
        if (n === 'andrea') return '#2ecc71';
        if (n === 'rolanny' || n === 'rolany' || n === 'anny') return '#3498db';
        return '#9b59b6';
    }

    function fmtHora(d) { return d.toLocaleTimeString('es-DO', { hour: '2-digit', minute: '2-digit' }); }

    function citaCardHTML(c) {
        const fecha = c.fecha && c.fecha.toDate ? c.fecha.toDate() : new Date();
        const esRec = c.tipo === 'recordatorio';
        const lugar = [c.cliente, c.obra].filter(Boolean).join(' — ');
        // Horario: para citas con duración se muestra "9:00–10:30".
        const dur = Number(c.duracionMin || 0);
        let horaTxt = fmtHora(fecha);
        if (!esRec && dur > 0) horaTxt = fmtHora(fecha) + '–' + fmtHora(new Date(fecha.getTime() + dur * 60000));
        const hecha = !!c.completada;
        const borde = esRec ? '' : `style="border-left-color:${colorCreador(c.creadoPorNombre)};"`;
        const acciones = hecha
            ? `<button class="btn-reabrir" onclick="reabrirCita('${c.id}')">↩ Reabrir</button>
               <button class="btn-borrar" onclick="borrarCita('${c.id}')">🗑 Borrar</button>`
            : `<button class="btn-asistio" onclick="asistioCita('${c.id}')">✓ ${esRec ? 'Hecho' : 'Asistió'}</button>
               <button class="btn-modificar" onclick="modificarCita('${c.id}')">✏ Modificar</button>
               <button class="btn-borrar" onclick="borrarCita('${c.id}')">🗑 Borrar</button>`;
        return `
        <div class="cita-card ${esRec ? 'recordatorio' : ''} ${hecha ? 'completada' : ''}" ${borde}>
            <div class="cita-head">
                <b>${esc(c.titulo)}${esRec ? '<span class="evento-badge rec">🔔 Recordatorio</span>' : ''}${hecha ? '<span class="evento-badge done">✓ ' + (esRec ? 'Hecho' : 'Asistió') + '</span>' : ''}</b>
                <span class="hora">${horaTxt}</span>
            </div>
            <div class="meta">
                ${c.asignadoA === 'instalador' ? '🔧 ' + esc(c.asignadoNombre) : '👤 Gerente'}
                ${lugar ? ' · ' + esc(lugar) : ''}
                ${c.descripcion ? '<br>' + esc(c.descripcion) : ''}
                <br>Agendado por ${esc(c.creadoPorNombre)}
            </div>
            <div class="cita-actions">
                ${acciones}
            </div>
        </div>`;
    }

    function render() {
        document.getElementById('month-label').textContent = MESES[currentMonth.getMonth()] + ' ' + currentMonth.getFullYear();
        renderGrid();

        const bar = document.getElementById('selected-day-bar');
        const list = document.getElementById('citas-list');
        let citasAMostrar;

        if (selectedDay) {
            // Vista de un día: se muestran TODAS (incluidas las ya atendidas), para consultar el
            // historial por fecha.
            bar.style.display = 'flex';
            document.getElementById('selected-day-label').textContent =
                selectedDay.toLocaleDateString('es-DO', { weekday: 'long', day: 'numeric', month: 'long' });
            citasAMostrar = allCitas.filter(c => {
                const f = c.fecha && c.fecha.toDate ? c.fecha.toDate() : null;
                return f && sameDay(f, selectedDay);
            }).sort((a, b) => a.fecha.toDate() - b.fecha.toDate());
            if (!citasAMostrar.length) { list.innerHTML = '<p class="empty">No hay eventos ese día.</p>'; return; }
            list.innerHTML = `<div class="day-group">${citasAMostrar.map(citaCardHTML).join('')}</div>`;
            return;
        }

        // Vista del mes: solo lo PENDIENTE (lo ya atendido sale de la lista pero queda en el
        // calendario; se ve al abrir su día).
        bar.style.display = 'none';
        const start = new Date(currentMonth);
        const end = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1);
        const delMes = allCitas.filter(c => {
            const f = c.fecha && c.fecha.toDate ? c.fecha.toDate() : null;
            return f && f >= start && f < end && !c.completada;
        }).sort((a, b) => a.fecha.toDate() - b.fecha.toDate());

        if (!delMes.length) { list.innerHTML = '<p class="empty">No hay eventos pendientes este mes.</p>'; return; }

        const groups = {};
        delMes.forEach(c => {
            const f = c.fecha.toDate();
            const key = f.toLocaleDateString('es-DO', { weekday: 'long', day: 'numeric', month: 'long' });
            (groups[key] = groups[key] || []).push(c);
        });
        list.innerHTML = Object.entries(groups).map(([label, citas]) => `
            <div class="day-group">
                <div class="day-label">${esc(label)}</div>
                ${citas.map(citaCardHTML).join('')}
            </div>
        `).join('');
    }

    window.cambiarMes = function (delta) {
        currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + delta, 1);
        selectedDay = null;
        render();
    };

    onSnapshot(collection(db, 'citas'), (snap) => {
        allCitas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        render();
    }, (err) => {
        document.getElementById('citas-list').innerHTML = '<p class="empty">Error cargando citas: ' + err.message + '</p>';
    });

    // ---------- Formulario nueva cita ----------
    let tipoCita = 'libre';
    let asignadoA = 'gerente';
    let tipoEvento = 'cita';   // 'cita' | 'recordatorio'
    let editingId = null;      // id de la cita que se está editando, o null si es nueva
    let ordersCache = [];
    let instaladoresCache = [];

    // "Quién agenda" viene por defecto con la cuenta conectada, pero se puede elegir a mano otro
    // nombre de oficina (la lista sale de los usuarios con rol admin/gerencia).
    onSnapshot(collection(db, 'usuarios'), (snap) => {
        const admins = snap.docs.map(d => ({ email: d.id, ...d.data() })).filter(u => {
            const roles = Array.isArray(u.rol) ? u.rol : [u.rol];
            return roles.includes('admin');
        });
        let nombres = admins.map(u => u.nombre).filter(Boolean);
        if (!nombres.includes(usuario.nombre)) nombres.unshift(usuario.nombre);
        nombres = [...new Set(nombres)].sort((a, b) => a.localeCompare(b, 'es'));
        const sel = document.getElementById('cita-creador');
        sel.innerHTML = nombres.map(n => `<option value="${esc(n)}" ${n === usuario.nombre ? 'selected' : ''}>${esc(n)}</option>`).join('');
    });

    onSnapshot(collection(db, 'orders'), (snap) => {
        ordersCache = snap.docs.map(d => ({ id: d.id, data: d.data() }));
        const sel = document.getElementById('cita-pedido');
        sel.innerHTML = ordersCache.map(o =>
            `<option value="${o.id}">${esc(o.data.cliente) || 'Sin cliente'} — ${esc(o.data.obra)}</option>`
        ).join('') || '<option value="">(no hay pedidos)</option>';
    });

    onSnapshot(query(collection(db, 'usuarios'), where('rol', 'array-contains', 'instalador')), (snap) => {
        instaladoresCache = snap.docs.map(d => ({ email: d.id, ...d.data() }));
        const sel = document.getElementById('cita-instalador');
        sel.innerHTML = instaladoresCache.map(u => `<option value="${esc(u.email)}">${esc(u.nombre)}</option>`).join('')
            || '<option value="">(no hay instaladores registrados)</option>';
    });

    function resetForm() {
        editingId = null;
        document.getElementById('cita-titulo').value = '';
        document.getElementById('cita-descripcion').value = '';
        document.getElementById('cita-fecha').value = '';
        document.getElementById('cita-duracion').value = '60';
        document.querySelectorAll('#cita-recordar input:checked').forEach(c => c.checked = false);
        setTipoEvento('cita');
        setTipoCita('libre');
        setAsignadoA('gerente');
    }

    window.abrirNuevaCita = function () {
        resetForm();
        document.getElementById('modal-title').textContent = 'Nueva cita';
        if (selectedDay) {
            const pad = (n) => String(n).padStart(2, '0');
            const d = selectedDay;
            document.getElementById('cita-fecha').value =
                `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T09:00`;
        }
        document.getElementById('modal-overlay').classList.add('show');
    };
    window.cerrarNuevaCita = function () {
        document.getElementById('modal-overlay').classList.remove('show');
    };
    window.setTipoEvento = function (tipo) {
        tipoEvento = tipo;
        document.getElementById('evento-cita-btn').classList.toggle('active', tipo === 'cita');
        document.getElementById('evento-rec-btn').classList.toggle('active', tipo === 'recordatorio');
        // El recordatorio es un aviso puntual: no lleva duración.
        document.getElementById('duracion-wrap').style.display = tipo === 'cita' ? 'block' : 'none';
    };
    window.setTipoCita = function (tipo) {
        tipoCita = tipo;
        document.getElementById('tipo-libre-btn').classList.toggle('active', tipo === 'libre');
        document.getElementById('tipo-pedido-btn').classList.toggle('active', tipo === 'pedido');
        document.getElementById('pedido-select-wrap').style.display = tipo === 'pedido' ? 'block' : 'none';
    };
    window.setAsignadoA = function (val) {
        asignadoA = val;
        document.getElementById('para-gerente-btn').classList.toggle('active', val === 'gerente');
        document.getElementById('para-instalador-btn').classList.toggle('active', val === 'instalador');
        document.getElementById('instalador-select-wrap').style.display = val === 'instalador' ? 'block' : 'none';
    };

    window.guardarCita = async function () {
        const titulo = document.getElementById('cita-titulo').value.trim();
        const descripcion = document.getElementById('cita-descripcion').value.trim();
        const fechaStr = document.getElementById('cita-fecha').value;
        const creadoPorNombre = document.getElementById('cita-creador').value || usuario.nombre;

        if (!titulo) { alert('Escribe un título para la cita.'); return; }
        if (!fechaStr) { alert('Elige fecha y hora.'); return; }

        let cliente = '', obra = '', orderId = null;
        if (tipoCita === 'pedido') {
            orderId = document.getElementById('cita-pedido').value;
            const o = ordersCache.find(x => x.id === orderId);
            if (!o) { alert('Selecciona un pedido válido.'); return; }
            cliente = o.data.cliente || ''; obra = o.data.obra || '';
        }

        let asignadoEmail = '', asignadoNombre = '';
        if (asignadoA === 'gerente') {
            asignadoEmail = auth.currentUser.email;
            asignadoNombre = 'Gerente';
        } else {
            asignadoEmail = document.getElementById('cita-instalador').value;
            const inst = instaladoresCache.find(x => x.email === asignadoEmail);
            if (!inst) { alert('Selecciona un instalador.'); return; }
            asignadoNombre = inst.nombre;
        }

        const recordatorios = Array.from(document.querySelectorAll('#cita-recordar input:checked')).map(c => Number(c.value));
        const duracionMin = tipoEvento === 'cita' ? Number(document.getElementById('cita-duracion').value) || 0 : 0;

        const datos = {
            tipo: tipoEvento,
            titulo, descripcion,
            fecha: Timestamp.fromDate(new Date(fechaStr)),
            duracionMin,
            orderId, cliente, obra,
            asignadoA, asignadoEmail, asignadoNombre,
            creadoPorNombre,
            recordatorios,
            recordatoriosEnviados: [],
            recordatoriosPendientes: recordatorios.length > 0
        };

        try {
            if (editingId) {
                await updateDoc(doc(db, 'citas', editingId), datos);
            } else {
                await addDoc(collection(db, 'citas'), { ...datos, fechaCreacion: serverTimestamp() });
            }
            cerrarNuevaCita();
            resetForm();
        } catch (e) {
            alert('No se pudo guardar: ' + e.message);
        }
    };

    // Validar asistencia / hecho: NO se borra — se marca como atendida, así sale de la lista de
    // pendientes pero se queda en el calendario (se ve al abrir su día, para consultarla luego).
    window.asistioCita = async function (id) {
        try {
            await updateDoc(doc(db, 'citas', id), {
                completada: true,
                fechaCompletada: serverTimestamp(),
                recordatoriosPendientes: false   // ya no hace falta recordar algo ya atendido
            });
        } catch (e) { alert('No se pudo completar: ' + e.message); }
    };

    // Reabrir: vuelve a pendiente (por si se marcó por error o hay que reprogramar).
    window.reabrirCita = async function (id) {
        const c = allCitas.find(x => x.id === id);
        const recs = c && Array.isArray(c.recordatorios) ? c.recordatorios : [];
        try {
            await updateDoc(doc(db, 'citas', id), {
                completada: false,
                recordatoriosEnviados: [],
                recordatoriosPendientes: recs.length > 0
            });
        } catch (e) { alert('No se pudo reabrir: ' + e.message); }
    };

    window.borrarCita = async function (id) {
        const c = allCitas.find(x => x.id === id);
        if (!confirm(`¿Borrar "${c ? c.titulo : ''}" del calendario? Esta acción no se puede deshacer.`)) return;
        try { await deleteDoc(doc(db, 'citas', id)); }
        catch (e) { alert('No se pudo borrar: ' + e.message); }
    };

    // Modificar: abre el formulario ya lleno con los datos de esa cita para cambiar lo que haga
    // falta (fecha, hora, duración, etc.) — útil para reprogramar o cambios de última hora.
    window.modificarCita = function (id) {
        const c = allCitas.find(x => x.id === id);
        if (!c) return;
        resetForm();
        editingId = id;
        document.getElementById('modal-title').textContent = 'Modificar';
        setTipoEvento(c.tipo === 'recordatorio' ? 'recordatorio' : 'cita');
        document.getElementById('cita-titulo').value = c.titulo || '';
        document.getElementById('cita-descripcion').value = c.descripcion || '';
        const f = c.fecha && c.fecha.toDate ? c.fecha.toDate() : new Date();
        const pad = (n) => String(n).padStart(2, '0');
        document.getElementById('cita-fecha').value =
            `${f.getFullYear()}-${pad(f.getMonth() + 1)}-${pad(f.getDate())}T${pad(f.getHours())}:${pad(f.getMinutes())}`;
        if (c.duracionMin != null) document.getElementById('cita-duracion').value = String(c.duracionMin);
        // Ligada a pedido o libre
        setTipoCita(c.orderId ? 'pedido' : 'libre');
        if (c.orderId) document.getElementById('cita-pedido').value = c.orderId;
        // Para quién
        setAsignadoA(c.asignadoA === 'instalador' ? 'instalador' : 'gerente');
        if (c.asignadoA === 'instalador') document.getElementById('cita-instalador').value = c.asignadoEmail || '';
        // Quién agenda
        if (c.creadoPorNombre) {
            const sel = document.getElementById('cita-creador');
            if (![...sel.options].some(o => o.value === c.creadoPorNombre)) {
                sel.insertAdjacentHTML('beforeend', `<option value="${esc(c.creadoPorNombre)}">${esc(c.creadoPorNombre)}</option>`);
            }
            sel.value = c.creadoPorNombre;
        }
        // Recordatorios marcados
        const recs = Array.isArray(c.recordatorios) ? c.recordatorios.map(String) : [];
        document.querySelectorAll('#cita-recordar input').forEach(chk => chk.checked = recs.includes(chk.value));
        document.getElementById('modal-overlay').classList.add('show');
    };
</script>

</body>
</html>
