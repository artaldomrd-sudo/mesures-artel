<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARTAL — Inventario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
    main { max-width: 820px; }
    #search-input { width: 100%; padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 10px; font-family: 'Arimo'; font-size: 15px; min-height: 48px; background: #fff; }
    h2.section-title { font-size: 14px; color: var(--artal-blue); margin: 6px 0 0; text-transform: uppercase; letter-spacing: 0.5px; }
    .seed-btn { background: var(--artal-yellow); color: var(--artal-blue); border: none; border-radius: 10px; padding: 12px; font-weight: bold; cursor: pointer; font-family: 'Arimo'; min-height: 46px; }
    .new-item-btn { background: var(--artal-blue); color: #fff; border: none; border-radius: 10px; padding: 12px; font-weight: bold; cursor: pointer; font-family: 'Arimo'; min-height: 46px; }
    .item-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px 16px; border-left: 6px solid var(--artal-blue); }
    .item-card.low { border-left-color: #e74c3c; }
    .item-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
    .item-head b { color: var(--artal-blue); font-size: 15px; }
    .item-qty { font-size: 20px; font-weight: bold; color: var(--artal-blue); }
    .item-qty .unidad { font-size: 12px; font-weight: normal; color: #888; }
    .item-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .item-actions button { padding: 9px 14px; border: none; border-radius: 7px; font-weight: bold; cursor: pointer; font-family: 'Arimo'; font-size: 13px; }
    .btn-tomar { background: #e67e22; color: #fff; }
    .btn-agregar { background: #2ecc71; color: #fff; }
    .btn-precio { background: #16a085; color: #fff; }
    .btn-eliminar { background: #e74c3c; color: #fff; }
    .eliminar-form { border: 1.5px solid #e74c3c; background: #fdecea !important; }
    .item-precios { display: flex; gap: 14px; margin-top: 6px; flex-wrap: wrap; font-size: 12.5px; }
    .item-precios .costo { color: #888; }
    .item-precios .venta { color: #16a085; font-weight: bold; }
    .item-precios .margen { color: #999; }
    .inline-form { display: none; margin-top: 10px; padding: 10px; background: var(--artal-light); border-radius: 8px; }
    .inline-form.show { display: block; }
    .inline-form label { font-size: 12px; font-weight: bold; color: var(--artal-blue); display: block; margin: 8px 0 4px; }
    .inline-form input { width: 100%; padding: 9px; border: 1.5px solid #ddd; border-radius: 7px; font-family: 'Arimo'; font-size: 14px; min-height: 40px; }
    .inline-form .row-actions { display: flex; gap: 8px; margin-top: 10px; }
    .inline-form .row-actions button { flex: 1; padding: 10px; border: none; border-radius: 7px; font-weight: bold; cursor: pointer; font-family: 'Arimo'; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: #fff; border-radius: var(--radius); width: 100%; max-width: 420px; padding: 20px; }
    .modal-box h2 { color: var(--artal-blue); font-size: 16px; margin: 0 0 12px; }
    .modal-box label { font-size: 12px; font-weight: bold; color: var(--artal-blue); display: block; margin: 10px 0 4px; }
    .modal-box input, .modal-box select { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 8px; font-family: 'Arimo'; font-size: 14px; min-height: 44px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .modal-actions button { flex: 1; padding: 12px; border: none; border-radius: 9px; font-weight: bold; cursor: pointer; font-family: 'Arimo'; }
    .categoria-row { display: flex; gap: 8px; align-items: flex-end; }
    .categoria-row select { flex: 1; }
    .categoria-row button { white-space: nowrap; padding: 10px 12px; border: none; border-radius: 8px; background: var(--artal-light); color: var(--artal-blue); font-weight: bold; cursor: pointer; font-family: 'Arimo'; font-size: 13px; min-height: 44px; }
    .movs-list { font-size: 12.5px; color: #555; }
    .movs-list li { margin-bottom: 4px; }
</style>
</head>
<body>

<header>
    <div class="header-title">
        <a class="btn-back" id="btn-back" href="index.html" title="Volver">← Volver</a>
        <img class="logo" src="../logo.png" alt="ARTAL">
        <h1>Inventario</h1>
    </div>
    <div class="who">
        <span id="user-name"></span>
        <button id="notif-btn" title="Recibir avisos en este dispositivo">🔔 Notificaciones</button>
        <button id="signout-btn">Cerrar sesión</button>
    </div>
</header>

<main>
    <div id="admin-tools" style="display:none; gap:10px;">
        <button class="seed-btn" id="seed-btn" onclick="sembrarCatalogo()" style="display:none;">📦 Crear catálogo inicial de perfiles</button>
        <button class="seed-btn" id="seed-btn-sellantes" onclick="sembrarSellantes()" style="display:none;">🧪 Crear categorías Silicón/Urethano/Masilla</button>
        <button class="new-item-btn" onclick="abrirNuevoItem()">+ Agregar ítem nuevo al catálogo</button>
    </div>
    <input type="text" id="search-input" placeholder="🔎 Buscar en el inventario…">

    <div id="categorias-container"><p class="empty">Cargando…</p></div>
</main>

<div class="modal-overlay" id="nuevo-item-overlay">
    <div class="modal-box">
        <h2>Agregar ítem nuevo</h2>
        <label>Categoría</label>
        <div class="categoria-row">
            <select id="nuevo-categoria"></select>
            <button type="button" onclick="crearCategoria()">+ Nueva categoría</button>
        </div>
        <label>Nombre del ítem</label>
        <input type="text" id="nuevo-tipo" placeholder="Ej: Riel superior 2 vías">
        <label id="nuevo-color-label">Color</label>
        <input type="text" id="nuevo-color" placeholder="Ej: Blanco">
        <label>Unidad</label>
        <input type="text" id="nuevo-unidad" placeholder="Ej: barras, unidades, galones">
        <label>Cantidad inicial</label>
        <input type="number" id="nuevo-cantidad" value="0" min="0">
        <label>Costo (por unidad)</label>
        <input type="number" id="nuevo-costo" value="0" min="0" step="0.01">
        <label>Precio de venta (por unidad)</label>
        <input type="number" id="nuevo-venta" value="0" min="0" step="0.01">
        <div class="modal-actions">
            <button style="background:transparent;border:1.5px solid #ddd;color:#888;" onclick="cerrarNuevoItem()">Cancelar</button>
            <button class="btn-agregar" onclick="guardarNuevoItem()">Guardar</button>
        </div>
    </div>
</div>

<script type="module">
    import { requireAuth, auth, signOut } from './auth-common.js';
    import { enableNotifications } from './notifications.js';
    import { db } from './firebase-config.js';
    import {
        collection, addDoc, doc, setDoc, updateDoc, deleteDoc, onSnapshot, increment, serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js';

    // Categorías base fijas + las que se vayan creando desde "+ Nueva categoría"
    // (colección `categoriasInventario`, un doc por categoría con { nombre }).
    const CATEGORIAS_BASE = [
        { key: 'perfil', label: 'Perfiles de aluminio' },
        { key: 'consumible', label: 'Herrajes y consumibles' }
    ];
    let categoriasCustom = [];
    function todasLasCategorias() {
        return [...CATEGORIAS_BASE, ...categoriasCustom.map(c => ({ key: c.id, label: c.nombre }))];
    }
    function poblarSelectCategoria() {
        const sel = document.getElementById('nuevo-categoria');
        if (!sel) return;
        const prev = sel.value;
        sel.innerHTML = todasLasCategorias().map(c => `<option value="${esc(c.key)}">${esc(c.label)}</option>`).join('');
        if ([...sel.options].some(o => o.value === prev)) sel.value = prev;
    }

    // Gerencia (admin) + chofer + instalador + ayudante consumen del inventario. Fábrica/
    // contratista (Alucufel) queda fuera a propósito. Solo admin agrega stock/precio/elimina;
    // el resto (incluidos los ayudantes) solo puede "Tomar".
    const usuario = await requireAuth(['chofer', 'instalador', 'ayudante']);
    const esAdmin = usuario.roles.includes('admin');
    document.getElementById('user-name').textContent = usuario.nombre;
    document.getElementById('signout-btn').onclick = () => signOut(auth);
    document.getElementById('notif-btn').onclick = () => enableNotifications(document.getElementById('notif-btn'));
    if (esAdmin) document.getElementById('admin-tools').style.display = 'flex';
    // El botón "Volver" lleva a cada quien a SU inicio (el panel es solo de admin): así un
    // ayudante/instalador/chofer no cae en el Panel de Control y ve "Sin autorización".
    (function () {
        const home = esAdmin ? 'index.html'
            : usuario.roles.includes('ayudante') ? 'ayudante.html'
            : usuario.roles.includes('instalador') ? 'instalacion.html'
            : 'index.html';
        const b = document.getElementById('btn-back');
        if (b) b.setAttribute('href', home);
    })();

    function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }

    const PERFILES_SEED = [
        { tipo: 'Tubo 100x45 (1 3/4"x4")', unidad: 'barras' },
        { tipo: 'Tubo 100x100 (4"x4")', unidad: 'barras' },
        { tipo: 'Moldura U 3/8"', unidad: 'barras' },
        { tipo: 'Angular 25x25', unidad: 'barras' },
        { tipo: 'Angular 20x20', unidad: 'barras' }
    ];
    const COLORES_SEED = ['Blanco', 'Negro', 'Grafito', 'Plata'];
    const CONSUMIBLES_SEED = [
        { tipo: 'Silicón', unidad: 'tubos' },
        { tipo: 'Masilla', unidad: 'galones' },
        { tipo: 'Uretano', unidad: 'galones' },
        { tipo: 'Discos de corte', unidad: 'unidades' },
        { tipo: 'Mechas de metal', unidad: 'unidades' },
        { tipo: 'Mechas de concreto', unidad: 'unidades' },
        { tipo: 'Tornillos', unidad: 'cajas' }
    ];
    const SELLANTES_SEED = [
        { categoria: 'silicon', nombreCategoria: 'Silicón', items: [
            { tipo: 'Silicón Negro', unidad: 'tubos' },
            { tipo: 'Silicón Blanco', unidad: 'tubos' },
            { tipo: 'Silicón Transparente', unidad: 'tubos' }
        ] },
        { categoria: 'urethano', nombreCategoria: 'Urethano', items: [
            { tipo: 'Urethano Blanco', unidad: 'galones' },
            { tipo: 'Urethano Negro', unidad: 'galones' }
        ] },
        { categoria: 'masilla', nombreCategoria: 'Masilla', items: [
            { tipo: 'Masilla Siliconizada Blanca', unidad: 'galones' },
            { tipo: 'Masilla Negra', unidad: 'galones' }
        ] }
    ];

    let allItems = [];

    function money(n) {
        return 'RD$ ' + Number(n || 0).toLocaleString('es-DO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function itemCardHTML(item) {
        const low = item.cantidad <= 0;
        const label = item.color ? `${esc(item.tipo)} — ${esc(item.color)}` : esc(item.tipo);
        const costo = Number(item.costo || 0);
        const venta = Number(item.venta || 0);
        const margen = venta - costo;
        const margenPct = costo > 0 ? Math.round((margen / costo) * 100) : null;
        return `
        <div class="item-card ${low ? 'low' : ''}">
            <div class="item-head">
                <b>${label}</b>
                <span class="item-qty">${item.cantidad} <span class="unidad">${esc(item.unidad)}</span></span>
            </div>
            ${esAdmin ? `
            <div class="item-precios">
                <span class="costo">Costo: ${money(costo)}</span>
                <span class="venta">Venta: ${money(venta)}</span>
                ${margenPct !== null ? `<span class="margen">Margen: ${money(margen)} (${margenPct}%)</span>` : ''}
            </div>` : ''}
            <div class="item-actions">
                <button class="btn-tomar" onclick="abrirTomar('${item.id}')">📤 Tomar</button>
                ${esAdmin ? `<button class="btn-agregar" onclick="abrirAgregar('${item.id}')">📥 Agregar stock</button>` : ''}
                ${esAdmin ? `<button class="btn-precio" onclick="abrirPrecio('${item.id}')">💲 Precio</button>` : ''}
                ${esAdmin ? `<button class="btn-eliminar" onclick="abrirEliminar('${item.id}')">🗑 Eliminar</button>` : ''}
            </div>
            <div class="inline-form" id="tomar-${item.id}">
                <label>Cantidad a tomar</label>
                <input type="number" id="tomar-cant-${item.id}" min="1" value="1">
                <label>¿Para qué obra/motivo?</label>
                <input type="text" id="tomar-nota-${item.id}" placeholder="Ej: Obra Gisell - Spirit de las Terrenas">
                <div class="row-actions">
                    <button style="background:transparent;border:1.5px solid #ddd;color:#888;" onclick="cerrarForm('tomar-${item.id}')">Cancelar</button>
                    <button class="btn-tomar" onclick="confirmarTomar('${item.id}')">Confirmar</button>
                </div>
            </div>
            ${esAdmin ? `
            <div class="inline-form" id="agregar-${item.id}">
                <label>Cantidad a agregar</label>
                <input type="number" id="agregar-cant-${item.id}" min="1" value="1">
                <div class="row-actions">
                    <button style="background:transparent;border:1.5px solid #ddd;color:#888;" onclick="cerrarForm('agregar-${item.id}')">Cancelar</button>
                    <button class="btn-agregar" onclick="confirmarAgregar('${item.id}')">Confirmar</button>
                </div>
            </div>
            <div class="inline-form" id="precio-${item.id}">
                <label>Costo (por ${esc(item.unidad)})</label>
                <input type="number" id="precio-costo-${item.id}" min="0" step="0.01" value="${costo}">
                <label>Precio de venta (por ${esc(item.unidad)})</label>
                <input type="number" id="precio-venta-${item.id}" min="0" step="0.01" value="${venta}">
                <div class="row-actions">
                    <button style="background:transparent;border:1.5px solid #ddd;color:#888;" onclick="cerrarForm('precio-${item.id}')">Cancelar</button>
                    <button class="btn-precio" onclick="confirmarPrecio('${item.id}')">Guardar</button>
                </div>
            </div>
            <div class="inline-form eliminar-form" id="eliminar-${item.id}">
                <p style="margin:0 0 6px;font-size:13px;color:#c0392b;font-weight:bold;">⚠ ¿Eliminar "${label}" del catálogo?</p>
                <p style="margin:0 0 8px;font-size:12px;color:#666;">Esta acción no se puede deshacer. El historial de movimientos de este ítem no se borra.</p>
                <div class="row-actions">
                    <button style="background:transparent;border:1.5px solid #ddd;color:#888;" onclick="cerrarForm('eliminar-${item.id}')">Cancelar</button>
                    <button class="btn-eliminar" onclick="confirmarEliminar('${item.id}')">Sí, eliminar definitivamente</button>
                </div>
            </div>` : ''}
        </div>`;
    }

    function render() {
        const term = document.getElementById('search-input').value.trim().toLowerCase();
        const filtered = allItems.filter(it => {
            if (!term) return true;
            return ((it.tipo || '') + ' ' + (it.color || '')).toLowerCase().includes(term);
        });

        const container = document.getElementById('categorias-container');
        container.innerHTML = todasLasCategorias().map(cat => {
            const items = filtered.filter(it => it.categoria === cat.key);
            return `
            <h2 class="section-title">${esc(cat.label)}</h2>
            <div id="cat-list-${esc(cat.key)}">
                ${items.length ? items.map(itemCardHTML).join('') : '<p class="empty">No hay ítems en esta categoría todavía.</p>'}
            </div>`;
        }).join('');

        if (esAdmin) {
            const perfiles = filtered.filter(it => it.categoria === 'perfil');
            const seedBtn = document.getElementById('seed-btn');
            if (seedBtn) seedBtn.style.display = perfiles.length ? 'none' : 'block';

            const yaTieneSellantes = ['silicon', 'urethano', 'masilla'].some(k => categoriasCustom.some(c => c.id === k));
            const seedBtnSellantes = document.getElementById('seed-btn-sellantes');
            if (seedBtnSellantes) seedBtnSellantes.style.display = yaTieneSellantes ? 'none' : 'block';
        }
    }

    document.getElementById('search-input').addEventListener('input', render);

    onSnapshot(collection(db, 'categoriasInventario'), (snap) => {
        categoriasCustom = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        poblarSelectCategoria();
        render();
    });

    onSnapshot(collection(db, 'inventario'), (snap) => {
        allItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        allItems.sort((a, b) => (a.tipo + (a.color || '')).localeCompare(b.tipo + (b.color || '')));
        render();
    }, (err) => {
        document.getElementById('categorias-container').innerHTML = '<p class="empty">Error cargando inventario: ' + err.message + '</p>';
    });

    poblarSelectCategoria();

    window.crearCategoria = async function () {
        const nombre = (prompt('Nombre de la nueva categoría (ej: Vidrios, Sellantes…):') || '').trim();
        if (!nombre) return;
        const yaExiste = todasLasCategorias().some(c => c.label.toLowerCase() === nombre.toLowerCase());
        if (yaExiste) { alert('Ya existe una categoría con ese nombre.'); return; }
        try {
            const ref_ = await addDoc(collection(db, 'categoriasInventario'), { nombre, creadoFecha: serverTimestamp() });
            categoriasCustom.push({ id: ref_.id, nombre });
            poblarSelectCategoria();
            document.getElementById('nuevo-categoria').value = ref_.id;
        } catch (e) {
            alert('No se pudo crear la categoría: ' + e.message);
        }
    };

    window.sembrarCatalogo = async function () {
        if (!confirm('¿Crear el catálogo inicial de perfiles (5 tipos x 4 colores)? Solo hace falta una vez.')) return;
        try {
            for (const p of PERFILES_SEED) {
                for (const color of COLORES_SEED) {
                    await addDoc(collection(db, 'inventario'), {
                        tipo: p.tipo, color, categoria: 'perfil', unidad: p.unidad, cantidad: 0,
                        costo: 0, venta: 0, creadoFecha: serverTimestamp()
                    });
                }
            }
            for (const c of CONSUMIBLES_SEED) {
                await addDoc(collection(db, 'inventario'), {
                    tipo: c.tipo, color: null, categoria: 'consumible', unidad: c.unidad, cantidad: 0,
                    costo: 0, venta: 0, creadoFecha: serverTimestamp()
                });
            }
            alert('Catálogo creado. Ahora usa "Agregar stock" en cada ítem para poner las cantidades reales.');
        } catch (e) {
            alert('No se pudo crear el catálogo: ' + e.message);
        }
    };

    window.sembrarSellantes = async function () {
        if (!confirm('¿Crear las categorías Silicón, Urethano y Masilla con sus variantes? Solo hace falta una vez.')) return;
        try {
            for (const grupo of SELLANTES_SEED) {
                await setDoc(doc(db, 'categoriasInventario', grupo.categoria), { nombre: grupo.nombreCategoria, creadoFecha: serverTimestamp() }, { merge: true });
                for (const it of grupo.items) {
                    await addDoc(collection(db, 'inventario'), {
                        tipo: it.tipo, color: null, categoria: grupo.categoria, unidad: it.unidad, cantidad: 0,
                        costo: 0, venta: 0, creadoFecha: serverTimestamp()
                    });
                }
            }
            alert('Categorías creadas. Ahora usa "Agregar stock" en cada ítem para poner las cantidades reales.');
        } catch (e) {
            alert('No se pudo crear: ' + e.message);
        }
    };

    window.abrirNuevoItem = function () {
        document.getElementById('nuevo-item-overlay').classList.add('show');
    };
    window.cerrarNuevoItem = function () {
        document.getElementById('nuevo-item-overlay').classList.remove('show');
    };
    window.guardarNuevoItem = async function () {
        const categoria = document.getElementById('nuevo-categoria').value;
        const tipo = document.getElementById('nuevo-tipo').value.trim();
        const color = document.getElementById('nuevo-color').value.trim();
        const unidad = document.getElementById('nuevo-unidad').value.trim() || 'unidades';
        const cantidad = Number(document.getElementById('nuevo-cantidad').value) || 0;
        const costo = Number(document.getElementById('nuevo-costo').value) || 0;
        const venta = Number(document.getElementById('nuevo-venta').value) || 0;
        if (!tipo) { alert('Escribe el nombre del ítem.'); return; }
        try {
            await addDoc(collection(db, 'inventario'), {
                tipo, color: categoria === 'perfil' ? (color || null) : null,
                categoria, unidad, cantidad, costo, venta, creadoFecha: serverTimestamp()
            });
            cerrarNuevoItem();
            document.getElementById('nuevo-tipo').value = '';
            document.getElementById('nuevo-color').value = '';
            document.getElementById('nuevo-cantidad').value = '0';
            document.getElementById('nuevo-costo').value = '0';
            document.getElementById('nuevo-venta').value = '0';
        } catch (e) {
            alert('No se pudo guardar: ' + e.message);
        }
    };

    window.abrirTomar = function (id) {
        cerrarTodosLosForms();
        const el = document.getElementById('tomar-' + id);
        if (el) el.classList.add('show');
    };
    window.abrirAgregar = function (id) {
        cerrarTodosLosForms();
        const el = document.getElementById('agregar-' + id);
        if (el) el.classList.add('show');
    };
    window.abrirPrecio = function (id) {
        cerrarTodosLosForms();
        const el = document.getElementById('precio-' + id);
        if (el) el.classList.add('show');
    };
    window.abrirEliminar = function (id) {
        cerrarTodosLosForms();
        const el = document.getElementById('eliminar-' + id);
        if (el) el.classList.add('show');
    };
    window.cerrarForm = function (elId) {
        const el = document.getElementById(elId);
        if (el) el.classList.remove('show');
    };
    function cerrarTodosLosForms() {
        document.querySelectorAll('.inline-form.show').forEach(el => el.classList.remove('show'));
    }

    window.confirmarTomar = async function (id) {
        const item = allItems.find(it => it.id === id);
        const cantidad = Number(document.getElementById('tomar-cant-' + id).value);
        const nota = document.getElementById('tomar-nota-' + id).value.trim();
        if (!cantidad || cantidad <= 0) { alert('Escribe una cantidad válida.'); return; }
        if (!nota) { alert('Escribe para qué obra o motivo estás tomando este material.'); return; }
        if (cantidad > item.cantidad) {
            if (!confirm(`Solo quedan ${item.cantidad} ${item.unidad}. ¿Tomar de todos modos (quedará en negativo)?`)) return;
        }
        try {
            await updateDoc(doc(db, 'inventario', id), { cantidad: increment(-cantidad) });
            await addDoc(collection(db, 'movimientosInventario'), {
                itemId: id, itemTipo: item.tipo, itemColor: item.color || null,
                tipo: 'consumo', cantidad: -cantidad, nota,
                usuarioNombre: usuario.nombre, usuarioEmail: usuario.email,
                fecha: serverTimestamp()
            });
            cerrarForm('tomar-' + id);
        } catch (e) {
            alert('No se pudo registrar: ' + e.message);
        }
    };

    window.confirmarAgregar = async function (id) {
        const item = allItems.find(it => it.id === id);
        const cantidad = Number(document.getElementById('agregar-cant-' + id).value);
        if (!cantidad || cantidad <= 0) { alert('Escribe una cantidad válida.'); return; }
        try {
            await updateDoc(doc(db, 'inventario', id), { cantidad: increment(cantidad) });
            await addDoc(collection(db, 'movimientosInventario'), {
                itemId: id, itemTipo: item.tipo, itemColor: item.color || null,
                tipo: 'restock', cantidad, nota: 'Reabastecimiento',
                usuarioNombre: usuario.nombre, usuarioEmail: usuario.email,
                fecha: serverTimestamp()
            });
            cerrarForm('agregar-' + id);
        } catch (e) {
            alert('No se pudo registrar: ' + e.message);
        }
    };

    window.confirmarPrecio = async function (id) {
        const costo = Number(document.getElementById('precio-costo-' + id).value) || 0;
        const venta = Number(document.getElementById('precio-venta-' + id).value) || 0;
        try {
            await updateDoc(doc(db, 'inventario', id), { costo, venta });
            cerrarForm('precio-' + id);
        } catch (e) {
            alert('No se pudo guardar el precio: ' + e.message);
        }
    };

    // Doble seguridad: hay que desplegar el aviso rojo (1er clic) y luego, además, confirmar en
    // el diálogo del navegador (2do clic) — así no se borra un ítem por un toque accidental.
    window.confirmarEliminar = async function (id) {
        const item = allItems.find(it => it.id === id);
        if (!item) return;
        const label = item.color ? `${item.tipo} — ${item.color}` : item.tipo;
        if (!confirm(`Confirma de nuevo: ¿eliminar "${label}" del catálogo? Esta acción no se puede deshacer.`)) return;
        try {
            await deleteDoc(doc(db, 'inventario', id));
            await addDoc(collection(db, 'movimientosInventario'), {
                itemId: id, itemTipo: item.tipo, itemColor: item.color || null,
                tipo: 'eliminado', cantidad: 0, nota: 'Ítem eliminado del catálogo',
                usuarioNombre: usuario.nombre, usuarioEmail: usuario.email,
                fecha: serverTimestamp()
            });
        } catch (e) {
            alert('No se pudo eliminar: ' + e.message);
        }
    };
</script>

</body>
</html>
