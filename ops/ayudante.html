<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARTAL — Instalación e Inventario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
    main { max-width: 620px; padding-top: 28px; }
    .welcome { color: var(--artal-blue); font-size: 15px; margin: 0 0 4px; font-weight: bold; }
</style>
</head>
<body>

<header>
    <div class="header-title">
        <img class="logo" src="../logo.png" alt="ARTAL">
        <h1>Instalación e Inventario</h1>
    </div>
    <div class="who">
        <span id="user-name"></span>
        <button id="notif-btn" title="Recibir avisos en este dispositivo">🔔 Notificaciones</button>
        <button id="signout-btn">Cerrar sesión</button>
    </div>
</header>

<main>
    <p class="welcome" id="welcome-msg"></p>
    <div class="grid">
        <a class="card-link" href="instalaciones.html"><div class="emoji">🗺️</div><div class="title">Instalaciones</div><div class="desc">Agenda de obras y GPS a la obra</div></a>
        <a class="card-link" href="inventario.html"><div class="emoji">📦</div><div class="title">Inventario</div><div class="desc">Ver y tomar perfiles, herrajes y consumibles</div></a>
    </div>
</main>

<script type="module">
    import { requireAuth, auth, signOut } from './auth-common.js';
    import { enableNotifications } from './notifications.js';

    const usuario = await requireAuth(['ayudante', 'instalador']);
    document.getElementById('user-name').textContent = usuario.nombre;
    document.getElementById('welcome-msg').textContent = 'Hola, ' + usuario.nombre;
    document.getElementById('signout-btn').onclick = () => signOut(auth);
    document.getElementById('notif-btn').onclick = () => enableNotifications(document.getElementById('notif-btn'));
</script>

</body>
</html>
