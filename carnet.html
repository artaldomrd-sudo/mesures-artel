                cont.querySelectorAll('select').forEach(sel => {
                    const m = (sel.getAttribute('onchange') || '').match(/,\s*'([^']+)'\s*,/);
                    if (m && m[1] && cardsState[id][m[1]] !== undefined && cardsState[id][m[1]] !== '') sel.value = cardsState[id][m[1]];
                });
            }
        }
        if (cardsState[id].locked) generateSummary(id);
        if(!forcedId) saveProgress();
    }

    function deleteCard(id) {
        document.getElementById('card-' + id).remove();
        delete cardsState[id];
        saveProgress();
    }

    function updateState(id, key, value) {
        if (!cardsState[id]) return;
        
        if (key === 'panos' && cardsState[id].categoria === 'fachada') {
            cardsState[id].panos = value;
            let pCount = parseInt(value) || 1;
            cardsState[id].label = pCount === 1 ? 'Paño Fijo' : 'Fachada Fija Multipañó';
            let titleSpan = document.getElementById('title-' + id);
            if(titleSpan) titleSpan.innerText = cardsState[id].label;
            
            const optionsContainer = document.getElementById('options-' + id);
            if (optionsContainer) {
                optionsContainer.innerHTML = getMenuOpciones(id, cardsState[id].categoria, cardsState[id].type, false);
                const selects = optionsContainer.querySelectorAll('select');
                selects.forEach(sel => {
                    let onchangeStr = sel.getAttribute('onchange');
                    if(onchangeStr) {
                        let match = onchangeStr.match(/,\s*'([^']+)'\s*,/);
                        if(match && match[1] && cardsState[id][match[1]] !== undefined) sel.value = cardsState[id][match[1]];
                    }
                });
            }
        } else if (key === 'ancho' || key === 'alto' || key === 'cantidad') {
            cardsState[id][key] = parseInt(String(value).replace(/\D/g, '')) || 0;
        } else {
            cardsState[id][key] = value;
        }
        
        if (cardsState[id].categoria === 'ducha' || cardsState[id].categoria === 'baranda') {
            if (key === 'pose') {
                barandaRecalc(id);
                const b = document.getElementById('baranda-builder-' + id);
                if (b) b.innerHTML = renderBarandaBuilder(id);
            }
            const sc = document.getElementById('schematic-' + id);
            if (sc) sc.innerHTML = renderSVG(id);
        }

        if (cardsState[id].type !== 'draw') {
            if (['panos', 'union', 'bisagras', 'cerradura_tipo', 'cerradura_piso', 'tirador', 'orientacion', 'ancho', 'alto', 'apertura', 'vista', 'color_perfil', 'color_vidrio', 'color_ral'].includes(key)) {
                const container = document.getElementById('schematic-' + id);
                if (container) container.innerHTML = renderSVG(id);
            }
            if (key === 'tipo_aluminio' || key === 'vidrio' || key === 'color_perfil' || key === 'fijacion') {
                const card = document.getElementById('card-' + id);
                if (card) {
                    const optionsContainer = card.querySelector('.config-options');
                    if (optionsContainer) {
                        optionsContainer.innerHTML = getMenuOpciones(id, cardsState[id].categoria, cardsState[id].type, false);
                        const selects = optionsContainer.querySelectorAll('select');
                        selects.forEach(sel => {
                            let onchangeStr = sel.getAttribute('onchange');
                            if(onchangeStr) {
                                let match = onchangeStr.match(/,\s*'([^']+)'\s*,/);
                                if(match && match[1] && cardsState[id][match[1]] !== undefined) sel.value = cardsState[id][match[1]];
                            }
                        });
                    }
                }
            }
        }
        saveProgress();
    }

    function setOrientation(id, side) {
        const card = document.getElementById('card-' + id);
        const btnI = card.querySelector('#btn-i-' + id);
        const btnD = card.querySelector('#btn-d-' + id);
        if(btnI) btnI.className = 'toggle-btn' + (side === 'I' ? ' active' : '');
        if(btnD) btnD.className = 'toggle-btn' + (side === 'D' ? ' active' : '');
        updateState(id, 'orientacion', side);
    }

    // =====================================================================
    //  MOTOR DE RENDER ISOMÉTRICO 3D (ARTAL)
    // =====================================================================
    const ISO_C = 0.866, ISO_S = 0.5;
    const OBL_C = 0.62, OBL_S = 0.42; // proyección oblicua (frontal; la profundidad sube hacia atrás-derecha)

    function isoPt(X, Y, Z) { return [ (X - Z) * ISO_C, (X + Z) * ISO_S - Y ]; }
    function oblPt(px, h, pz) { return [ px + pz * OBL_C, -h - pz * OBL_S ]; }

    // Acabado del perfil/contorno — recolorea todo el contorno azul ARTAL al color elegido
    const FINISHES = {
        natural: { main: '#7c858c', light: '#9aa2a9', dark: '#626a70' }, // plata / aluminio (gris)
        negro:   { main: '#1a1a1a', light: '#3a3a3a', dark: '#000000' },
        grafito: { main: '#54606b', light: '#6f7b87', dark: '#3d4751' }, // gris azulado (antracita)
        blanco:  { main: '#cdd3d7', light: '#e6e9eb', dark: '#b4babf' }, // perfil blanco (gris muy claro)
        madera:  { main: '#6b4a2b', light: '#85613c', dark: '#4d351e' }
    };
    function shade(hex, p) {
        let n = parseInt(hex.slice(1), 16), r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
        const f = x => Math.max(0, Math.min(255, Math.round(x + (p / 100) * 255)));
        return '#' + ((1 << 24) + (f(r) << 16) + (f(g) << 8) + f(b)).toString(16).slice(1);
    }
    function ralHex(ral) { let h = (ral || '').trim(); if (/^#?[0-9a-fA-F]{6}$/.test(h)) return h[0] === '#' ? h : '#' + h; return '#8a8f94'; }
    function finishColors(key, ral) {
        if (key === 'ral') { const h = ralHex(ral); return { main: h, light: shade(h, 12), dark: shade(h, -22) }; }
        return FINISHES[key];
    }
    function applyFinish(svg, key, ral) {
        key = key || 'natural';
        const f = finishColors(key, ral);
        if (!f) return svg;
        return svg.split('#0A3D62').join(f.main)
                  .split('#1c5a85').join(f.light)
                  .split('#0d3f5f').join(f.dark)
                  .split('#072c46').join(f.dark);
    }
    // Color del aluminio (relleno) según el acabado — para la base U
    function profileFill(cp, ral) {
        switch (cp) {
            case 'negro': return { fill: '#1f1f1f', stroke: '#000000' };
            case 'grafito': return { fill: '#54606b', stroke: '#3d4751' };
            case 'blanco': return { fill: '#e9ecee', stroke: '#b7bec4' };
            case 'madera': return { fill: '#6b4a2b', stroke: '#4d351e' };
            case 'ral': { const h = ralHex(ral); return { fill: h, stroke: shade(h, -25) }; }
            case 'natural': default: return { fill: '#c9ced3', stroke: '#9aa1a8' }; // plata / aluminio
        }
    }
    function roundFit(cx, cy, r) { return `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${r.toFixed(1)}" fill="#0A3D62"/><circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${(r * 0.42).toFixed(1)}" fill="#cdd9e3"/>`; }
    function ptStr(p) { return p[0].toFixed(2) + ',' + p[1].toFixed(2); }
    function polyFrom(pts, attrs) { return `<polygon points="${pts.map(ptStr).join(' ')}" ${attrs}/>`; }
    function newBox() { return { minX: 1e9, minY: 1e9, maxX: -1e9, maxY: -1e9 }; }
    function extBox(b, p) { if (p[0] < b.minX) b.minX = p[0]; if (p[0] > b.maxX) b.maxX = p[0]; if (p[1] < b.minY) b.minY = p[1]; if (p[1] > b.maxY) b.maxY = p[1]; }

    // Paradas del degradado según el color/tipo de vidrio (tiñe el vidrio, no el borde)
    function glassFillStops(color) {
        switch (color) {
            case 'negro': // negro / transparente (vidrio ahumado)
                return [['0%', '#7b828a', '0.62'], ['50%', '#4a5057', '0.6'], ['100%', '#2b3036', '0.64']];
            case 'azul': // azul / transparente
                return [['0%', '#cfe9fb', '0.6'], ['50%', '#86bdea', '0.62'], ['100%', '#4f93d1', '0.66']];
            case 'esmerilado': // esmerilado / opaco
                return [['0%', '#eceff1', '0.97'], ['50%', '#e0e5e9', '0.97'], ['100%', '#d3dadf', '0.98']];
            case 'natural':
            default: // natural / transparente
                return [['0%', '#eef5fb', '0.72'], ['45%', '#d4e3f0', '0.55'], ['100%', '#bcd4e7', '0.6']];
        }
    }
    function glassDefs(uid, color) {
        const stops = glassFillStops(color).map(s => `<stop offset="${s[0]}" stop-color="${s[1]}" stop-opacity="${s[2]}"/>`).join('');
        return `<defs>
            <linearGradient id="glass-${uid}" x1="0%" y1="0%" x2="100%" y2="100%">${stops}</linearGradient>
            <filter id="shadow-${uid}" x="-40%" y="-40%" width="180%" height="180%">
                <feDropShadow dx="2" dy="4" stdDeviation="2.4" flood-color="#0A3D62" flood-opacity="0.28"/>
            </filter>
        </defs>`;
    }

    // Panel plano con vidrio sombreado + un borde fino que simboliza el espesor (no perspectiva completa)
    function extrudedPanel(uid, x, y, w, h) {
        const t = 2.5; // grosor visual del marco/vidrio
        const x2 = x + w, y2 = y + h;
        let s = '';
        // vidrio con sombra suave
        s += `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="url(#glass-${uid})" stroke="none" filter="url(#shadow-${uid})"/>`;
        // borde de espesor: cara derecha e inferior
        s += polyFrom([[x2, y], [x2 + t, y + t], [x2 + t, y2 + t], [x2, y2]], 'fill="#1c5a85" stroke="#0A3D62" stroke-width="0.4"');
        s += polyFrom([[x, y2], [x2, y2], [x2 + t, y2 + t], [x + t, y2 + t]], 'fill="#0d3f5f" stroke="#0A3D62" stroke-width="0.4"');
        // reflejo de vidrio (dos franjas diagonales translúcidas)
        s += glassReflection(x, y, w, h);
        return s;
    }

    // Reflejo de vidrio: franjas diagonales suaves (en lugar de una sola línea)
    function glassReflection(x, y, w, h) {
        const band = (ox, ww, op) => {
            const x1 = x + w * ox, x2 = x1 + w * ww, sk = w * 0.16;
            return `<polygon points="${x1.toFixed(1)},${(y + h).toFixed(1)} ${x2.toFixed(1)},${(y + h).toFixed(1)} ${(x2 + sk).toFixed(1)},${y.toFixed(1)} ${(x1 + sk).toFixed(1)},${y.toFixed(1)}" fill="#ffffff" fill-opacity="${op}" stroke="none"/>`;
        };
        return band(0.12, 0.07, 0.16) + band(0.24, 0.022, 0.30);
    }

    // Panel de VIDRIO sin marco (mampara/puerta de vidrio): canto fino translúcido en vez de borde oscuro
    function glassOnlyPanel(uid, x, y, w, h) {
        const t = 1.8; // canto de vidrio
        const x2 = x + w, y2 = y + h;
        let s = '';
        s += `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="url(#glass-${uid})" stroke="none" filter="url(#shadow-${uid})"/>`;
        // canto del vidrio (claro translúcido, no marco)
        s += polyFrom([[x2, y], [x2 + t, y + t], [x2 + t, y2 + t], [x2, y2]], 'fill="#a9c6dc" fill-opacity="0.65" stroke="#86a8c4" stroke-width="0.3"');
        s += polyFrom([[x, y2], [x2, y2], [x2 + t, y2 + t], [x + t, y2 + t]], 'fill="#9bbbd2" fill-opacity="0.65" stroke="#86a8c4" stroke-width="0.3"');
        s += glassReflection(x, y, w, h);
        return s;
    }

    // Pared moderna: bloque con sombreado arquitectónico (hatch diagonal), color neutro (no cambia con el acabado)
    function wallBlock(uid, x, y, w, h) {
        const cid = `wc-${uid}-${Math.round(x)}`;
        let s = `<clipPath id="${cid}"><rect x="${x}" y="${y}" width="${w}" height="${h}"/></clipPath>`;
        s += `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="1" fill="#eceef1" stroke="#8b95a0" stroke-width="1.3"/>`;
        s += `<g clip-path="url(#${cid})">`;
        for (let d = -h; d <= w; d += 4) {
            s += `<line x1="${(x + d).toFixed(1)}" y1="${(y + h).toFixed(1)}" x2="${(x + d + h).toFixed(1)}" y2="${y}" stroke="#c2cad1" stroke-width="0.7"/>`;
        }
        s += `</g>`;
        return s;
    }

    function getPanelRects(state) {
        const t = state.type, isD = state.orientacion === 'D';
        switch (t) {
            case 'cor2': case 'cor3': case 'cor4_cent': case 'cor4_lat': case 'cor6_cent': case 'cor6_lat':
                return [[10, 10, 80, 40]];
            case 'gal1': return [isD ? [10, 10, 70, 40] : [20, 10, 70, 40]];
            case 'gal2_lat': return [isD ? [10, 10, 70, 40] : [20, 10, 70, 40]];
            case 'gal2_cent': return [[20, 10, 60, 40]];
            case 'gal3_3v': return [isD ? [5, 10, 75, 40] : [20, 10, 75, 40]];
            case 'gal4_2v': return [[20, 10, 60, 40]];
            case 'gal4_4v': return [isD ? [0, 10, 80, 40] : [20, 10, 80, 40]];
            case 'gal6_3v': return [[20, 10, 60, 40]];
            case 'win_proy': case 'win_souf': return [[25, 15, 50, 30]];
            case 'win_abat': case 'win_ob': return [[30, 10, 40, 40]];
            case 'door_abat': return [[35, 5, 30, 50]];
            case 'mamp_fija': return [[30, 5, 40, 50]];
            case 'door_glass': return [[30, 5, 40, 50]];
            case 'fachada_din': return [[10, 5, 80, 50]];
        }
        return [];
    }

    function wrapIso(uid, inner, box, pad, color) {
        pad = pad || 60;
        const w = (box.maxX - box.minX) + 2 * pad;
        const h = (box.maxY - box.minY) + 2 * pad;
        const vb = `${(box.minX - pad).toFixed(1)} ${(box.minY - pad).toFixed(1)} ${w.toFixed(1)} ${h.toFixed(1)}`;
        return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${vb}" preserveAspectRatio="xMidYMid meet" width="100%" height="100%">`
            + glassDefs(uid, color)
            + `<style>polygon,rect,line,path,circle{vector-effect:non-scaling-stroke}</style>`
            + inner + `</svg>`;
    }

    // Núcleo compartido: recorrido de paneles de vidrio en planta, extruidos en altura (mm reales)
    function renderGlassRun(uid, segs, H, opts) {
        opts = opts || {};
        const box = newBox();
        const baseH = opts.base ? (opts.baseH || H * 0.06) : 0;
        // orden de pintado: de atrás (menor x+z) hacia adelante
        const order = segs.map((s, i) => i).sort((a, b) =>
            (segs[a].x1 + segs[a].z1 + segs[a].x2 + segs[a].z2) - (segs[b].x1 + segs[b].z1 + segs[b].x2 + segs[b].z2));
        let inner = '';
        order.forEach(i => {
            const s = segs[i];
            const y0 = baseH;
            const B1 = oblPt(s.x1, y0, s.z1), B2 = oblPt(s.x2, y0, s.z2);
            const T1 = oblPt(s.x1, y0 + H, s.z1), T2 = oblPt(s.x2, y0 + H, s.z2);
            [B1, B2, T1, T2].forEach(p => extBox(box, p));
            // base de aluminio en U (perfil inferior con grosor)
            if (opts.base) {
                const b1 = oblPt(s.x1, 0, s.z1), b2 = oblPt(s.x2, 0, s.z2);
                const bt1 = oblPt(s.x1, baseH, s.z1), bt2 = oblPt(s.x2, baseH, s.z2);
                [b1, b2].forEach(p => extBox(box, p));
                inner += polyFrom([b1, b2, bt2, bt1], 'fill="#0A3D62" stroke="#072c46" stroke-width="1.2"');
            }
            // vidrio
            inner += polyFrom([B1, B2, T2, T1], `fill="url(#glass-${uid})" stroke="#0A3D62" stroke-width="1.6" stroke-linejoin="round"`);
            // reflejo
            inner += `<line x1="${(B1[0] + (T1[0] - B1[0]) * 0.0).toFixed(1)}" y1="${B1[1].toFixed(1)}" x2="${T1[0].toFixed(1)}" y2="${T1[1].toFixed(1)}" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>`;
            // conectores (insertados, nunca en los bordes del vidrio)
            if (opts.connectors && opts.connectors !== 'none') {
                const len = Math.hypot(s.x2 - s.x1, s.z2 - s.z1);
                const m = Math.max(2, Math.round(len / 1100));
                for (let k = 0; k < m; k++) {
                    const f = (k + 0.5) / m; // posiciones interiores, separadas de los extremos
                    const px = s.x1 + (s.x2 - s.x1) * f;
                    const pz = s.z1 + (s.z2 - s.z1) * f;
                    if (opts.connectors === 'doble') {
                        // placa lateral: pletina vertical con dos pernos, en la parte baja
                        const pw = Math.max(7, H * 0.05);
                        const cTop = oblPt(px, y0 + H * 0.34, pz), cBot = oblPt(px, y0 + H * 0.10, pz);
                        inner += `<rect x="${(cTop[0] - pw / 2).toFixed(1)}" y="${cTop[1].toFixed(1)}" width="${pw.toFixed(1)}" height="${(cBot[1] - cTop[1]).toFixed(1)}" rx="${(pw * 0.3).toFixed(1)}" fill="#0A3D62"/>`;
                        const br = pw * 0.2;
                        inner += `<circle cx="${cTop[0].toFixed(1)}" cy="${(cTop[1] + (cBot[1] - cTop[1]) * 0.28).toFixed(1)}" r="${br.toFixed(1)}" fill="#cdd9e3"/>`;
                        inner += `<circle cx="${cTop[0].toFixed(1)}" cy="${(cTop[1] + (cBot[1] - cTop[1]) * 0.72).toFixed(1)}" r="${br.toFixed(1)}" fill="#cdd9e3"/>`;
                    } else {
                        // conector puntual: disco/botón redondo en la parte baja
                        const q = oblPt(px, y0 + H * 0.12, pz);
                        inner += roundFit(q[0], q[1], Math.max(4, H * 0.045));
                    }
                }
            }
        });
        return { inner, box };
    }

    // ---- CABINA DE DUCHA ----
    function renderDucha(state, id) {
        const uid = id;
        const A = state.ancho > 0 ? state.ancho : 1000;
        const H = state.alto > 0 ? state.alto : 1900;
        if (state.forma === 'angulo') return renderDuchaCorner(state, id);
        const usePerfil = state.fijacion === 'perfil';
        const conn = usePerfil ? 'none' : (state.fijacion === 'bisagra' ? 'simple' : 'doble');
        const segs = [{ x1: 0, z1: 0, x2: A, z2: 0 }];
        const r = renderGlassRun(uid, segs, H, { base: usePerfil, baseH: H * 0.04, connectors: conn });
        let inner = r.inner;
        // forma 'panel': línea de puerta + tiradores
        if (state.forma === 'panel') {
            const dx = A * 0.55;
            const top = oblPt(dx, H, 0), bot = oblPt(dx, 0, 0);
            inner += `<line x1="${top[0].toFixed(1)}" y1="${top[1].toFixed(1)}" x2="${bot[0].toFixed(1)}" y2="${bot[1].toFixed(1)}" stroke="#0A3D62" stroke-width="1.4"/>`;
            const h1 = oblPt(dx + A * 0.05, H * 0.56, 0), h2 = oblPt(dx + A * 0.05, H * 0.44, 0);
            inner += roundFit(h1[0], h1[1], H * 0.02) + roundFit(h2[0], h2[1], H * 0.02);
        }
        return wrapIso(uid, inner, r.box, 80, state.color_vidrio);
    }

    // Cabina de ducha en ángulo (esquina) — reproduce el "libro abierto" simétrico
    function renderDuchaCorner(state, id) {
        const uid = id;
        const A = state.ancho > 0 ? state.ancho : 1800;
        const H = state.alto > 0 ? state.alto : 1900;
        const D = state.ancho2 > 0 ? state.ancho2 : Math.round(A * 0.6);
        const W = A / 2;
        const P = (X, Y, Z) => [X * 0.92, Z * 0.5 - Y];
        const box = newBox();
        const conn = state.fijacion !== 'perfil';
        // nodos en planta (x, z): c=esquina frontal, le/re extremos, lm/rm divisiones
        const c = [0, 0], lm = [-W / 2, D / 2], le = [-W, D], rm = [W / 2, D / 2], re = [W, D];
        function panel(p1, p2, glass) {
            const B1 = P(p1[0], 0, p1[1]), B2 = P(p2[0], 0, p2[1]);
            const T1 = P(p1[0], H, p1[1]), T2 = P(p2[0], H, p2[1]);
            [B1, B2, T1, T2].forEach(q => extBox(box, q));
            const fill = glass ? `url(#glass-${uid})` : '#d3dce2';
            const op = glass ? 1 : 0.65;
            let s = polyFrom([B1, B2, T2, T1], `fill="${fill}" fill-opacity="${op}" stroke="#0A3D62" stroke-width="1.6" stroke-linejoin="round"`);
            s += `<line x1="${B1[0].toFixed(1)}" y1="${B1[1].toFixed(1)}" x2="${T1[0].toFixed(1)}" y2="${T1[1].toFixed(1)}" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.5"/>`;
            return s;
        }
        let inner = '';
        // de atrás (exteriores) al frente (interiores, junto a la esquina)
        inner += panel(le, lm, false);
        inner += panel(re, rm, false);
        inner += panel(lm, c, true);
        inner += panel(rm, c, true);
        // conectores redondos insertados: 2 arriba + 2 abajo por panel
        if (conn) {
            const r = Math.max(4, A * 0.016);
            [[le, lm], [lm, c], [c, rm], [rm, re]].forEach(seg => {
                [0.18, 0.82].forEach(f => {
                    const px = seg[0][0] + (seg[1][0] - seg[0][0]) * f;
                    const pz = seg[0][1] + (seg[1][1] - seg[0][1]) * f;
                    const top = P(px, H * 0.88, pz), bot = P(px, H * 0.12, pz);
                    inner += roundFit(top[0], top[1], r) + roundFit(bot[0], bot[1], r);
                });
            });
        }
        // tiradores de puerta (paneles interiores, junto a la esquina central)
        const rr = Math.max(3, A * 0.012);
        const pl1 = P(-W * 0.10, H * 0.54, D * 0.05), pl2 = P(-W * 0.10, H * 0.44, D * 0.05);
        const pr1 = P(W * 0.10, H * 0.54, D * 0.05), pr2 = P(W * 0.10, H * 0.44, D * 0.05);
        inner += roundFit(pl1[0], pl1[1], rr) + roundFit(pl2[0], pl2[1], rr) + roundFit(pr1[0], pr1[1], rr) + roundFit(pr2[0], pr2[1], rr);
        return wrapIso(uid, inner, box, 70, state.color_vidrio);
    }

    // ====================== BARANDA DE VIDRIO ======================
    function herrajeColors(state) {
        const c = state.herraje_color || 'cromado';
        if (c === 'negro') return { fill: '#1f1f1f', stroke: '#000000', hi: '#5a5a5a' };
        return { fill: '#c2cad1', stroke: '#7d868f', hi: '#ffffff' }; // cromado (inox)
    }
    function discFit(p, r, col) {
        return `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${r.toFixed(1)}" fill="${col.fill}" stroke="${col.stroke}" stroke-width="1"/>`
            + `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${(r * 0.38).toFixed(1)}" fill="${col.hi}"/>`;
    }
    function squareFit(p, sz, col) {
        return `<rect x="${(p[0] - sz / 2).toFixed(1)}" y="${(p[1] - sz / 2).toFixed(1)}" width="${sz.toFixed(1)}" height="${sz.toFixed(1)}" rx="1" fill="${col.fill}" stroke="${col.stroke}" stroke-width="1"/>`
            + `<rect x="${(p[0] - sz * 0.16).toFixed(1)}" y="${(p[1] - sz * 0.16).toFixed(1)}" width="${(sz * 0.32).toFixed(1)}" height="${(sz * 0.32).toFixed(1)}" fill="${col.hi}"/>`;
    }
    function reflectionLine(B1, T1) {
        return `<line x1="${B1[0].toFixed(1)}" y1="${B1[1].toFixed(1)}" x2="${T1[0].toFixed(1)}" y2="${T1[1].toFixed(1)}" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>`;
    }

    // Dibuja base / conectores a lo largo del borde inferior (s -> e en modelo) con la proyección P
    // lift = separación entre el suelo y el borde inferior del vidrio (para prensa de suelo)
    function emitFixings(P, s, e, H, state, box, phase, lift) {
        lift = lift || 0;
        const fij = state.fijacion || 'base_u';
        const col = herrajeColors(state);
        const baseH = H * 0.055;
        let out = '';
        const at = (f, hh) => P(s.x + (e.x - s.x) * f, s.y + (e.y - s.y) * f + hh, s.z + (e.z - s.z) * f);

        // FASE 'base' (detrás del vidrio): solo la base de aluminio en U (color = acabado del perfil)
        if (phase === 'base') {
            if (fij === 'base_u') {
                const pf = profileFill(state.color_perfil, state.color_ral);
                const a1 = P(s.x, s.y, s.z), a2 = P(e.x, e.y, e.z);
                const b1 = P(s.x, s.y - baseH, s.z), b2 = P(e.x, e.y - baseH, e.z);
                if (box) [a1, a2, b1, b2].forEach(p => extBox(box, p));
                out += polyFrom([a1, a2, b2, b1], `fill="${pf.fill}" stroke="${pf.stroke}" stroke-width="1.2"`);
            }
            return out;
        }

        // FASE 'conn' (sobre el vidrio): conectores / prensa
        if (fij === 'base_u') return '';

        const len = Math.hypot(e.x - s.x, e.y - s.y, e.z - s.z);
        const m = Math.max(2, Math.round(len / 1100));
        for (let k = 0; k < m; k++) {
            const f = (k + 0.5) / m;
            if (fij === 'prensa_suelo') {
                // Poste de suelo que sube por DELANTE del vidrio (proporcional a la altura)
                const spigotH = Math.max(H * 0.2, 200);
                const floorP = at(f, -lift);                 // apoyo en el suelo (y=0)
                const topP = at(f, spigotH - lift);          // punta del poste
                const cx = floorP[0];
                const yF = floorP[1], yT = topP[1];          // yF (suelo) abajo, yT (punta) arriba
                const sw = Math.max(H * 0.06, 60), fw = sw * 1.6, fh = spigotH * 0.14, ch = sw * 0.4;
                const top = yT;
                const pts = [
                    [cx - fw / 2, yF], [cx + fw / 2, yF], [cx + fw / 2, yF - fh],
                    [cx + sw / 2, yF - fh], [cx + sw / 2, top + ch], [cx + sw / 2 - ch, top],
                    [cx - sw / 2 + ch, top], [cx - sw / 2, top + ch], [cx - sw / 2, yF - fh],
                    [cx - fw / 2, yF - fh]
                ];
                out += polyFrom(pts, `fill="${col.fill}" stroke="${col.stroke}" stroke-width="1" stroke-linejoin="round"`);
                out += `<line x1="${(cx - sw * 0.2).toFixed(1)}" y1="${(top + ch + 2).toFixed(1)}" x2="${(cx - sw * 0.2).toFixed(1)}" y2="${(yF - fh - 2).toFixed(1)}" stroke="${col.hi}" stroke-width="1.5" stroke-opacity="0.7"/>`;
            } else if (fij === 'conector_redondo') {
                const r = Math.max(4, H * 0.04);
                out += discFit(at(f, H * 0.30), r, col) + discFit(at(f, H * 0.12), r, col);
            } else if (fij === 'conector_cuadrado') {
                const sz = Math.max(7, H * 0.075);
                out += squareFit(at(f, H * 0.30), sz, col) + squareFit(at(f, H * 0.12), sz, col);
            } else if (fij === 'conector_doble') {
                const pw = Math.max(7, H * 0.05);
                const cTop = at(f, H * 0.34), cBot = at(f, H * 0.10);
                const yTop = Math.min(cTop[1], cBot[1]), hh = Math.abs(cBot[1] - cTop[1]);
                out += `<rect x="${(cTop[0] - pw / 2).toFixed(1)}" y="${yTop.toFixed(1)}" width="${pw.toFixed(1)}" height="${hh.toFixed(1)}" rx="${(pw * 0.3).toFixed(1)}" fill="${col.fill}" stroke="${col.stroke}" stroke-width="0.8"/>`;
                const br = pw * 0.2;
                const m1 = at(f, H * 0.16), m2 = at(f, H * 0.28);
                out += `<circle cx="${m1[0].toFixed(1)}" cy="${m1[1].toFixed(1)}" r="${br.toFixed(1)}" fill="${col.hi}"/>`;
                out += `<circle cx="${m2[0].toFixed(1)}" cy="${m2[1].toFixed(1)}" r="${br.toFixed(1)}" fill="${col.hi}"/>`;
            }
        }
        return out;
    }

    function barandaPlanSegs(tramos) {
        let x = 0, z = 0, h = 0;
        const segs = [];
        (tramos || []).forEach((t, i) => {
            // el giro se aplica también al primer tramo (orienta el inicio)
            const ang = ((parseFloat(t.angulo) || 90)) * Math.PI / 180;
            if (t.giro === 'der') h += ang;
            else if (t.giro === 'izq') h -= ang;
            const L = parseFloat(t.L) || 1000;
            const nx = x + Math.cos(h) * L;
            const nz = z + Math.sin(h) * L;
            segs.push({ x1: x, z1: z, x2: nx, z2: nz });
            x = nx; z = nz;
        });
        if (!segs.length) segs.push({ x1: 0, z1: 0, x2: 1000, z2: 0 });
        return segs;
    }

    // Vista plana (balcón) — proyección oblicua: tramos rectos = frontal; los giros se alejan hacia arriba-derecha
    function renderBarandaFlat(uid, segs, H, state) {
        const box = newBox();
        const P = (X, Y, Z) => oblPt(X, Y, Z);
        const gap = segs.length > 1 ? 0.025 : 0; // separación visible entre paños
        const order = segs.map((s, i) => i).sort((a, b) => {
            const za = segs[a].z1 + segs[a].z2, zb = segs[b].z1 + segs[b].z2;
            if (zb !== za) return zb - za;               // los lejanos (mayor z) primero
            return (segs[b].x1 + segs[b].x2) - (segs[a].x1 + segs[a].x2);
        });
        // prensa de suelo: el vidrio queda elevado y los postes llegan al suelo
        const lift = state.fijacion === 'prensa_suelo' ? Math.max(H * 0.09, 95) : 0;
        let inner = '';
        order.forEach(i => {
            const s = segs[i];
            const dx = s.x2 - s.x1, dz = s.z2 - s.z1;
            const ax = s.x1 + dx * gap, az = s.z1 + dz * gap;
            const bx = s.x2 - dx * gap, bz = s.z2 - dz * gap;
            const B1 = P(ax, lift, az), B2 = P(bx, lift, bz), T1 = P(ax, lift + H, az), T2 = P(bx, lift + H, bz);
            [B1, B2, T1, T2].forEach(p => extBox(box, p));
            if (lift) { extBox(box, P(ax, 0, az)); extBox(box, P(bx, 0, bz)); }
            // base de aluminio U: usa el tramo COMPLETO (corrida/continua, sin la separación del vidrio)
            inner += emitFixings(P, { x: s.x1, y: lift, z: s.z1 }, { x: s.x2, y: lift, z: s.z2 }, H, state, box, 'base', lift);
            inner += polyFrom([B1, B2, T2, T1], `fill="url(#glass-${uid})" stroke="#0A3D62" stroke-width="1.6" stroke-linejoin="round"`);
            inner += reflectionLine(B1, T1);
            inner += emitFixings(P, { x: ax, y: lift, z: az }, { x: bx, y: lift, z: bz }, H, state, box, 'conn', lift);
        });
        return { inner, box };
    }

    // Vista en escalera — ISOMÉTRICA 3D real: tramos en pendiente, plataformas planas (descansillo),
    // giros doblan en esquina. Sirve para escaleras rectas, con plataforma o de varios pisos.
    function renderBarandaStairs(uid, tramos, H, state) {
        const slope = 0.5;                       // pendiente de los tiros
        const OC = 0.55, OS = 0.32;              // proyección oblicua: X=horizontal, Y=altura, Z=profundidad
        const P = (X, Y, Z) => [X + Z * OC, Z * OS - Y];
        const lift = state.fijacion === 'prensa_suelo' ? Math.max(H * 0.09, 95) : 0;
        let x = 0, y = 0, z = 0, h = 0;
        const flights = [];
        tramos.forEach(t => {
            const ang = ((parseFloat(t.angulo) || 90)) * Math.PI / 180;
            if (t.giro === 'der') h += ang;
            else if (t.giro === 'izq') h -= ang;
            const L = parseFloat(t.L) || 1000;
            const rise = t.plataforma ? 0 : L * slope;
            const sx = x, sy = y, sz = z;
            const ex = x + Math.cos(h) * L, ey = y + rise, ez = z + Math.sin(h) * L;
            flights.push({ s: { x: sx, y: sy, z: sz }, e: { x: ex, y: ey, z: ez } });
            x = ex; y = ey; z = ez;
        });
        const box = newBox();
        let inner = '';
        // pintar en orden de recorrido (los tramos de profundidad quedan delante)
        for (let i = 0; i < flights.length; i++) {
            const f = flights[i];
            const sL = { x: f.s.x, y: f.s.y + lift, z: f.s.z }, eL = { x: f.e.x, y: f.e.y + lift, z: f.e.z };
            const B1 = P(sL.x, sL.y, sL.z), B2 = P(eL.x, eL.y, eL.z);
            const T1 = P(sL.x, sL.y + H, sL.z), T2 = P(eL.x, eL.y + H, eL.z);
            [B1, B2, T1, T2].forEach(p => extBox(box, p));
            if (lift) { extBox(box, P(f.s.x, f.s.y, f.s.z)); extBox(box, P(f.e.x, f.e.y, f.e.z)); }
            inner += emitFixings(P, sL, eL, H, state, box, 'base', lift);
            inner += polyFrom([B1, B2, T2, T1], `fill="url(#glass-${uid})" stroke="#0A3D62" stroke-width="1.6" stroke-linejoin="round"`);
            inner += reflectionLine(B1, T1);
            inner += emitFixings(P, sL, eL, H, state, box, 'conn', lift);
        }
        return { inner, box };
    }

    function renderBaranda(state, id) {
        const uid = id;
        const H = state.alto > 0 ? state.alto : 1200;
        const tramos = (state.tramos && state.tramos.length) ? state.tramos : [{ L: 2000 }];
        let r;
        if (state.pose === 'escalera') r = renderBarandaStairs(uid, tramos, H, state);
        else r = renderBarandaFlat(uid, barandaPlanSegs(tramos), H, state);
        return wrapIso(uid, r.inner, r.box, 90, state.color_vidrio);
    }

    // ---- CONSTRUCTOR DE BALCÓN 3D (UI) ----
    function getTramos(id) {
        if (!cardsState[id].tramos || !cardsState[id].tramos.length) cardsState[id].tramos = [{ L: 2000 }];
        return cardsState[id].tramos;
    }

    function barandaRecalc(id) {
        const st = cardsState[id];
        const tramos = getTramos(id);
        st.ancho = tramos.reduce((a, t) => a + (parseInt(t.L) || 0), 0);
        if (!st.alto) st.alto = 1200;
    }

    function refreshBaranda(id, rebuildUI) {
        barandaRecalc(id);
        const cont = document.getElementById('schematic-' + id);
        if (cont) cont.innerHTML = renderSVG(id);
        if (rebuildUI) {
            const b = document.getElementById('baranda-builder-' + id);
            if (b) b.innerHTML = renderBarandaBuilder(id);
        }
        if (cardsState[id].locked) generateSummary(id);
        saveProgress();
    }

    function renderBarandaBuilder(id) {
        const st = cardsState[id];
        const forma = st.forma || 'recto';
        const act = f => forma === f ? ' active' : '';
        let h = `<div class="forma-buttons">
            <button class="forma-btn${act('recto')}" onclick="barandaSetForma(${id}, 'recto')">— Recto</button>
            <button class="forma-btn${act('L')}" onclick="barandaSetForma(${id}, 'L')">⌐ Forma L</button>
            <button class="forma-btn${act('U')}" onclick="barandaSetForma(${id}, 'U')">⊔ Forma U</button>
        </div>`;
        const tramos = getTramos(id);
        h += '<div class="bar-box">';
        tramos.forEach((t, i) => {
            const g = t.giro || 'recto';
            h += `<div class="bar-row"><b>Tramo ${i + 1}:</b>
                <input type="number" value="${t.L != null ? t.L : ''}" placeholder="L (mm)" oninput="barandaUpdateTramo(${id}, ${i}, 'L', this.value)">
                <button class="bar-x" title="Borrar este tramo" onclick="barandaRemoveTramo(${id}, ${i})">X</button></div>`;
            h += `<div class="bar-giro">
                    <select onchange="barandaUpdateTramo(${id}, ${i}, 'giro', this.value)">
                        <option value="recto" ${g === 'recto' ? 'selected' : ''}>Recto (sin giro)</option>
                        <option value="der" ${g === 'der' ? 'selected' : ''}>Giro Der &#8635;</option>
                        <option value="izq" ${g === 'izq' ? 'selected' : ''}>Giro Izq &#8634;</option>
                    </select>
                    <input type="number" value="${t.angulo || 90}" title="Ángulo" oninput="barandaUpdateTramo(${id}, ${i}, 'angulo', this.value)"><span style="font-weight:bold;">&deg;</span>
                    <label class="bar-plat" title="Tramo plano (descansillo / balcón)"><input type="checkbox" ${t.plataforma ? 'checked' : ''} onchange="barandaUpdateTramo(${id}, ${i}, 'plataforma', this.checked)"> Plat.</label>
                </div>`;
        });
        h += `<button class="bar-add" onclick="barandaAddTramo(${id})">+ Añadir Tramo</button></div>`;
        if (st.pose === 'escalera') h += `<div style="font-size:10px; color:#777; margin-top:6px;">Pose en escalera: cada tramo es un tiro que sube. Usa Forma L/U y los giros para representar escaleras de varios pisos.</div>`;
        return h;
    }

    function barandaSetForma(id, forma) {
        const st = cardsState[id];
        st.forma = forma;
        let t = getTramos(id);
        if (forma === 'recto') {
            t.forEach((x, i) => { if (i >= 1) { x.giro = 'recto'; x.angulo = x.angulo || 90; } });
        } else if (forma === 'L') {
            while (t.length < 2) t.push({ L: 1500 });
            t[1].giro = 'der'; t[1].angulo = 90;
            for (let i = 2; i < t.length; i++) t[i].giro = 'recto';
        } else if (forma === 'U') {
            while (t.length < 3) t.push({ L: 1000 });
            t[1].giro = 'der'; t[1].angulo = 90;
            t[2].giro = 'der'; t[2].angulo = 90;
            for (let i = 3; i < t.length; i++) t[i].giro = 'recto';
        }
        cardsState[id].tramos = t;
        refreshBaranda(id, true);
    }
    function barandaAddTramo(id) {
        getTramos(id).push({ L: 1000, giro: 'recto', angulo: 90 });
        refreshBaranda(id, true);
    }
    function barandaRemoveTramo(id, idx) {
        const t = getTramos(id);
        if (t.length <= 1) { alert('Debe quedar al menos un tramo.'); return; }
        if (idx == null) idx = t.length - 1;
        t.splice(idx, 1);
        refreshBaranda(id, true);
    }
    function barandaUpdateTramo(id, idx, key, value) {
        const t = getTramos(id);
        if (!t[idx]) return;
        if (key === 'giro') t[idx].giro = value;
        else if (key === 'plataforma') t[idx].plataforma = !!value;
        else t[idx][key] = (value === '' ? '' : parseInt(value) || 0);
        refreshBaranda(id, false);
    }

    function renderSVG(id) {
        const state = cardsState[id];
        if (state.categoria === 'baranda') return applyFinish(renderBaranda(state, id), state.color_perfil, state.color_ral);
        if (state.categoria === 'ducha') return applyFinish(renderDucha(state, id), state.color_perfil, state.color_ral);

        const isCAD = (id === 'temp');
        const uid = id;

        let bx = 10, by = 5, bw = 80, bh = 50;
        if (state.categoria === 'corredera') { bx = 10; by = 10; bw = 80; bh = 40; }
        else if (state.categoria === 'galandaje') { bx = 5; by = 10; bw = 90; bh = 40; }
        else if (state.type === 'win_proy' || state.type === 'win_souf') { bx = 25; by = 15; bw = 50; bh = 30; }
        else if (state.type === 'win_abat' || state.type === 'win_ob') { bx = 30; by = 10; bw = 40; bh = 40; }
        else if (state.type === 'door_abat') { bx = 35; by = 5; bw = 30; bh = 50; }
        else if (state.categoria === 'mampara' || state.categoria === 'puerta_vidrio') { bx = 30; by = 5; bw = 40; bh = 50; }

        const hasPlan = ['win_abat', 'door_abat', 'win_ob'].includes(state.type);
        // En modo CAD el viewBox se ajusta EXACTO al panel de vidrio (sin relleno) para que los
        // módulos se unan vidrio-con-vidrio al pegarse (fachada compuesta sin huecos).
        let viewBox, aspect;
        if (isCAD) {
            const pr = (getPanelRects(state) || [])[0] || [bx, by, bw, bh];
            viewBox = `${pr[0]} ${pr[1]} ${pr[2]} ${pr[3]}`;
            aspect = 'none';
        } else {
            viewBox = hasPlan ? '-14 -8 144 118' : '-14 -6 144 70';
            aspect = 'xMidYMid meet';
        }

        let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${viewBox}" preserveAspectRatio="${aspect}" width="100%" height="100%" style="stroke:#0A3D62; fill:none; stroke-linecap:round; stroke-linejoin:round;">`;
        svg += glassDefs(uid, state.color_vidrio);
        svg += `<style>path, rect, line, circle, polyline, polygon { vector-effect: non-scaling-stroke; stroke-width: 1.5px; }</style>`;

        const ladrilloIzq = wallBlock(uid, 4, 9, 16, 44);
        const ladrilloDer = wallBlock(uid, 80, 9, 16, 44);

        // Flechas de apertura SIEMPRE negras (no cambian con el acabado, visibles sobre cualquier vidrio)
        const arrowL = '<g style="stroke:#111111;stroke-width:2px"><line x1="-4" y1="0" x2="4" y2="0"/><polyline points="0,-3 -4,0 0,3"/></g>';
        const arrowR = '<g style="stroke:#111111;stroke-width:2px"><line x1="-4" y1="0" x2="4" y2="0"/><polyline points="0,-3 4,0 0,3"/></g>';

        const putArrow = (x, y) => `<g transform="translate(${x}, ${y})">${state.orientacion === 'D' ? arrowR : arrowL}</g>`;
        const putArrowInv = (x, y) => `<g transform="translate(${x}, ${y})">${state.orientacion === 'D' ? arrowL : arrowR}</g>`;

        const drawPlanView = (type, stateInfo) => {
            let is2Hojas = stateInfo.apertura && stateInfo.apertura.includes('2');
            let opensAfuera = stateInfo.apertura && stateInfo.apertura.includes('afuera');
            if (type === 'win_ob') opensAfuera = false;

            let vistaAfuera = stateInfo.vista === 'afuera';
            let opensTowardsViewer = (vistaAfuera && opensAfuera) || (!vistaAfuera && !opensAfuera);
            let dirY = opensTowardsViewer ? 1 : -1;

            let y0 = 85;
            let html = `<line x1="15" y1="${y0}" x2="85" y2="${y0}" style="stroke-width: 2.5px; stroke:#bdc3c7;"/>`;

            let w = type === 'door_abat' ? 30 : 40;
            let startX = type === 'door_abat' ? 35 : 30;
            let centerX = 50;

            if (is2Hojas) {
                let r = w / 2;
                let dx = r * 0.866;
                let dy = r * 0.5 * dirY;

                html += `<line x1="${startX}" y1="${y0}" x2="${startX + dx}" y2="${y0 + dy}" style="stroke:#0A3D62;"/>`;
                html += `<path d="M ${centerX} ${y0} A ${r} ${r} 0 0 ${dirY > 0 ? 1 : 0} ${startX + dx} ${y0 + dy}" stroke-dasharray="2,2" stroke-width="1" fill="none" style="stroke:#0A3D62;"/>`;

                html += `<line x1="${startX + w}" y1="${y0}" x2="${startX + w - dx}" y2="${y0 + dy}" style="stroke:#0A3D62;"/>`;
                html += `<path d="M ${centerX} ${y0} A ${r} ${r} 0 0 ${dirY > 0 ? 0 : 1} ${startX + w - dx} ${y0 + dy}" stroke-dasharray="2,2" stroke-width="1" fill="none" style="stroke:#0A3D62;"/>`;
            } else {
                let r = w * 0.875;
                let hingeX = startX;
                let freeX = startX + w;
                let dx = r * 0.866;
                let dy = r * 0.5 * dirY;
                let endX = hingeX + dx;
                let endY = y0 + dy;

                let sweep = dirY > 0 ? 1 : 0;

                html += `<line x1="${hingeX}" y1="${y0}" x2="${endX}" y2="${endY}" style="stroke:#0A3D62;"/>`;
                html += `<path d="M ${freeX} ${y0} A ${r} ${r} 0 0 ${sweep} ${endX} ${endY}" stroke-dasharray="2,2" stroke-width="1" fill="none" style="stroke:#0A3D62;"/>`;
            }
            return html;
        };

        let drawing = '';
        const isD = state.orientacion === 'D';

        switch (state.type) {
            case 'cor2':
                drawing += '<rect x="10" y="10" width="80" height="40"/><line x1="50" y1="10" x2="50" y2="50"/>';
                drawing += `<g transform="translate(30, 30)">${arrowR}</g><g transform="translate(70, 30)">${arrowL}</g>`;
                break;
            case 'cor3':
                drawing += '<rect x="10" y="10" width="80" height="40"/><line x1="36.6" y1="10" x2="36.6" y2="50"/><line x1="63.3" y1="10" x2="63.3" y2="50"/>';
                drawing += putArrow(23.3, 30) + putArrow(50, 30) + putArrow(76.6, 30);
                break;
            case 'cor4_cent':
                drawing += '<rect x="10" y="10" width="80" height="40"/><line x1="30" y1="10" x2="30" y2="50"/><line x1="50" y1="10" x2="50" y2="50"/><line x1="70" y1="10" x2="70" y2="50"/>';
                drawing += putArrowInv(20, 30) + putArrow(40, 30) + putArrowInv(60, 30) + putArrow(80, 30);
                break;
            case 'cor4_lat':
                drawing += '<rect x="10" y="10" width="80" height="40"/><line x1="30" y1="10" x2="30" y2="50"/><line x1="50" y1="10" x2="50" y2="50"/><line x1="70" y1="10" x2="70" y2="50"/>';
                drawing += putArrow(20, 30) + putArrow(40, 30) + putArrow(60, 30) + putArrow(80, 30);
                break;
            case 'cor6_cent':
                drawing += '<rect x="10" y="10" width="80" height="40"/><line x1="23.3" y1="10" x2="23.3" y2="50"/><line x1="36.6" y1="10" x2="36.6" y2="50"/><line x1="50" y1="10" x2="50" y2="50"/><line x1="63.3" y1="10" x2="63.3" y2="50"/><line x1="76.6" y1="10" x2="76.6" y2="50"/>';
                drawing += `<g transform="translate(16.6,30)">${arrowR}</g><g transform="translate(30,30)">${arrowL}</g><g transform="translate(43.3,30)">${arrowL}</g><g transform="translate(56.6,30)">${arrowR}</g><g transform="translate(70,30)">${arrowR}</g><g transform="translate(83.3,30)">${arrowL}</g>`;
                break;
            case 'cor6_lat':
                drawing += '<rect x="10" y="10" width="80" height="40"/><line x1="23.3" y1="10" x2="23.3" y2="50"/><line x1="36.6" y1="10" x2="36.6" y2="50"/><line x1="50" y1="10" x2="50" y2="50"/><line x1="63.3" y1="10" x2="63.3" y2="50"/><line x1="76.6" y1="10" x2="76.6" y2="50"/>';
                drawing += putArrow(16.6, 30) + putArrow(30, 30) + putArrow(43.3, 30) + putArrow(56.6, 30) + putArrow(70, 30) + putArrow(83.3, 30);
                break;

            case 'gal1':
                drawing += isD ? (ladrilloDer + '<rect x="10" y="10" width="70" height="40"/>' + `<g transform="translate(45,30)">${arrowR}</g>`)
                    : (ladrilloIzq + '<rect x="20" y="10" width="70" height="40"/>' + `<g transform="translate(55,30)">${arrowL}</g>`);
                break;
            case 'gal2_lat':
                drawing += isD ? (ladrilloDer + '<rect x="10" y="10" width="70" height="40"/><line x1="45" y1="10" x2="45" y2="50"/>' + `<g transform="translate(27.5,30)">${arrowR}</g><g transform="translate(62.5,30)">${arrowR}</g>`)
                    : (ladrilloIzq + '<rect x="20" y="10" width="70" height="40"/><line x1="55" y1="10" x2="55" y2="50"/>' + `<g transform="translate(37.5,30)">${arrowL}</g><g transform="translate(72.5,30)">${arrowL}</g>`);
                break;
            case 'gal2_cent':
                drawing += ladrilloIzq + ladrilloDer + '<rect x="20" y="10" width="60" height="40"/><line x1="50" y1="10" x2="50" y2="50"/>';
                drawing += `<g transform="translate(35,30)">${arrowL}</g><g transform="translate(65,30)">${arrowR}</g>`;
                break;
            case 'gal3_3v':
                drawing += isD ? (ladrilloDer + '<rect x="5" y="10" width="75" height="40"/><line x1="30" y1="10" x2="30" y2="50"/><line x1="55" y1="10" x2="55" y2="50"/>' + `<g transform="translate(17.5,30)">${arrowR}</g><g transform="translate(42.5,30)">${arrowR}</g><g transform="translate(67.5,30)">${arrowR}</g>`)
                    : (ladrilloIzq + '<rect x="20" y="10" width="75" height="40"/><line x1="45" y1="10" x2="45" y2="50"/><line x1="70" y1="10" x2="70" y2="50"/>' + `<g transform="translate(32.5,30)">${arrowL}</g><g transform="translate(57.5,30)">${arrowL}</g><g transform="translate(82.5,30)">${arrowL}</g>`);
                break;
            case 'gal4_2v':
                drawing += ladrilloIzq + ladrilloDer + '<rect x="20" y="10" width="60" height="40"/><line x1="35" y1="10" x2="35" y2="50"/><line x1="50" y1="10" x2="50" y2="50"/><line x1="65" y1="10" x2="65" y2="50"/>';
                drawing += `<g transform="translate(27.5,30)">${arrowL}</g><g transform="translate(42.5,30)">${arrowL}</g><g transform="translate(57.5,30)">${arrowR}</g><g transform="translate(72.5,30)">${arrowR}</g>`;
                break;
            case 'gal4_4v':
                drawing += isD ? (ladrilloDer + '<rect x="0" y="10" width="80" height="40"/><line x1="20" y1="10" x2="20" y2="50"/><line x1="40" y1="10" x2="40" y2="50"/><line x1="60" y1="10" x2="60" y2="50"/>' + `<g transform="translate(10,30)">${arrowR}</g><g transform="translate(30,30)">${arrowR}</g><g transform="translate(50,30)">${arrowR}</g><g transform="translate(70,30)">${arrowR}</g>`)
                    : (ladrilloIzq + '<rect x="20" y="10" width="80" height="40"/><line x1="40" y1="10" x2="40" y2="50"/><line x1="60" y1="10" x2="60" y2="50"/><line x1="80" y1="10" x2="80" y2="50"/>' + `<g transform="translate(30,30)">${arrowL}</g><g transform="translate(50,30)">${arrowL}</g><g transform="translate(70,30)">${arrowL}</g><g transform="translate(90,30)">${arrowL}</g>`);
                break;
            case 'gal6_3v':
                drawing += ladrilloIzq + ladrilloDer + '<rect x="20" y="10" width="60" height="40"/><line x1="30" y1="10" x2="30" y2="50"/><line x1="40" y1="10" x2="40" y2="50"/><line x1="50" y1="10" x2="50" y2="50"/><line x1="60" y1="10" x2="60" y2="50"/><line x1="70" y1="10" x2="70" y2="50"/>';
                drawing += `<g transform="translate(25,30)">${arrowL}</g><g transform="translate(35,30)">${arrowL}</g><g transform="translate(45,30)">${arrowL}</g><g transform="translate(55,30)">${arrowR}</g><g transform="translate(65,30)">${arrowR}</g><g transform="translate(75,30)">${arrowR}</g>`;
                break;

            case 'win_proy': drawing += '<rect x="25" y="15" width="50" height="30"/><path d="M25 15l25 30l25-30"/>'; break;
            case 'win_souf': drawing += '<rect x="25" y="15" width="50" height="30"/><path d="M25 45l25-30l25 30"/>'; break;

            case 'win_abat':
                drawing += '<rect x="30" y="10" width="40" height="40"/>';
                if (state.apertura && state.apertura.includes('2')) {
                    drawing += '<line x1="50" y1="10" x2="50" y2="50"/>';
                    drawing += '<path d="M30 10l20 20l-20 20 M70 10l-20 20l20 20"/>';
                } else {
                    drawing += '<path d="M30 10l40 20l-40 20"/>';
                }
                drawing += drawPlanView(state.type, state);
                break;
            case 'door_abat':
                drawing += '<rect x="35" y="5" width="30" height="50"/>';
                if (state.apertura && state.apertura.includes('2')) {
                    drawing += '<line x1="50" y1="5" x2="50" y2="55"/>';
                    drawing += '<path d="M35 5l15 25l-15 25 M65 5l-15 25l15 25"/>';
                } else {
                    drawing += '<path d="M35 5l30 25l-30 25"/>';
                }
                drawing += drawPlanView(state.type, state);
                break;

            case 'win_ob':
                drawing += '<rect x="30" y="10" width="40" height="40"/><path d="M30 10l40 20l-40 20M30 50l20-40l20 40"/>';
                drawing += drawPlanView(state.type, state);
                break;

            case 'mamp_fija':
                drawing += '<rect x="30" y="5" width="40" height="50"/>';
                drawing += '<rect x="30" y="12" width="2" height="4" fill="#0A3D62"/>';
                drawing += '<rect x="30" y="44" width="2" height="4" fill="#0A3D62"/>';
                drawing += '<rect x="66" y="53" width="4" height="2" fill="#0A3D62"/>';
                if (state.ancho >= 1000) {
                    drawing += '<rect x="30" y="53" width="4" height="2" fill="#0A3D62"/>';
                }
                break;

            case 'door_glass':
                drawing += '<rect x="30" y="5" width="40" height="50"/>';
                if (state.bisagras === 'bisagra') {
                    drawing += `<rect x="${isD ? 68 : 30}" y="15" width="2" height="4" fill="#0A3D62"/><rect x="${isD ? 68 : 30}" y="41" width="2" height="4" fill="#0A3D62"/>`;
                } else {
                    drawing += `<rect x="${isD ? 65 : 30}" y="5" width="5" height="2" fill="#0A3D62"/><rect x="${isD ? 65 : 30}" y="53" width="5" height="2" fill="#0A3D62"/>`;
                }

                if (state.cerradura_tipo === 'central') {
                    drawing += `<path d="M ${isD ? 30 : 70} 25 A 5 5 0 0 ${isD ? 1 : 0} ${isD ? 30 : 70} 35 Z" fill="#0A3D62" stroke="none"/>`;
                } else if (state.cerradura_tipo === 'digital') {
                    drawing += `<rect x="${isD ? 30 : 66}" y="25" width="4" height="10" fill="#0A3D62"/>`;
                    drawing += `<circle cx="${isD ? 32 : 68}" cy="27" r="0.5" fill="#fff" stroke="none"/><circle cx="${isD ? 32 : 68}" cy="30" r="0.5" fill="#fff" stroke="none"/><circle cx="${isD ? 32 : 68}" cy="33" r="0.5" fill="#fff" stroke="none"/>`;
                }

                if (state.cerradura_piso === 'si') {
                    drawing += `<rect x="${isD ? 30 : 64}" y="52" width="6" height="3" fill="#0A3D62"/>`;
                }

                if (state.tirador && state.tirador !== '') {
                    let hh = 10;
                    if (state.tirador === '5') hh = 6;
                    if (state.tirador === '8') hh = 10;
                    if (state.tirador === '12') hh = 16;
                    if (state.tirador === '16') hh = 22;
                    let y1 = 30 - hh / 2;
                    let y2 = 30 + hh / 2;
                    let x = isD ? 36 : 64;
                    drawing += `<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}"/>`;
                }
                break;

            case 'fachada_din':
                let n = parseInt(state.panos) || 1;
                let isTope = state.union === 'tope';
                let innerStroke = isTope ? 0.5 : 2;

                drawing += '<rect x="10" y="5" width="80" height="50"/>';
                for (let i = 1; i < n; i++) {
                    let posX = 10 + (80 / n) * i;
                    drawing += `<line x1="${posX}" y1="5" x2="${posX}" y2="${55}" stroke-width="${innerStroke}"/>`;
                }
                for (let i = 0; i < n; i++) {
                    let centerX = 10 + (80 / n) * i + (80 / n) / 2;
                    drawing += `<text x="${centerX}" y="33" font-family="Arimo" font-size="12" font-weight="bold" fill="#2c3742" text-anchor="middle" stroke="none">F</text>`;
                }
                break;
        }

        // capa de vidrio 3D detrás del esquema técnico
        let glassLayer = '';
        // Mampara y puerta de vidrio = vidrio sin marco (canto de vidrio, no borde oscuro)
        const glassOnly = (state.categoria === 'mampara' || state.categoria === 'puerta_vidrio');
        const panelFn = glassOnly ? glassOnlyPanel : extrudedPanel;
        getPanelRects(state).forEach(r => { glassLayer += panelFn(uid, r[0], r[1], r[2], r[3]); });

        const isFlipped = ['win_abat', 'win_ob', 'win_souf', 'door_abat'].includes(state.type) && isD;
        const transform = isFlipped ? `transform="scale(-1, 1) translate(-100, 0)"` : '';

        svg += `<g ${transform}>${glassLayer}${drawing}</g>`;

        if (!isCAD) {
            if (state.ancho > 0) {
                svg += `<text x="50" y="4" font-family="Arimo" font-size="7" font-weight="bold" fill="#2c3742" text-anchor="middle" stroke="none">${state.ancho} mm</text>`;
            }
            if (state.alto > 0) {
                svg += `<text x="94" y="30" font-family="Arimo" font-size="7" font-weight="bold" fill="#2c3742" text-anchor="start" dominant-baseline="middle" stroke="none">${state.alto} mm</text>`;
            }
        }

        svg += '</svg>';
        return applyFinish(svg, state.color_perfil, state.color_ral);
    }

    function initMiniCAD(id) {
        const canvas = document.getElementById('canvas-' + id);
        const ctx = canvas.getContext('2d');
        
        let drawing = false;
        let startX = 0, startY = 0;
        
        window['cadLines' + id] = window['cadLines' + id] || [];
        let lines = window['cadLines' + id];
        
        let draggingImg = null;
        let dragOffsetX = 0, dragOffsetY = 0;

        window['autoZoom' + id] = 1;
        window['panX' + id] = 0;
        window['panY' + id] = 0;

        window['autoFit' + id] = function() {
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            let hasContent = false;
            
            if (window['cadItems' + id]) {
                window['cadItems' + id].forEach(item => {
                    hasContent = true;
                    if (item.x - item.w/2 < minX) minX = item.x - item.w/2;
                    if (item.x + item.w/2 > maxX) maxX = item.x + item.w/2;
                    if (item.y - item.h/2 < minY) minY = item.y - item.h/2;
                    if (item.y + item.h/2 > maxY) maxY = item.y + item.h/2;
                });
            }
            lines.forEach(l => {
                hasContent = true;
                if (l.x1 < minX) minX = l.x1;
                if (l.x2 < minX) minX = l.x2;
                if (l.x1 > maxX) maxX = l.x1;
                if (l.x2 > maxX) maxX = l.x2;
                if (l.y1 < minY) minY = l.y1;
                if (l.y2 < minY) minY = l.y2;
                if (l.y1 > maxY) maxY = l.y1;
                if (l.y2 > maxY) maxY = l.y2;
            });

            if (!hasContent) {
                window['panX' + id] = 0; window['panY' + id] = 0; window['autoZoom' + id] = 1;
                return;
            }

            minX -= 50; minY -= 50; maxX += 50; maxY += 50;
            let contentW = maxX - minX;
            let contentH = maxY - minY;
            
            let scaleX = canvas.width / contentW;
            let scaleY = canvas.height / contentH;
            let zoom = Math.min(1, scaleX, scaleY);
            
            window['autoZoom' + id] = zoom;
            window['panX' + id] = (canvas.width - contentW * zoom) / 2 - minX * zoom;
            window['panY' + id] = (canvas.height - contentH * zoom) / 2 - minY * zoom;
        };

        window['updateCADOptionsUI' + id] = function() {
            let container = document.getElementById('cad-options-' + id);
            let selectedItem = window['selectedCADItem' + id];
            
            if(!selectedItem) {
                container.innerHTML = '<div style="grid-column: span 2; text-align:center; color:#0A3D62; font-size:11px; padding: 10px; font-weight:bold;">Toca un modelo insertado para configurarlo aquí</div>';
                return;
            }
            
            const hideOrientation = ['cor2', 'cor4_cent', 'cor6_cent', 'gal4_2v', 'gal6_3v', 'win_proy', 'win_souf'].includes(selectedItem.type);
            const showOrientation = !hideOrientation && ['corredera', 'galandaje', 'ventana', 'puerta_vidrio'].includes(selectedItem.categoria);
            
            let dimensionInputs = `
                <div style="grid-column: span 2; display: flex; gap: 10px; margin-bottom: 5px; border-top: 1px dashed #ccc; padding-top: 10px;">
                    <div style="flex:1;"><label style="font-size:10px; color:#0A3D62; font-weight:bold;">Ancho (mm):</label><input type="text" inputmode="numeric" style="width:100%; padding:5px; border:1px solid #ddd; border-radius:3px;" value="${selectedItem.state.ancho || ''}" oninput="updateCADItemState(${id}, 'ancho', this.value)"></div>
                    <div style="flex:1;"><label style="font-size:10px; color:#0A3D62; font-weight:bold;">Alto (mm):</label><input type="text" inputmode="numeric" style="width:100%; padding:5px; border:1px solid #ddd; border-radius:3px;" value="${selectedItem.state.alto || ''}" oninput="updateCADItemState(${id}, 'alto', this.value)"></div>
                </div>
            `;

            let orientationHtml = showOrientation ? `
                <div class="orientation-toggle" style="grid-column: span 2; margin-bottom: 5px;">
                    <div class="toggle-btn ${selectedItem.state.orientacion==='I'?'active':''}" onclick="updateCADItemState(${id}, 'orientacion', 'I')"> A LA IZQUIERDA</div>
                    <div class="toggle-btn ${selectedItem.state.orientacion==='D'?'active':''}" onclick="updateCADItemState(${id}, 'orientacion', 'D')">A LA DERECHA </div>
                </div>` : '';

            let deleteBtn = `<button onclick="window.deleteSelectedCADItem(${id})" style="grid-column: span 2; background: #e74c3c; color: white; border: none; padding: 6px; border-radius: 3px; cursor: pointer; margin-bottom: 5px; font-weight:bold;"> Borrar módulo seleccionado</button>`;
            
            container.innerHTML = dimensionInputs + deleteBtn + orientationHtml + getMenuOpciones(id, selectedItem.categoria, selectedItem.type, true);
            
            let selects = container.querySelectorAll('select');
            selects.forEach(select => {
                let onchangeStr = select.getAttribute('onchange');
                if(onchangeStr) {
                    let match = onchangeStr.match(/,\s*'([^']+)'\s*,/);
                    if(match && match[1]) {
                        let key = match[1];
                        if(selectedItem.state[key] !== undefined) {
                            select.value = selectedItem.state[key];
                        }
                    }
                }
            });
        };

        window.deleteSelectedCADItem = function(cardId) {
            let item = window['selectedCADItem' + cardId];
            if(item && window['cadItems' + cardId]) {
                window['cadItems' + cardId] = window['cadItems' + cardId].filter(i => i !== item);
                window['selectedCADItem' + cardId] = null;
                updatePanoramicState(cardId);
                window['autoFit' + cardId]();
                if(window['updateCADOptionsUI' + cardId]) window['updateCADOptionsUI' + cardId]();
                if(window['drawAll' + cardId]) window['drawAll' + cardId]();
                recomputeCADTotals(cardId);
                saveProgress();
            }
        };
        
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let rawX = clientX - rect.left;
            let rawY = clientY - rect.top;
            
            let z = window['autoZoom' + id] || 1;
            let px = window['panX' + id] || 0;
            let py = window['panY' + id] || 0;
            
            return { x: (rawX - px) / z, y: (rawY - py) / z };
        }

        function snap(p) {
            const snapDist = 15;
            for (let line of lines) {
                if (Math.hypot(p.x - line.x1, p.y - line.y1) < snapDist) return {x: line.x1, y: line.y1};
                if (Math.hypot(p.x - line.x2, p.y - line.y2) < snapDist) return {x: line.x2, y: line.y2};
            }
            return p;
        }

        function drawAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let z = window['autoZoom' + id] || 1;
            let px = window['panX' + id] || 0;
            let py = window['panY' + id] || 0;
            
            ctx.save();
            ctx.translate(px, py);
            ctx.scale(z, z);
            
            if (window['cadItems' + id]) {
                window['cadItems' + id].forEach((item, index) => {
                    if (item.img) {
                        ctx.drawImage(item.img, item.x - item.w/2, item.y - item.h/2, item.w, item.h);
                        
                        let hasTop = false, hasBottom = false, hasLeft = false, hasRight = false;
                        const tol = 15;
                        window['cadItems' + id].forEach(other => {
                            if (other === item) return;
                            if (Math.abs((item.y - item.h/2) - (other.y + other.h/2)) <= tol && Math.abs(item.x - other.x) < (item.w/2 + other.w/2)) hasTop = true;
                            if (Math.abs((item.y + item.h/2) - (other.y - other.h/2)) <= tol && Math.abs(item.x - other.x) < (item.w/2 + other.w/2)) hasBottom = true;
                            if (Math.abs((item.x + item.w/2) - (other.x - other.w/2)) <= tol && Math.abs(item.y - other.y) < (item.h/2 + other.h/2)) hasRight = true;
                            if (Math.abs((item.x - item.w/2) - (other.x + other.w/2)) <= tol && Math.abs(item.y - other.y) < (item.h/2 + other.h/2)) hasLeft = true;
                        });

                        ctx.fillStyle = '#0A3D62'; 
                        ctx.font = 'bold 11px Arimo'; 
                        
                        if (item.state.ancho > 0) {
                            ctx.textAlign = 'center';
                            if (!hasTop) {
                                ctx.fillText(item.state.ancho + ' mm', item.x, item.y - item.h/2 - 8);
                            } else if (!hasBottom) {
                                ctx.fillText(item.state.ancho + ' mm', item.x, item.y + item.h/2 + 15);
                            }
                        }
                        
                        if (item.state.alto > 0) {
                            if (!hasRight) {
                                ctx.textAlign = 'left';
                                ctx.fillText(item.state.alto + ' mm', item.x + item.w/2 + 8, item.y + 4);
                            } else if (!hasLeft) {
                                ctx.textAlign = 'right';
                                ctx.fillText(item.state.alto + ' mm', item.x - item.w/2 - 8, item.y + 4);
                            }
                        }

                        // CÍRCULO NUMÉRICO
                        ctx.beginPath();
                        ctx.arc(item.x, item.y, 8, 0, 2 * Math.PI);
                        ctx.fillStyle = 'rgba(255,255,255,0.9)';
                        ctx.fill();
                        ctx.lineWidth = 1;
                        ctx.strokeStyle = '#e74c3c';
                        ctx.stroke();
                        ctx.fillStyle = '#e74c3c';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.font = 'bold 10px Arimo';
                        ctx.fillText(index + 1, item.x, item.y);
                        ctx.textBaseline = 'alphabetic'; 

                        if (window['selectedCADItem' + id] === item) {
                            ctx.strokeStyle = '#F6B93B';
                            ctx.lineWidth = 2;
                            ctx.strokeRect(item.x - item.w/2 - 2, item.y - item.h/2 - 2, item.w + 4, item.h + 4);
                        }
                    }
                });
            }

            ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.strokeStyle = '#0A3D62';
            lines.forEach(l => {
                ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); ctx.stroke();
            });
            
            ctx.restore();
        }
        
        window['drawAll' + id] = drawAll;

        function startDraw(e) {
            let p = getPos(e);
            let clickedItem = null;
            
            if (window['cadItems' + id]) {
                for (let i = window['cadItems' + id].length - 1; i >= 0; i--) {
                    let item = window['cadItems' + id][i];
                    if (p.x >= item.x - item.w/2 && p.x <= item.x + item.w/2 &&
                        p.y >= item.y - item.h/2 && p.y <= item.y + item.h/2) {
                        clickedItem = item;
                        break;
                    }
                }
            }

            if (clickedItem) {
                window['selectedCADItem' + id] = clickedItem;
                draggingImg = clickedItem;
                dragOffsetX = p.x - clickedItem.x;
                dragOffsetY = p.y - clickedItem.y;
                if(e.type === 'touchstart') e.preventDefault();
                window['updateCADOptionsUI' + id]();
                drawAll();
                return; 
            } else {
                window['selectedCADItem' + id] = null;
                window['updateCADOptionsUI' + id]();
                drawAll();
            }
            if(e.type === 'touchstart') e.preventDefault();
            drawing = true;
            p = snap(p);
            startX = p.x; startY = p.y;
        }

        function moveDraw(e) {
            if (draggingImg) {
                if(e.type === 'touchmove') e.preventDefault();
                let p = getPos(e);
                let targetX = p.x - dragOffsetX;
                let targetY = p.y - dragOffsetY;
                
                // IMÁN: busca la mejor posición de encaje (pegado o alineado) en cada eje
                const snapDist = 55;
                const dw = draggingImg.w / 2, dh = draggingImg.h / 2;
                let bestX = null, bestXd = snapDist;
                let bestY = null, bestYd = snapDist;

                window['cadItems' + id].forEach(other => {
                    if (other === draggingImg) return;
                    const oL = other.x - other.w / 2, oR = other.x + other.w / 2;
                    const oT = other.y - other.h / 2, oB = other.y + other.h / 2;
                    const myL = targetX - dw, myR = targetX + dw;
                    const myT = targetY - dh, myB = targetY + dh;

                    const nearY = (myT < oB + snapDist && myB > oT - snapDist);
                    const nearX = (myL < oR + snapDist && myR > oL - snapDist);

                    // Eje X: pegar lateralmente o alinear (solo si están cerca verticalmente)
                    if (nearY) {
                        [[oR + dw, Math.abs(myL - oR)],   // mi izquierda contra derecha del otro
                         [oL - dw, Math.abs(myR - oL)],   // mi derecha contra izquierda del otro
                         [other.x, Math.abs(targetX - other.x)], // centros alineados
                         [oL + dw, Math.abs(myL - oL)],   // bordes izquierdos
                         [oR - dw, Math.abs(myR - oR)]    // bordes derechos
                        ].forEach(c => { if (c[1] < bestXd) { bestXd = c[1]; bestX = c[0]; } });
                    }
                    // Eje Y: apilar arriba/abajo o alinear (solo si están cerca horizontalmente)
                    if (nearX) {
                        [[oB + dh, Math.abs(myT - oB)],   // mi arriba contra abajo del otro
                         [oT - dh, Math.abs(myB - oT)],   // mi abajo contra arriba del otro
                         [other.y, Math.abs(targetY - other.y)], // centros alineados
                         [oT + dh, Math.abs(myT - oT)],   // bordes superiores
                         [oB - dh, Math.abs(myB - oB)]    // bordes inferiores
                        ].forEach(c => { if (c[1] < bestYd) { bestYd = c[1]; bestY = c[0]; } });
                    }
                });

                if (bestX !== null) targetX = bestX;
                if (bestY !== null) targetY = bestY;

                draggingImg.x = targetX;
                draggingImg.y = targetY;
                if (typeof recomputeCADTotals === 'function') recomputeCADTotals(id);
                drawAll();
                return;
            }

            if (!drawing) return;
            if(e.type === 'touchmove') e.preventDefault();
            let p = getPos(e);
            
            let dx = Math.abs(p.x - startX);
            let dy = Math.abs(p.y - startY);
            
            if (dx < 10 && dy > 15) p.x = startX;
            else if (dy < 10 && dx > 15) p.y = startY;
            
            p = snap(p);
            
            drawAll();
            ctx.save();
            let z = window['autoZoom' + id] || 1;
            let px = window['panX' + id] || 0;
            let py = window['panY' + id] || 0;
            ctx.translate(px, py);
            ctx.scale(z, z);
            
            ctx.beginPath(); ctx.strokeStyle = '#F6B93B'; 
            ctx.moveTo(startX, startY); ctx.lineTo(p.x, p.y); ctx.stroke();
            ctx.restore();
        }

        function endDraw(e) {
            if (draggingImg) {
                draggingImg = null;
                recomputeCADTotals(id);
                window['autoFit' + id]();
                if(e.type === 'touchend') e.preventDefault();
                drawAll();
                saveProgress();
                return;
            }

            if (!drawing) return;
            if(e.type === 'touchend') e.preventDefault();
            drawing = false;
            let p = getPos(e.changedTouches ? e.changedTouches[0] : e);
            
            let dx = Math.abs(p.x - startX);
            let dy = Math.abs(p.y - startY);
            
            if (dx < 10 && dy > 15) p.x = startX;
            else if (dy < 10 && dx > 15) p.y = startY;
            
            p = snap(p);
            
            if (Math.hypot(p.x - startX, p.y - startY) > 5) {
                lines.push({x1: startX, y1: startY, x2: p.x, y2: p.y});
            }
            window['autoFit' + id](); 
            drawAll();
            saveProgress();
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', moveDraw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseleave', () => { if(drawing) endDraw(new MouseEvent('mouseup')); if(draggingImg) {draggingImg=null; window['autoFit' + id](); drawAll();} });
        
        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', moveDraw, {passive: false});
        canvas.addEventListener('touchend', endDraw, {passive: false});

        window['clearCanvas' + id] = function() {
            window['cadLines' + id] = [];
            lines = window['cadLines' + id];
            window['autoFit' + id]();
            drawAll();
            saveProgress();
        };
    }

    function clearCanvas(id) {
        if(window['clearCanvas' + id]) window['clearCanvas' + id]();
    }

    window.addEventListener('DOMContentLoaded', loadProgress);
</script>

</body>
