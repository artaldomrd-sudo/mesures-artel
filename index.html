            // cor3 / cor4_lat / cor6_lat: una hoja por riel ("N vías"), en escalera. Ninguna
            // tiene toggle de orientación (se ocultó en las 3): tanto el lado interior como la
            // dirección de la cascada se deciden con el mismo selector "Hoja interior"
            // (izquierda = interior y cascada hacia la izquierda).
            const leftIsInt = (state.cor_interior || 'I') === 'I';
            const n = cfg.n, s = segs(n);
            const dirTo = leftIsInt ? 'L' : 'R';
            for (let d = 0; d < n; d++) mainRails.push(d === 0 ? 'ext' : (d === n - 1 ? 'int' : 'r' + d));
            for (let i = 0; i < n; i++) {
                const depth = leftIsInt ? (n - 1 - i) : i; // 0 = riel exterior, n-1 = riel interior
                panels.push({ x: s[i].x, w: s[i].w, rail: mainRails[depth], dir: dirTo });
            }
            extKey = 'ext'; intKey = 'int';
        }

        // Mosquitera: hojas propias (no una pieza continua) que replican la posición de las
        // hojas del riel exterior, agregadas en un riel nuevo, el más exterior de todos.
        const mosqPanels = mosq ? panels.filter(p => p.rail === extKey).map(p => ({ x: p.x, w: p.w })) : [];
        const rails = mosq ? ['mosq', ...mainRails] : mainRails;
        // Alto disponible para los rieles fijo (viewBox de la corredera); con hasta 7 filas
        // (6 vías + mosquitera) el espaciado por defecto (7) no entra, así que se achica.
        const railGap = Math.min(7, 34 / Math.max(1, rails.length - 1));
        const railY = r => PT + rails.indexOf(r) * railGap;

        let body = '';
        rails.forEach(r => { const y = railY(r) + gt / 2; body += `<line x1="${X0}" y1="${y.toFixed(1)}" x2="${X1}" y2="${y.toFixed(1)}" stroke="#d8dde2" stroke-width="0.5" stroke-dasharray="1.5,1.5"/>`; });
        if (mosq) mosqPanels.forEach(p => { body += mosqG(p.x, railY('mosq'), p.w); });
        panels.forEach(p => { const y = railY(p.rail); body += leafG(p.x, y, p.w) + arrow(p.x + p.w / 2, y + gt / 2, p.w, p.dir); });

        const planTop = PT - 2.5, planBottom = railY(rails[rails.length - 1]) + gt + 2.5;
        const frame = `<rect x="${(X0 - 2).toFixed(1)}" y="${planTop.toFixed(1)}" width="${(X1 - X0 + 4).toFixed(1)}" height="${(planBottom - planTop).toFixed(1)}" fill="none" stroke="#0A3D62" stroke-width="1"/>`;

        let labels = lbl(X0 - 3, railY(extKey) + gt / 2 + 1, 'ext', 'end') + lbl(X0 - 3, railY(intKey) + gt / 2 + 1, 'int', 'end');
        if (mosq) labels += lbl(X0 - 3, railY('mosq') + gt / 2 + 1, 'mosq', 'end');

        return frame + head + body + labels;
    }

    // Marcas de cerradura (media luna, digital, piso) reutilizables en cualquier sistema de
    // coordenadas. edgeX = borde de cierre; dir = +1 si el vidrio está a la derecha del borde, -1 si a la izq.
    function cerraduraMarks(edgeX, dir, midY, botY, r, col, luna, dig, piso) {
        const F = n => n.toFixed(1);
        let s = '', dy = midY;
        if (luna) {
            const sweep = dir > 0 ? 1 : 0;
            s += `<path d="M ${F(edgeX)} ${F(midY - r)} A ${F(r)} ${F(r)} 0 0 ${sweep} ${F(edgeX)} ${F(midY + r)} Z" fill="${col}" stroke="none"/>`;
            dy = midY + r * 2.6;
        }
        if (dig) {
            const w = r * 0.9, x = dir > 0 ? (edgeX + r * 0.5) : (edgeX - r * 0.5 - w);
            s += `<rect x="${F(x)}" y="${F(dy - r)}" width="${F(w)}" height="${F(r * 2)}" rx="${F(r * 0.2)}" fill="${col}" stroke="none"/>`;
            for (let k = 0; k < 3; k++) s += `<circle cx="${F(x + w / 2)}" cy="${F(dy - r * 0.5 + k * r * 0.5)}" r="${F(r * 0.13)}" fill="#fff" stroke="none"/>`;
        }
        if (piso) {
            // Cerradura de piso: rectángulo en la parte baja, pegado a la esquina del borde de cierre.
            const w = r * 1.3, hgt = r * 0.9;
            const x = dir > 0 ? edgeX : (edgeX - w);
            s += `<rect x="${F(x)}" y="${F(botY - hgt)}" width="${F(w)}" height="${F(hgt)}" fill="${col}" stroke="#000" stroke-width="0.3"/>`;
        }
        return s;
    }

    // ===== Dibujo PROPORCIONAL para el CAD (dibujo libre) =====
    // El módulo del CAD tiene proporción ancho:alto (item.w=ancho*0.06, item.h=alto*0.06).
    // Aquí dibujamos el elemento llenando esa proporción, sin deformar y con el imán intacto.
    function cadTechnical(state, W, H, uid, herrajeCol) {
        const t = state.type, isD = state.orientacion === 'D';
        const cy = H / 2;
        const flip = d => isD ? (d === 'L' ? 'R' : 'L') : d;
        const arw = (cx, cy, dir, len) => {
            const h = len / 2, hh = len * 0.26;
            const ex = dir === 'L' ? cx - h : cx + h, sx = dir === 'L' ? cx + h : cx - h;
            const hx = dir === 'L' ? ex + len * 0.3 : ex - len * 0.3;
            return `<g style="stroke:#111;stroke-width:1.3;fill:none"><line x1="${sx.toFixed(1)}" y1="${cy.toFixed(1)}" x2="${ex.toFixed(1)}" y2="${cy.toFixed(1)}"/><polyline points="${hx.toFixed(1)},${(cy - hh).toFixed(1)} ${ex.toFixed(1)},${cy.toFixed(1)} ${hx.toFixed(1)},${(cy + hh).toFixed(1)}"/></g>`;
        };
        const leavesDraw = (n, dirs) => {
            let s = '';
            for (let i = 1; i < n; i++) { const x = W / n * i; s += `<line x1="${x.toFixed(1)}" y1="0" x2="${x.toFixed(1)}" y2="${H}"/>`; }
            for (let i = 0; i < n; i++) { const cx = W / n * (i + 0.5); s += arw(cx, cy, flip(dirs[i]), Math.min(W / n * 0.55, H * 0.28)); }
            return s;
        };
        const LEAF = {
            cor2: [2, ['R', 'L']], cor3: [3, ['L', 'L', 'L']], cor4_cent: [4, ['R', 'L', 'R', 'L']],
            cor4_lat: [4, ['L', 'L', 'L', 'L']], cor6_cent: [6, ['R', 'L', 'L', 'R', 'R', 'L']], cor6_lat: [6, ['L', 'L', 'L', 'L', 'L', 'L']],
            gal1: [1, ['L']], gal2_lat: [2, ['L', 'L']], gal2_cent: [2, ['L', 'R']], gal3_3v: [3, ['L', 'L', 'L']],
            gal4_2v: [4, ['L', 'L', 'R', 'R']], gal4_4v: [4, ['L', 'L', 'L', 'L']], gal6_3v: [6, ['L', 'L', 'L', 'R', 'R', 'R']]
        };
        if (LEAF[t]) return leavesDraw(LEAF[t][0], LEAF[t][1]);

        if (t === 'fachada_din') {
            let n = parseInt(state.panos) || 1, s = '';
            const isTope = state.union === 'tope';
            for (let i = 1; i < n; i++) { const x = W / n * i; s += `<line x1="${x.toFixed(1)}" y1="0" x2="${x.toFixed(1)}" y2="${H}" stroke-width="${isTope ? 0.5 : 2}"/>`; }
            for (let i = 0; i < n; i++) { const cx = W / n * (i + 0.5); s += `<text x="${cx.toFixed(1)}" y="${(cy + 3).toFixed(1)}" font-family="Arimo" font-size="${Math.min(9, W / n * 0.5).toFixed(1)}" font-weight="bold" fill="#2c3742" text-anchor="middle" stroke="none">F</text>`; }
            return s;
        }
        const two = state.apertura && state.apertura.includes('2');
        if (t === 'win_abat') {
            if (two) return `<line x1="${W / 2}" y1="0" x2="${W / 2}" y2="${H}"/><path d="M0 0 L${W / 2} ${cy} L0 ${H} M${W} 0 L${W / 2} ${cy} L${W} ${H}"/>`;
            return isD ? `<path d="M${W} 0 L0 ${cy} L${W} ${H}"/>` : `<path d="M0 0 L${W} ${cy} L0 ${H}"/>`;
        }
        if (t === 'win_souf') return `<path d="M0 ${H} L${W / 2} 0 L${W} ${H}"/>`;
        if (t === 'win_proy') return `<path d="M0 0 L${W / 2} ${H} L${W} 0"/>`;
        if (t === 'win_ob') return `<path d="${isD ? `M${W} 0 L0 ${cy} L${W} ${H}` : `M0 0 L${W} ${cy} L0 ${H}`} M0 ${H} L${W / 2} 0 L${W} ${H}"/>`;
        if (t === 'door_abat') {
            if (two) return `<line x1="${W / 2}" y1="0" x2="${W / 2}" y2="${H}"/><path d="M0 0 L${W / 2} ${cy} L0 ${H} M${W} 0 L${W / 2} ${cy} L${W} ${H}"/>`;
            return isD ? `<path d="M${W} 0 L0 ${cy} L${W} ${H}"/>` : `<path d="M0 0 L${W} ${cy} L0 ${H}"/>`;
        }
        const hs = Math.max(2.4, Math.min(W, H) * 0.045); // tamaño base de herrajes (más visible)
        const knob = (x, y, r) => `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r.toFixed(1)}" fill="${herrajeCol}" stroke="#000" stroke-width="0.5"/><circle cx="${(x - r * 0.3).toFixed(1)}" cy="${(y - r * 0.3).toFixed(1)}" r="${(r * 0.34).toFixed(1)}" fill="#fff" fill-opacity="0.65" stroke="none"/>`;
        const barSizes = { '5': 0.14, '8': 0.22, '12': 0.32, '16': 0.44 };
        // Moldura U perimetral (marco fino) en negro o blanco
        const moldFrame = (color) => {
            const mcol = color === 'blanco' ? '#eef0f2' : '#1a1a1a';
            const mstroke = color === 'blanco' ? '#b7bec4' : '#000000';
            const tW = Math.max(1.2, Math.min(W, H) * 0.016);
            const bar = (x, y, w, h) => `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" fill="${mcol}" stroke="${mstroke}" stroke-width="0.3"/>`;
            return bar(0, 0, W, tW) + bar(0, H - tW, W, tW) + bar(0, 0, tW, H) + bar(W - tW, 0, tW, H);
        };
        if (t === 'door_glass') {
            let s = '';
            const hingeLeft = !isD;
            const hx = hingeLeft ? W * 0.05 : W * 0.95;
            const hw = Math.max(2.4, W * 0.06);
            if (state.bisagras === 'bisagra') {
                [0.20, 0.80].forEach(fy => { s += `<rect x="${(hx - hw / 2).toFixed(1)}" y="${(H * fy).toFixed(1)}" width="${hw.toFixed(1)}" height="${(H * 0.06).toFixed(1)}" fill="${herrajeCol}" stroke="#000" stroke-width="0.4"/>`; });
            } else {
                [0.015, 0.94].forEach(fy => { s += `<rect x="${(hx - hw / 2).toFixed(1)}" y="${(H * fy).toFixed(1)}" width="${hw.toFixed(1)}" height="${(H * 0.045).toFixed(1)}" fill="${herrajeCol}" stroke="#000" stroke-width="0.4"/>`; });
            }
            const lx = hingeLeft ? W * 0.72 : W * 0.28;
            if (['5', '8', '12', '16'].includes(state.tirador)) { const bh = barSizes[state.tirador] * H; s += `<rect x="${(lx - hw * 0.28).toFixed(1)}" y="${(cy - bh / 2).toFixed(1)}" width="${(hw * 0.56).toFixed(1)}" height="${bh.toFixed(1)}" rx="${(hw * 0.28).toFixed(1)}" fill="${herrajeCol}" stroke="#000" stroke-width="0.4"/>`; }
            else if (state.tirador === 'redondo') s += knob(lx, cy, hs);
            const eX = hingeLeft ? W * 0.96 : W * 0.04, dr = hingeLeft ? -1 : 1;
            s += cerraduraMarks(eX, dr, cy, H * 0.99, Math.max(hs, W * 0.1), herrajeCol, state.cerr_luna || state.cerradura_tipo === 'central', state.cerr_digital || state.cerradura_tipo === 'digital', state.cerr_piso || state.cerradura_piso === 'si');
            if (state.moldura && state.moldura !== 'no') s += moldFrame(state.moldura);
            return s;
        }
        if (t === 'door_slide') {
            const openLeft = !isD;
            let s = '';
            const railH = Math.max(3, H * 0.035);
            // riel: recorre todo el ancho y llega al borde por el lado de deslizamiento (donde va la
            // puerta), con tope en el lado de cierre para marcar la dirección.
            s += `<rect x="0" y="0" width="${W}" height="${railH.toFixed(1)}" fill="${herrajeCol}" stroke="#000" stroke-width="0.4"/>`;
            const capX = openLeft ? W - 1.6 : 0;
            s += `<rect x="${capX.toFixed(1)}" y="-0.6" width="1.6" height="${(railH + 1.2).toFixed(1)}" fill="${herrajeCol}" stroke="none"/>`;
            // colgadores
            [0.28, 0.72].forEach(fx => { s += `<rect x="${(W * fx - hs).toFixed(1)}" y="${railH.toFixed(1)}" width="${(hs * 2).toFixed(1)}" height="${(railH * 1.4).toFixed(1)}" rx="0.8" fill="${herrajeCol}" stroke="#000" stroke-width="0.4"/>`; });
            const lx = openLeft ? W * 0.68 : W * 0.32;
            if (['5', '8', '12', '16'].includes(state.tirador)) { const bh = barSizes[state.tirador] * H, bw = Math.max(2.4, W * 0.06); s += `<rect x="${(lx - bw * 0.28).toFixed(1)}" y="${(cy - bh / 2).toFixed(1)}" width="${(bw * 0.56).toFixed(1)}" height="${bh.toFixed(1)}" rx="${(bw * 0.28).toFixed(1)}" fill="${herrajeCol}" stroke="#000" stroke-width="0.4"/>`; }
            else s += knob(lx, cy, hs);
            const eX2 = openLeft ? W * 0.96 : W * 0.04, dr2 = openLeft ? -1 : 1;
            s += cerraduraMarks(eX2, dr2, cy, H * 0.99, Math.max(hs, W * 0.1), herrajeCol, state.cerr_luna, state.cerr_digital, state.cerr_piso);
            s += arw(W / 2, cy + H * 0.1, openLeft ? 'L' : 'R', Math.min(W * 0.34, H * 0.18));
            if (state.moldura && state.moldura !== 'no') s += moldFrame(state.moldura);
            return s;
        }
        if (t === 'mamp_fija') {
            // Moldura U: marco perimetral en negro o blanco (sin conectores)
            if (state.fijacion === 'moldura') return moldFrame(state.moldura_color);
            // conectores (fijaciones a pared): 2 en el lado de fijación (según orientación) y
            // 1 en la parte baja del lado libre. orientación D = pared a la derecha.
            const conn = (x, y) => `<rect x="${(x - hs).toFixed(1)}" y="${(y - hs).toFixed(1)}" width="${(hs * 2).toFixed(1)}" height="${(hs * 2).toFixed(1)}" rx="0.6" fill="${herrajeCol}" stroke="#000" stroke-width="0.4"/><circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${(hs * 0.42).toFixed(1)}" fill="#cdd9e3" stroke="none"/>`;
            const mx = hs * 1.6, my = hs * 1.6;
            const wallLeft = !isD;
            const wallX = wallLeft ? mx : (W - mx);
            const freeBottomX = wallLeft ? (W * 0.72) : (W * 0.28);
            return conn(wallX, H * 0.25) + conn(wallX, H * 0.75) + conn(freeBottomX, H - my);
        }
        return '';
    }

    function renderCADProportional(state, uid) {
        const ancho = state.ancho > 0 ? state.ancho : 0, alto = state.alto > 0 ? state.alto : 0;
        const W = 100;
        let H = (ancho > 0 && alto > 0) ? (100 * alto / ancho) : 60;
        H = Math.max(16, Math.min(600, H));
        const glassOnly = (state.categoria === 'mampara' || state.categoria === 'puerta_vidrio');
        const panelFn = glassOnly ? glassOnlyPanel : extrudedPanel;
        const tk = glassOnly ? 1.8 : 2.5;
        const herrajeCol = state.herraje_color === 'negro' ? '#111111' : '#8d99a4';

        let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H.toFixed(1)}" preserveAspectRatio="none" width="100%" height="100%" style="stroke:#0A3D62; fill:none; stroke-linecap:round; stroke-linejoin:round;">`;
        svg += glassDefs(uid, state.color_vidrio);
        svg += `<style>path, rect, line, circle, polyline, polygon { vector-effect: non-scaling-stroke; stroke-width: 1.5px; }</style>`;
        const glass = panelFn(uid, 0, 0, W - tk, H - tk);
        const tech = cadTechnical(state, W, H, uid, herrajeCol);
        svg += `<g>${glass}${tech}</g></svg>`;
        return applyFinish(svg, state.color_perfil, state.color_ral);
    }

    // ===== FACHADA DE DUCHA (constructor de paneles) =====
    function refreshFacade(id, rebuildUI) {
        const st = cardsState[id];
        st.ancho = (st.paneles || []).reduce((a, p) => a + (parseInt(p.ancho) || 0), 0);
        const c = document.getElementById('schematic-' + id);
        if (c) c.innerHTML = renderSVG(id);
        if (rebuildUI) {
            const b = document.getElementById('facade-builder-' + id);
            if (b) b.innerHTML = renderFacadeBuilder(id);
        }
        if (st.locked) generateSummary(id);
        saveProgress();
    }
    window.facadeAddPanel = function (id, tipo) {
        tipo = tipo || 'fijo';
        const panel = { tipo, ancho: (tipo === 'fijo' ? 600 : 800), color_vidrio: 'natural', vidrio: 'templado', espesor: '10mm', herraje_color: 'cromado' };
        if (tipo !== 'fijo') { panel.orientacion = 'I'; panel.tirador = 'redondo'; if (tipo === 'puerta') panel.bisagras = 'botella'; }
        (cardsState[id].paneles = cardsState[id].paneles || []).push(panel);
        refreshFacade(id, true);
    };
    window.facadeInvert = function (id) {
        const p = cardsState[id].paneles || [];
        p.reverse();
        p.forEach(pan => { pan.orientacion = ((pan.orientacion || 'I') === 'D' ? 'I' : 'D'); });
        refreshFacade(id, true);
    };
    window.facadeInvertPanel = function (id, i) {
        const p = cardsState[id].paneles[i]; if (!p) return;
        p.orientacion = ((p.orientacion || 'I') === 'D' ? 'I' : 'D');
        refreshFacade(id, true);
    };
    window.facadeRemovePanel = function (id, i) {
        const p = cardsState[id].paneles;
        if (!p || p.length <= 1) { alert('Debe quedar al menos un panel.'); return; }
        p.splice(i, 1);
        refreshFacade(id, true);
    };
    window.facadeUpdatePanel = function (id, i, key, value) {
        const p = cardsState[id].paneles[i]; if (!p) return;
        if (key === 'ancho') p.ancho = parseInt(String(value).replace(/\D/g, '')) || 0;
        else p[key] = value;
        if (key === 'espesor') { if (['3+3', '4+4', '5+5', '6+6'].includes(value)) p.vidrio = 'laminado'; else if (['10mm', '12mm'].includes(value)) p.vidrio = 'templado'; }
        refreshFacade(id, key === 'fijacion');
    };
    window.facadeSetTipo = function (id, i, tipo) {
        const p = cardsState[id].paneles[i]; if (!p) return;
        p.tipo = tipo;
        if (tipo !== 'fijo' && !p.orientacion) p.orientacion = 'I';
        if (tipo !== 'fijo' && !p.tirador) p.tirador = 'redondo';
        refreshFacade(id, true);
    };

    function renderPanelOptions(id, i, p) {
        const u = (k, v) => `facadeUpdatePanel(${id}, ${i}, '${k}', ${v})`;
        const cv = p.color_vidrio || 'natural';
        const colorVidrio = `<select onchange="${u('color_vidrio', 'this.value')}"><option value="natural" ${cv === 'natural' ? 'selected' : ''}>Vidrio Natural</option><option value="negro" ${cv === 'negro' ? 'selected' : ''}>Vidrio Negro</option><option value="azul" ${cv === 'azul' ? 'selected' : ''}>Vidrio Azul</option><option value="esmerilado" ${cv === 'esmerilado' ? 'selected' : ''}>Esmerilado</option></select>`;
        const es = p.espesor || '';
        const grosor = `<select onchange="${u('espesor', 'this.value')}"><option value="" ${es === '' ? 'selected' : ''}>-- Grosor --</option><option value="10mm" ${es === '10mm' ? 'selected' : ''}>3/8" (10mm)</option><option value="12mm" ${es === '12mm' ? 'selected' : ''}>1/2" (12mm)</option><option value="3+3" ${es === '3+3' ? 'selected' : ''}>3+3</option><option value="4+4" ${es === '4+4' ? 'selected' : ''}>4+4</option><option value="5+5" ${es === '5+5' ? 'selected' : ''}>5+5</option><option value="6+6" ${es === '6+6' ? 'selected' : ''}>6+6</option></select>`;
        const hc = p.herraje_color || 'cromado';
        const herr = `<select onchange="${u('herraje_color', 'this.value')}"><option value="cromado" ${hc === 'cromado' ? 'selected' : ''}>Herraje Cromado</option><option value="negro" ${hc === 'negro' ? 'selected' : ''}>Herraje Negro</option></select>`;
        const ori = p.orientacion || 'I';
        const orient = `<select onchange="${u('orientacion', 'this.value')}"><option value="I" ${ori === 'I' ? 'selected' : ''}>Abre a la Izquierda</option><option value="D" ${ori === 'D' ? 'selected' : ''}>Abre a la Derecha</option></select>`;
        const tir = p.tirador || '';
        const tirador = `<select onchange="${u('tirador', 'this.value')}"><option value="" ${tir === '' ? 'selected' : ''}>-- Sin Tirador --</option><option value="redondo" ${tir === 'redondo' ? 'selected' : ''}>Tirador Redondo</option><option value="5" ${tir === '5' ? 'selected' : ''}>Tirador 5"</option><option value="8" ${tir === '8' ? 'selected' : ''}>Tirador 8"</option><option value="12" ${tir === '12' ? 'selected' : ''}>Tirador 12"</option><option value="16" ${tir === '16' ? 'selected' : ''}>Tirador 16"</option></select>`;
        const bis = p.bisagras || 'botella';
        const bisagras = `<select onchange="${u('bisagras', 'this.value')}"><option value="botella" ${bis === 'botella' ? 'selected' : ''}>Kit Botella</option><option value="bisagra" ${bis === 'bisagra' ? 'selected' : ''}>Bisagras Laterales</option></select>`;
        const cerr = `<div style="grid-column:span 2; display:flex; gap:10px; align-items:center; background:#f4f7f9; border:1px solid #e1e7ec; border-radius:3px; padding:4px 7px; font-size:11px;"><b style="color:#0A3D62;">Cerradura:</b><label style="display:flex;gap:3px;align-items:center;cursor:pointer;"><input type="checkbox" ${p.cerr_luna ? 'checked' : ''} onchange="${u('cerr_luna', 'this.checked')}">Luna</label><label style="display:flex;gap:3px;align-items:center;cursor:pointer;"><input type="checkbox" ${p.cerr_digital ? 'checked' : ''} onchange="${u('cerr_digital', 'this.checked')}">Digital</label><label style="display:flex;gap:3px;align-items:center;cursor:pointer;"><input type="checkbox" ${p.cerr_piso ? 'checked' : ''} onchange="${u('cerr_piso', 'this.checked')}">Piso</label></div>`;
        if (p.tipo === 'fijo') {
            const fj = p.fijacion || 'conectores';
            const fijSel = `<select onchange="${u('fijacion', 'this.value')}"><option value="conectores" ${fj === 'conectores' ? 'selected' : ''}>Fijación: Conectores</option><option value="moldura" ${fj === 'moldura' ? 'selected' : ''}>Fijación: Moldura U</option></select>`;
            if (fj === 'moldura') {
                const mc = p.moldura_color || 'negro';
                const moldSel = `<select onchange="${u('moldura_color', 'this.value')}"><option value="negro" ${mc === 'negro' ? 'selected' : ''}>Moldura Negra</option><option value="blanco" ${mc === 'blanco' ? 'selected' : ''}>Moldura Blanca</option></select>`;
                return colorVidrio + grosor + fijSel + moldSel;
            }
            return colorVidrio + grosor + fijSel + herr;
        }
        const md = p.moldura || 'no';
        const molduraDoor = `<select onchange="${u('moldura', 'this.value')}"><option value="no" ${md === 'no' ? 'selected' : ''}>Sin Moldura</option><option value="negro" ${md === 'negro' ? 'selected' : ''}>Moldura Negra</option><option value="blanco" ${md === 'blanco' ? 'selected' : ''}>Moldura Blanca</option></select>`;
        if (p.tipo === 'deslizante') return tirador + herr + molduraDoor + colorVidrio + grosor + cerr;
        return bisagras + tirador + herr + molduraDoor + colorVidrio + grosor + cerr; // puerta abisagrada
    }

    function renderFacadeBuilder(id) {
        const paneles = cardsState[id].paneles || [];
        let h = '<div style="display:flex; flex-direction:column; gap:6px;">';
        paneles.forEach((p, i) => {
            h += `<div style="border:1px solid #d7dde3; border-radius:6px; padding:7px; background:#fbfcfd;">
                <div style="display:flex; gap:6px; align-items:center; margin-bottom:5px;">
                    <b style="color:#0A3D62; font-size:12px; white-space:nowrap;">Panel ${i + 1}</b>
                    <select onchange="facadeSetTipo(${id}, ${i}, this.value)" style="flex:1;"><option value="fijo" ${p.tipo === 'fijo' ? 'selected' : ''}>Mampara (Fijo)</option><option value="puerta" ${p.tipo === 'puerta' ? 'selected' : ''}>Puerta Abisagrada</option><option value="deslizante" ${p.tipo === 'deslizante' ? 'selected' : ''}>Puerta Deslizante</option></select>
                    <input type="number" inputmode="numeric" value="${p.ancho || ''}" placeholder="Ancho mm" style="width:70px; padding:5px; border:1px solid #ccc; border-radius:3px;" oninput="facadeUpdatePanel(${id}, ${i}, 'ancho', this.value)">
                    ${(p.tipo === 'fijo' && (p.fijacion || 'conectores') === 'moldura') ? '' : `<button onclick="facadeInvertPanel(${id}, ${i})" title="Invertir este panel (lado de fijación / apertura)" style="background:#f39c12; color:#fff; border:none; border-radius:3px; width:26px; height:26px; cursor:pointer; font-weight:bold;">&#8646;</button>`}
                    <button onclick="facadeRemovePanel(${id}, ${i})" title="Borrar panel" style="background:#e74c3c; color:#fff; border:none; border-radius:3px; width:26px; height:26px; cursor:pointer; font-weight:bold;">×</button>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">${renderPanelOptions(id, i, p)}</div>
            </div>`;
        });
        h += '</div>';
        h += `<div style="display:flex; gap:6px; margin-top:8px;">
            <select onchange="if(this.value){ facadeAddPanel(${id}, this.value); this.value=''; }" style="flex:1; background:var(--artal-blue); color:#fff; font-weight:bold; border:none; border-radius:4px; padding:9px; cursor:pointer;">
                <option value="">+ Agregar...</option>
                <option value="fijo">Mampara (Panel Fijo)</option>
                <option value="puerta">Puerta Abisagrada</option>
                <option value="deslizante">Puerta Deslizante</option>
            </select>
            <button onclick="facadeInvert(${id})" title="Invertir el sentido de la fachada" style="background:#f39c12; color:#fff; border:none; border-radius:4px; padding:9px 14px; font-weight:bold; cursor:pointer; white-space:nowrap;">&#8646; Invertir</button>
        </div>`;
        return h;
    }

    function renderFacade(state, uid) {
        const paneles = (state.paneles && state.paneles.length) ? state.paneles : [{ tipo: 'fijo', ancho: 800 }];
        const alto = state.alto > 0 ? state.alto : 2000;
        const widths = paneles.map(p => Math.max(200, parseInt(p.ancho) || 800));
        const total = widths.reduce((a, b) => a + b, 0);
        const DW = 100, scale = DW / total, Hd = alto * scale;
        const headTop = Math.max(5, Hd * 0.14);
        const tipoMap = { fijo: 'mamp_fija', puerta: 'door_glass', deslizante: 'door_slide' };
        let defs = '', body = '', xoff = 0;
        const layout = [];
        paneles.forEach((p, i) => {
            const wi = widths[i] * scale, puid = `${uid}f${i}`;
            const herrajeCol = p.herraje_color === 'negro' ? '#111111' : '#8d99a4';
            const mini = { type: tipoMap[p.tipo] || 'mamp_fija', categoria: (p.tipo === 'fijo' ? 'mampara' : 'puerta_vidrio'), orientacion: p.orientacion || 'I', bisagras: p.bisagras || 'botella', tirador: p.tirador || '', cerr_luna: p.cerr_luna, cerr_digital: p.cerr_digital, cerr_piso: p.cerr_piso, herraje_color: p.herraje_color, color_vidrio: p.color_vidrio, fijacion: p.fijacion, moldura_color: p.moldura_color, moldura: p.moldura };
            defs += glassDefs(puid, p.color_vidrio);
            body += `<g transform="translate(${xoff.toFixed(2)}, ${headTop.toFixed(2)})">`;
            body += glassOnlyPanel(puid, 0, 0, wi - 1.8, Hd - 1.8);
            body += cadTechnical(mini, wi, Hd, puid, herrajeCol);
            body += `</g>`;
            layout.push({ x: xoff, w: wi, p });
            xoff += wi;
        });
        // Riel de las deslizantes: una sola pieza continua que llega hasta el extremo del lado
        // por donde desliza la puerta (cubre la mampara vecina). Se dibuja encima para que no
        // se vea corte entre el riel de la puerta y su prolongación.
        layout.forEach((L, i) => {
            if (L.p.tipo !== 'deslizante') return;
            const openLeft = (L.p.orientacion || 'I') !== 'D';
            const col = L.p.herraje_color === 'negro' ? '#111111' : '#8d99a4';
            const railH = Math.max(3, Hd * 0.035);
            let x1, x2, capX;
            if (openLeft) { x1 = 0; x2 = L.x + L.w; capX = x2 - 1.6; }
            else { x1 = L.x; x2 = DW; capX = x1; }
            body += `<rect x="${x1.toFixed(2)}" y="${headTop.toFixed(2)}" width="${(x2 - x1).toFixed(2)}" height="${railH.toFixed(2)}" fill="${col}" stroke="#000" stroke-width="0.3"/>`;
            body += `<rect x="${capX.toFixed(2)}" y="${(headTop - 0.6).toFixed(2)}" width="1.6" height="${(railH + 1.2).toFixed(2)}" fill="${col}" stroke="none"/>`;
        });
        // Etiquetas de ancho por panel y alto total
        let labels = '';
        layout.forEach(L => { if (L.p.ancho > 0) labels += dimLineH(L.x, L.x + L.w, headTop - 3, headTop, `${L.p.ancho} mm`, 6); });
        if (alto > 0) labels += dimLineV(headTop, headTop + Hd, DW + 4, DW, `${alto} mm`, 6);
        const vbH = headTop + Hd + 4;
        let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="-6 -3 ${(DW + 24).toFixed(1)} ${(vbH + 4).toFixed(1)}" preserveAspectRatio="xMidYMid meet" width="100%" height="100%" style="stroke:#0A3D62; fill:none; stroke-linecap:round; stroke-linejoin:round;">`;
        svg += defs;
        svg += `<style>path, rect, line, circle, polyline, polygon { vector-effect: non-scaling-stroke; stroke-width: 1.5px; }</style>`;
        svg += body + labels + '</svg>';
        return svg;
    }

    function renderSVG(id) {
        const state = cardsState[id];
        if (state.categoria === 'baranda') return applyFinish(renderBaranda(state, id), state.color_perfil, state.color_ral);
        if (state.categoria === 'ducha') return applyFinish(renderDucha(state, id), state.color_perfil, state.color_ral);
        if (state.categoria === 'cerramiento') return renderFacade(state, id);

        const isCAD = (id === 'temp');
        const uid = id;
        if (isCAD) return renderCADProportional(state, uid);

        let bx = 10, by = 5, bw = 80, bh = 50;
        if (state.categoria === 'corredera') { bx = 10; by = 10; bw = 80; bh = 40; }
        else if (state.categoria === 'galandaje') { bx = 5; by = 10; bw = 90; bh = 40; }
        else if (state.type === 'win_proy' || state.type === 'win_souf') { bx = 25; by = 15; bw = 50; bh = 30; }
        else if (state.type === 'win_abat' || state.type === 'win_ob') { bx = 30; by = 10; bw = 40; bh = 40; }
        else if (state.type === 'door_abat') { bx = 35; by = 5; bw = 30; bh = 50; }
        else if (state.categoria === 'mampara' || state.categoria === 'puerta_vidrio') { bx = 30; by = 5; bw = 40; bh = 50; }

        const hasPlan = ['win_abat', 'door_abat', 'win_ob'].includes(state.type);
        // En modo CAD el viewBox se ajusta al panel de vidrio (llenando el módulo) para que los
        // módulos se unan vidrio-con-vidrio al pegarse (imán, fachada compuesta sin huecos).
        let viewBox, aspect;
        if (isCAD) {
            let pr = (getPanelRects(state) || [])[0] || [bx, by, bw, bh];
            if (state.type === 'door_slide') pr = [30, 2, 40, 54]; // incluir el riel superior
            viewBox = `${pr[0]} ${pr[1]} ${pr[2]} ${pr[3]}`;
            aspect = 'none';
        } else {
            viewBox = (state.categoria === 'galandaje' || state.categoria === 'corredera') ? '-14 -6 144 112' : (hasPlan ? '-14 -8 144 118' : '-14 -6 144 70');
            aspect = 'xMidYMid meet';
        }

        let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${viewBox}" preserveAspectRatio="${aspect}" width="100%" height="100%" style="stroke:#0A3D62; fill:none; stroke-linecap:round; stroke-linejoin:round;">`;
        svg += glassDefs(uid, state.color_vidrio);
        svg += `<style>path, rect, line, circle, polyline, polygon { vector-effect: non-scaling-stroke; stroke-width: 1.5px; }</style>`;

        const ladrilloIzq = wallBlock(uid, 4, 9, 16, 44);
        const ladrilloDer = wallBlock(uid, 80, 9, 16, 44);

        // Flechas de apertura SIEMPRE negras (no cambian con el acabado, visibles sobre cualquier vidrio)
        const arrowL = '<g style="stroke:#111111;stroke-width:2px"><line x1="-4" y1="0" x2="4" y2="0"/><polyline points="0,-3 -4,0 0,3"/></g>';
        const arrowR = '<g style="stroke:#111111;stroke-width:2px"><line x1="-4" y1="0" x2="4" y2="0"/><polyline points="0,-3 4,0 0,3"/></g>';

        const putArrow = (x, y) => `<g transform="translate(${x}, ${y})">${state.orientacion === 'D' ? arrowR : arrowL}</g>`;
        const putArrowInv = (x, y) => `<g transform="translate(${x}, ${y})">${state.orientacion === 'D' ? arrowL : arrowR}</g>`;
        // cor3 / cor4_lat / cor6_lat: tienen su propio toggle de orientación (independiente de
        // "Hoja interior", que solo decide el riel en la vista de planta) — mismas flechas que
        // putArrow.
        const putArrowCorStair = putArrow;

        const drawPlanView = (type, stateInfo) => {
            let is2Hojas = stateInfo.apertura && stateInfo.apertura.includes('2');
            let opensAfuera = stateInfo.apertura && stateInfo.apertura.includes('afuera');
            if (type === 'win_ob') opensAfuera = false;

            let vistaAfuera = stateInfo.vista === 'afuera';
            let opensTowardsViewer = (vistaAfuera && opensAfuera) || (!vistaAfuera && !opensAfuera);
            let dirY = opensTowardsViewer ? 1 : -1;

            let y0 = 85;
            let html = `<line x1="15" y1="${y0}" x2="85" y2="${y0}" style="stroke-width: 2.5px; stroke:#bdc3c7;"/>`;

            let w = type === 'door_abat' ? 30 : 40;
            let startX = type === 'door_abat' ? 35 : 30;
            let centerX = 50;

            if (is2Hojas) {
                let r = w / 2;
                let dx = r * 0.866;
                let dy = r * 0.5 * dirY;

                html += `<line x1="${startX}" y1="${y0}" x2="${startX + dx}" y2="${y0 + dy}" style="stroke:#0A3D62;"/>`;
                html += `<path d="M ${centerX} ${y0} A ${r} ${r} 0 0 ${dirY > 0 ? 1 : 0} ${startX + dx} ${y0 + dy}" stroke-dasharray="2,2" stroke-width="1" fill="none" style="stroke:#0A3D62;"/>`;

                html += `<line x1="${startX + w}" y1="${y0}" x2="${startX + w - dx}" y2="${y0 + dy}" style="stroke:#0A3D62;"/>`;
                html += `<path d="M ${centerX} ${y0} A ${r} ${r} 0 0 ${dirY > 0 ? 0 : 1} ${startX + w - dx} ${y0 + dy}" stroke-dasharray="2,2" stroke-width="1" fill="none" style="stroke:#0A3D62;"/>`;
            } else {
                let r = w * 0.875;
                let hingeX = startX;
                let freeX = startX + w;
                let dx = r * 0.866;
                let dy = r * 0.5 * dirY;
                let endX = hingeX + dx;
                let endY = y0 + dy;

                let sweep = dirY > 0 ? 1 : 0;

                html += `<line x1="${hingeX}" y1="${y0}" x2="${endX}" y2="${endY}" style="stroke:#0A3D62;"/>`;
                html += `<path d="M ${freeX} ${y0} A ${r} ${r} 0 0 ${sweep} ${endX} ${endY}" stroke-dasharray="2,2" stroke-width="1" fill="none" style="stroke:#0A3D62;"/>`;
            }
            return html;
        };

        let drawing = '';
        const isD = state.orientacion === 'D';
        // Color de herrajes (rieles, colgadores, bisagras, tirador) según selección negro/cromado.
        const herrajeCol = state.herraje_color === 'negro' ? '#111111' : '#8d99a4';

        switch (state.type) {
            case 'cor2':
                drawing += '<rect x="10" y="10" width="80" height="40"/><line x1="50" y1="10" x2="50" y2="50"/>';
                drawing += `<g transform="translate(30, 30)">${arrowR}</g><g transform="translate(70, 30)">${arrowL}</g>`;
                break;
            case 'cor3':
                drawing += '<rect x="10" y="10" width="80" height="40"/><line x1="36.6" y1="10" x2="36.6" y2="50"/><line x1="63.3" y1="10" x2="63.3" y2="50"/>';
                drawing += putArrowCorStair(23.3, 30) + putArrowCorStair(50, 30) + putArrowCorStair(76.6, 30);
                break;
            case 'cor4_cent':
                drawing += '<rect x="10" y="10" width="80" height="40"/><line x1="30" y1="10" x2="30" y2="50"/><line x1="50" y1="10" x2="50" y2="50"/><line x1="70" y1="10" x2="70" y2="50"/>';
                drawing += putArrowInv(20, 30) + putArrow(40, 30) + putArrowInv(60, 30) + putArrow(80, 30);
                break;
            case 'cor4_lat':
                drawing += '<rect x="10" y="10" width="80" height="40"/><line x1="30" y1="10" x2="30" y2="50"/><line x1="50" y1="10" x2="50" y2="50"/><line x1="70" y1="10" x2="70" y2="50"/>';
                drawing += putArrowCorStair(20, 30) + putArrowCorStair(40, 30) + putArrowCorStair(60, 30) + putArrowCorStair(80, 30);
                break;
            case 'cor6_cent':
                drawing += '<rect x="10" y="10" width="80" height="40"/><line x1="23.3" y1="10" x2="23.3" y2="50"/><line x1="36.6" y1="10" x2="36.6" y2="50"/><line x1="50" y1="10" x2="50" y2="50"/><line x1="63.3" y1="10" x2="63.3" y2="50"/><line x1="76.6" y1="10" x2="76.6" y2="50"/>';
                drawing += `<g transform="translate(16.6,30)">${arrowR}</g><g transform="translate(30,30)">${arrowL}</g><g transform="translate(43.3,30)">${arrowL}</g><g transform="translate(56.6,30)">${arrowR}</g><g transform="translate(70,30)">${arrowR}</g><g transform="translate(83.3,30)">${arrowL}</g>`;
                break;
            case 'cor6_lat':
                drawing += '<rect x="10" y="10" width="80" height="40"/><line x1="23.3" y1="10" x2="23.3" y2="50"/><line x1="36.6" y1="10" x2="36.6" y2="50"/><line x1="50" y1="10" x2="50" y2="50"/><line x1="63.3" y1="10" x2="63.3" y2="50"/><line x1="76.6" y1="10" x2="76.6" y2="50"/>';
                drawing += putArrowCorStair(16.6, 30) + putArrowCorStair(30, 30) + putArrowCorStair(43.3, 30) + putArrowCorStair(56.6, 30) + putArrowCorStair(70, 30) + putArrowCorStair(83.3, 30);
                break;

            case 'gal1':
                drawing += isD ? (ladrilloDer + '<rect x="10" y="10" width="70" height="40"/>' + `<g transform="translate(45,30)">${arrowR}</g>`)
                    : (ladrilloIzq + '<rect x="20" y="10" width="70" height="40"/>' + `<g transform="translate(55,30)">${arrowL}</g>`);
                break;
            case 'gal2_lat':
                drawing += isD ? (ladrilloDer + '<rect x="10" y="10" width="70" height="40"/><line x1="45" y1="10" x2="45" y2="50"/>' + `<g transform="translate(27.5,30)">${arrowR}</g><g transform="translate(62.5,30)">${arrowR}</g>`)
                    : (ladrilloIzq + '<rect x="20" y="10" width="70" height="40"/><line x1="55" y1="10" x2="55" y2="50"/>' + `<g transform="translate(37.5,30)">${arrowL}</g><g transform="translate(72.5,30)">${arrowL}</g>`);
                break;
            case 'gal2_cent':
                drawing += ladrilloIzq + ladrilloDer + '<rect x="20" y="10" width="60" height="40"/><line x1="50" y1="10" x2="50" y2="50"/>';
                drawing += `<g transform="translate(35,30)">${arrowL}</g><g transform="translate(65,30)">${arrowR}</g>`;
                break;
            case 'gal3_3v':
                drawing += isD ? (ladrilloDer + '<rect x="5" y="10" width="75" height="40"/><line x1="30" y1="10" x2="30" y2="50"/><line x1="55" y1="10" x2="55" y2="50"/>' + `<g transform="translate(17.5,30)">${arrowR}</g><g transform="translate(42.5,30)">${arrowR}</g><g transform="translate(67.5,30)">${arrowR}</g>`)
                    : (ladrilloIzq + '<rect x="20" y="10" width="75" height="40"/><line x1="45" y1="10" x2="45" y2="50"/><line x1="70" y1="10" x2="70" y2="50"/>' + `<g transform="translate(32.5,30)">${arrowL}</g><g transform="translate(57.5,30)">${arrowL}</g><g transform="translate(82.5,30)">${arrowL}</g>`);
                break;
            case 'gal4_2v':
                drawing += ladrilloIzq + ladrilloDer + '<rect x="20" y="10" width="60" height="40"/><line x1="35" y1="10" x2="35" y2="50"/><line x1="50" y1="10" x2="50" y2="50"/><line x1="65" y1="10" x2="65" y2="50"/>';
                drawing += `<g transform="translate(27.5,30)">${arrowL}</g><g transform="translate(42.5,30)">${arrowL}</g><g transform="translate(57.5,30)">${arrowR}</g><g transform="translate(72.5,30)">${arrowR}</g>`;
                break;
            case 'gal4_4v':
                drawing += isD ? (ladrilloDer + '<rect x="0" y="10" width="80" height="40"/><line x1="20" y1="10" x2="20" y2="50"/><line x1="40" y1="10" x2="40" y2="50"/><line x1="60" y1="10" x2="60" y2="50"/>' + `<g transform="translate(10,30)">${arrowR}</g><g transform="translate(30,30)">${arrowR}</g><g transform="translate(50,30)">${arrowR}</g><g transform="translate(70,30)">${arrowR}</g>`)
                    : (ladrilloIzq + '<rect x="20" y="10" width="80" height="40"/><line x1="40" y1="10" x2="40" y2="50"/><line x1="60" y1="10" x2="60" y2="50"/><line x1="80" y1="10" x2="80" y2="50"/>' + `<g transform="translate(30,30)">${arrowL}</g><g transform="translate(50,30)">${arrowL}</g><g transform="translate(70,30)">${arrowL}</g><g transform="translate(90,30)">${arrowL}</g>`);
                break;
            case 'gal6_3v':
                drawing += ladrilloIzq + ladrilloDer + '<rect x="20" y="10" width="60" height="40"/><line x1="30" y1="10" x2="30" y2="50"/><line x1="40" y1="10" x2="40" y2="50"/><line x1="50" y1="10" x2="50" y2="50"/><line x1="60" y1="10" x2="60" y2="50"/><line x1="70" y1="10" x2="70" y2="50"/>';
                drawing += `<g transform="translate(25,30)">${arrowL}</g><g transform="translate(35,30)">${arrowL}</g><g transform="translate(45,30)">${arrowL}</g><g transform="translate(55,30)">${arrowR}</g><g transform="translate(65,30)">${arrowR}</g><g transform="translate(75,30)">${arrowR}</g>`;
                break;

            case 'win_proy': drawing += '<rect x="25" y="15" width="50" height="30"/><path d="M25 15l25 30l25-30"/>'; break;
            case 'win_souf': drawing += '<rect x="25" y="15" width="50" height="30"/><path d="M25 45l25-30l25 30"/>'; break;

            case 'win_abat':
                drawing += '<rect x="30" y="10" width="40" height="40"/>';
                if (state.apertura && state.apertura.includes('2')) {
                    drawing += '<line x1="50" y1="10" x2="50" y2="50"/>';
                    drawing += '<path d="M30 10l20 20l-20 20 M70 10l-20 20l20 20"/>';
                } else {
                    drawing += '<path d="M30 10l40 20l-40 20"/>';
                }
                drawing += `<g class="plan-view-layer">${drawPlanView(state.type, state)}</g>`;
                break;
            case 'door_abat':
                drawing += '<rect x="35" y="5" width="30" height="50"/>';
                if (state.apertura && state.apertura.includes('2')) {
                    drawing += '<line x1="50" y1="5" x2="50" y2="55"/>';
                    drawing += '<path d="M35 5l15 25l-15 25 M65 5l-15 25l15 25"/>';
                } else {
                    drawing += '<path d="M35 5l30 25l-30 25"/>';
                }
                drawing += `<g class="plan-view-layer">${drawPlanView(state.type, state)}</g>`;
                break;

            case 'win_ob':
                drawing += '<rect x="30" y="10" width="40" height="40"/><path d="M30 10l40 20l-40 20M30 50l20-40l20 40"/>';
                drawing += `<g class="plan-view-layer">${drawPlanView(state.type, state)}</g>`;
                break;

            case 'mamp_fija': {
                drawing += '<rect x="30" y="5" width="40" height="50"/>';
                // Conectores (fijaciones): 2 en el borde izquierdo y 2 en el borde inferior,
                // todos RETIRADOS de las esquinas.
                const mc = (x, y) => `<rect x="${(x - 1.6).toFixed(1)}" y="${(y - 1.6).toFixed(1)}" width="3.2" height="3.2" rx="0.4" fill="${herrajeCol}" stroke="#000" stroke-width="0.3"/><circle cx="${x}" cy="${y}" r="0.8" fill="#cdd9e3" stroke="none"/>`;
                drawing += mc(32.5, 16) + mc(32.5, 44) + mc(58, 52.5);
                break;
            }

            case 'door_glass':
                drawing += '<rect x="30" y="5" width="40" height="50"/>';
                if (state.bisagras === 'bisagra') {
                    drawing += `<rect x="${isD ? 68 : 30}" y="15" width="2" height="4" fill="${herrajeCol}"/><rect x="${isD ? 68 : 30}" y="41" width="2" height="4" fill="${herrajeCol}"/>`;
                } else {
                    drawing += `<rect x="${isD ? 65 : 30}" y="5" width="5" height="2" fill="${herrajeCol}"/><rect x="${isD ? 65 : 30}" y="53" width="5" height="2" fill="${herrajeCol}"/>`;
                }

                {
                    const wLuna = state.cerr_luna || state.cerradura_tipo === 'central';
                    const wDig = state.cerr_digital || state.cerradura_tipo === 'digital';
                    const wPiso = state.cerr_piso || state.cerradura_piso === 'si';
                    const edgeX = isD ? 30 : 70, dir = isD ? 1 : -1;
                    drawing += cerraduraMarks(edgeX, dir, 30, 55, 4, herrajeCol, wLuna, wDig, wPiso);
                }

                if (state.tirador === 'redondo') {
                    let x = isD ? 38 : 62;
                    drawing += `<circle cx="${x}" cy="30" r="2.4" fill="none" stroke="${herrajeCol}" stroke-width="1.6"/>`;
                } else if (state.tirador && state.tirador !== '') {
                    let hh = 10;
                    if (state.tirador === '5') hh = 6;
                    if (state.tirador === '8') hh = 10;
                    if (state.tirador === '12') hh = 16;
                    if (state.tirador === '16') hh = 22;
                    let y1 = 30 - hh / 2;
                    let y2 = 30 + hh / 2;
                    let x = isD ? 38 : 62;
                    drawing += `<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}" stroke="${herrajeCol}" stroke-width="2"/>`;
                }
                break;

            case 'door_slide': {
                // Puerta deslizante suspendida (tipo granero): riel superior que sobresale hacia
                // el lado de apertura, hoja de vidrio colgada con 2 colgadores, tirador (círculo).
                const openLeft = !isD;                // orientación I = abre a la izquierda
                const railY = 3.5, railH = 2.4;
                const railX = openLeft ? 2 : 28;      // el riel sobresale hacia donde corre la hoja
                const railW = 70;
                // hoja de vidrio (contorno fino; el vidrio 3D va detrás)
                drawing += '<rect x="30" y="9" width="40" height="47"/>';
                // riel superior
                drawing += `<rect x="${railX}" y="${railY}" width="${railW}" height="${railH}" rx="0.6" fill="${herrajeCol}" stroke="none"/>`;
                drawing += `<rect x="${railX - 1.4}" y="${railY - 0.8}" width="2.4" height="${railH + 1.6}" fill="${herrajeCol}" stroke="none"/>`;
                drawing += `<rect x="${railX + railW - 1}" y="${railY - 0.8}" width="2.4" height="${railH + 1.6}" fill="${herrajeCol}" stroke="none"/>`;
                // colgadores (2 herrajes del riel a la parte alta del vidrio)
                [40, 60].forEach(hx => {
                    drawing += `<rect x="${hx - 3}" y="${railY + railH}" width="6" height="5" rx="0.8" fill="${herrajeCol}" stroke="none"/>`;
                    drawing += `<line x1="${hx}" y1="${railY + railH + 5}" x2="${hx}" y2="9" stroke="${herrajeCol}"/>`;
                });
                // tirador cerca del borde de cierre (lado opuesto a la apertura)
                const handleX = openLeft ? 62 : 38;
                if (['5', '8', '12', '16'].includes(state.tirador)) {
                    let hh = state.tirador === '5' ? 6 : state.tirador === '8' ? 10 : state.tirador === '12' ? 16 : 22;
                    drawing += `<line x1="${handleX}" y1="${32 - hh / 2}" x2="${handleX}" y2="${32 + hh / 2}" stroke="${herrajeCol}" stroke-width="2"/>`;
                } else {
                    // redondo o por defecto: tirador circular
                    drawing += `<circle cx="${handleX}" cy="32" r="2.4" fill="none" stroke="${herrajeCol}" stroke-width="1.6"/>`;
                }
                // cerraduras (media luna / digital / piso) en el borde de cierre
                {
                    const edgeX = openLeft ? 70 : 30, dir = openLeft ? -1 : 1;
                    drawing += cerraduraMarks(edgeX, dir, 32, 56, 4, herrajeCol, state.cerr_luna, state.cerr_digital, state.cerr_piso);
                }
                // flecha de corrido (negra siempre)
                drawing += `<g transform="translate(48, 40)">${openLeft ? arrowL : arrowR}</g>`;
                break;
            }

            case 'fachada_din':
                let n = parseInt(state.panos) || 1;
                let isTope = state.union === 'tope';
                let innerStroke = isTope ? 0.5 : 2;

                drawing += '<rect x="10" y="5" width="80" height="50"/>';
                for (let i = 1; i < n; i++) {
                    let posX = 10 + (80 / n) * i;
                    drawing += `<line x1="${posX}" y1="5" x2="${posX}" y2="${55}" stroke-width="${innerStroke}"/>`;
                }
                for (let i = 0; i < n; i++) {
                    let centerX = 10 + (80 / n) * i + (80 / n) / 2;
                    drawing += `<text x="${centerX}" y="33" font-family="Arimo" font-size="12" font-weight="bold" fill="#2c3742" text-anchor="middle" stroke="none">F</text>`;
                }
                break;
        }

        // capa de vidrio 3D detrás del esquema técnico
        let glassLayer = '';
        // Mampara y puerta de vidrio = vidrio sin marco (canto de vidrio, no borde oscuro).
        // Paño Fijo con fijación "Sin Marco" usa el mismo canto de vidrio sin borde extruido.
        const glassOnly = (state.categoria === 'mampara' || state.categoria === 'puerta_vidrio')
            || (state.type === 'fachada_din' && state.fijacion === 'sin_marco');
        const panelFn = glassOnly ? glassOnlyPanel : extrudedPanel;
        getPanelRects(state).forEach(r => { glassLayer += panelFn(uid, r[0], r[1], r[2], r[3]); });

        const isFlipped = ['win_abat', 'win_ob', 'win_souf', 'door_abat'].includes(state.type) && isD;
        const transform = isFlipped ? `transform="scale(-1, 1) translate(-100, 0)"` : '';

        svg += `<g ${transform}>${glassLayer}${drawing}</g>`;

        if (!isCAD) {
            const dimPr = getPanelRects(state)[0];
            if (state.ancho > 0) {
                if (dimPr) svg += dimLineH(dimPr[0], dimPr[0] + dimPr[2], 4, dimPr[1], `${state.ancho} mm`, 7);
                else svg += `<text x="50" y="4" font-family="Arimo" font-size="7" font-weight="bold" fill="#2c3742" text-anchor="middle" stroke="none">${state.ancho} mm</text>`;
            }
            if (state.alto > 0) {
                if (dimPr) svg += dimLineV(dimPr[1], dimPr[1] + dimPr[3], dimPr[0] + dimPr[2] + 4, dimPr[0] + dimPr[2], `${state.alto} mm`, 7);
                else svg += `<text x="94" y="30" font-family="Arimo" font-size="7" font-weight="bold" fill="#2c3742" text-anchor="start" dominant-baseline="middle" stroke="none">${state.alto} mm</text>`;
            }
            if (state.categoria === 'galandaje') {
                svg += galandajePlan(state, uid);
            } else if (state.categoria === 'corredera') {
                svg += correderaPlan(state, uid);
            }
        }

        svg += '</svg>';
        const finished = applyFinish(svg, state.color_perfil, state.color_ral);
        if (!isCAD && (state.panoArriba || state.panoAbajo)) return composePanos(id, state, finished, viewBox);
        return finished;
    }

    function initMiniCAD(id) {
        const canvas = document.getElementById('canvas-' + id);
        const ctx = canvas.getContext('2d');
        
        let drawing = false;
        let startX = 0, startY = 0;
        
        window['cadLines' + id] = window['cadLines' + id] || [];
        let lines = window['cadLines' + id];
        
        let draggingImg = null;
        let dragOffsetX = 0, dragOffsetY = 0;

        window['autoZoom' + id] = 1;
        window['panX' + id] = 0;
        window['panY' + id] = 0;

        window['autoFit' + id] = function() {
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            let hasContent = false;
            
            if (window['cadItems' + id]) {
                window['cadItems' + id].forEach(item => {
                    hasContent = true;
                    if (item.x - item.w/2 < minX) minX = item.x - item.w/2;
                    if (item.x + item.w/2 > maxX) maxX = item.x + item.w/2;
                    if (item.y - item.h/2 < minY) minY = item.y - item.h/2;
                    if (item.y + item.h/2 > maxY) maxY = item.y + item.h/2;
                });
            }
            lines.forEach(l => {
                hasContent = true;
                if (l.x1 < minX) minX = l.x1;
                if (l.x2 < minX) minX = l.x2;
                if (l.x1 > maxX) maxX = l.x1;
                if (l.x2 > maxX) maxX = l.x2;
                if (l.y1 < minY) minY = l.y1;
                if (l.y2 < minY) minY = l.y2;
                if (l.y1 > maxY) maxY = l.y1;
                if (l.y2 > maxY) maxY = l.y2;
            });

            if (!hasContent) {
                window['panX' + id] = 0; window['panY' + id] = 0; window['autoZoom' + id] = 1;
                return;
            }

            minX -= 50; minY -= 50; maxX += 50; maxY += 50;
            let contentW = maxX - minX;
            let contentH = maxY - minY;
            
            let scaleX = canvas.width / contentW;
            let scaleY = canvas.height / contentH;
            let zoom = Math.min(1, scaleX, scaleY);
            
            window['autoZoom' + id] = zoom;
            window['panX' + id] = (canvas.width - contentW * zoom) / 2 - minX * zoom;
            window['panY' + id] = (canvas.height - contentH * zoom) / 2 - minY * zoom;
        };

        window['updateCADOptionsUI' + id] = function() {
            let container = document.getElementById('cad-options-' + id);
            let selectedItem = window['selectedCADItem' + id];
            
            if(!selectedItem) {
                container.innerHTML = '<div style="grid-column: span 2; text-align:center; color:#0A3D62; font-size:11px; padding: 10px; font-weight:bold;">Toca un modelo insertado para configurarlo aquí</div>';
                return;
            }
            
            const hideOrientation = ['cor2', 'cor4_cent', 'cor6_cent', 'gal4_2v', 'gal6_3v', 'win_proy', 'win_souf'].includes(selectedItem.type);
            const showOrientation = !hideOrientation && ['corredera', 'galandaje', 'ventana', 'puerta_vidrio'].includes(selectedItem.categoria);
            
            let dimensionInputs = `
                <div style="grid-column: span 2; display: flex; gap: 10px; margin-bottom: 5px; border-top: 1px dashed #ccc; padding-top: 10px;">
                    <div style="flex:1;"><label style="font-size:10px; color:#0A3D62; font-weight:bold;">Ancho (mm):</label><input type="text" inputmode="numeric" style="width:100%; padding:5px; border:1px solid #ddd; border-radius:3px;" value="${selectedItem.state.ancho || ''}" oninput="updateCADItemState(${id}, 'ancho', this.value)"></div>
                    <div style="flex:1;"><label style="font-size:10px; color:#0A3D62; font-weight:bold;">Alto (mm):</label><input type="text" inputmode="numeric" style="width:100%; padding:5px; border:1px solid #ddd; border-radius:3px;" value="${selectedItem.state.alto || ''}" oninput="updateCADItemState(${id}, 'alto', this.value)"></div>
                </div>
            `;

            let orientationHtml = showOrientation ? `
                <div class="orientation-toggle" style="grid-column: span 2; margin-bottom: 5px;">
                    <div class="toggle-btn ${selectedItem.state.orientacion==='I'?'active':''}" onclick="updateCADItemState(${id}, 'orientacion', 'I')"> A LA IZQUIERDA</div>
                    <div class="toggle-btn ${selectedItem.state.orientacion==='D'?'active':''}" onclick="updateCADItemState(${id}, 'orientacion', 'D')">A LA DERECHA </div>
                </div>` : '';

            let deleteBtn = `<button onclick="window.deleteSelectedCADItem(${id})" style="grid-column: span 2; background: #e74c3c; color: white; border: none; padding: 6px; border-radius: 3px; cursor: pointer; margin-bottom: 5px; font-weight:bold;"> Borrar módulo seleccionado</button>`;
            
            container.innerHTML = dimensionInputs + deleteBtn + orientationHtml + getMenuOpciones(id, selectedItem.categoria, selectedItem.type, true);
            
            let selects = container.querySelectorAll('select');
            selects.forEach(select => {
                let onchangeStr = select.getAttribute('onchange');
                if(onchangeStr) {
                    let match = onchangeStr.match(/,\s*'([^']+)'\s*,/);
                    if(match && match[1]) {
                        let key = match[1];
                        if(selectedItem.state[key] !== undefined) {
                            select.value = selectedItem.state[key];
                        }
                    }
                }
            });
        };

        window.deleteSelectedCADItem = function(cardId) {
            let item = window['selectedCADItem' + cardId];
            if(item && window['cadItems' + cardId]) {
                window['cadItems' + cardId] = window['cadItems' + cardId].filter(i => i !== item);
                window['selectedCADItem' + cardId] = null;
                updatePanoramicState(cardId);
                window['autoFit' + cardId]();
                if(window['updateCADOptionsUI' + cardId]) window['updateCADOptionsUI' + cardId]();
                if(window['drawAll' + cardId]) window['drawAll' + cardId]();
                recomputeCADTotals(cardId);
                saveProgress();
            }
        };
        
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let rawX = clientX - rect.left;
            let rawY = clientY - rect.top;
            
            let z = window['autoZoom' + id] || 1;
            let px = window['panX' + id] || 0;
            let py = window['panY' + id] || 0;
            
            return { x: (rawX - px) / z, y: (rawY - py) / z };
        }

        function snap(p) {
            const snapDist = 15;
            for (let line of lines) {
                if (Math.hypot(p.x - line.x1, p.y - line.y1) < snapDist) return {x: line.x1, y: line.y1};
                if (Math.hypot(p.x - line.x2, p.y - line.y2) < snapDist) return {x: line.x2, y: line.y2};
            }
            return p;
        }

        function drawAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let z = window['autoZoom' + id] || 1;
            let px = window['panX' + id] || 0;
            let py = window['panY' + id] || 0;
            
            ctx.save();
            ctx.translate(px, py);
            ctx.scale(z, z);
            
            if (window['cadItems' + id]) {
                window['cadItems' + id].forEach((item, index) => {
                    if (item.img) {
                        ctx.drawImage(item.img, item.x - item.w/2, item.y - item.h/2, item.w, item.h);

                        // Puerta deslizante suspendida: extender el riel hacia el lado por donde
                        // desliza (una anchura de puerta más), para que alcance el módulo vecino.
                        if (item.type === 'door_slide') {
                            const openLeft = item.state.orientacion !== 'D';
                            const railColor = item.state.herraje_color === 'negro' ? '#111111' : '#8d99a4';
                            const railH = Math.max(2, item.h * 0.04);
                            const topY = item.y - item.h/2;
                            ctx.fillStyle = railColor;
                            if (openLeft) ctx.fillRect(item.x - item.w/2 - item.w, topY, item.w, railH);
                            else ctx.fillRect(item.x + item.w/2, topY, item.w, railH);
                        }

                        let hasTop = false, hasBottom = false, hasLeft = false, hasRight = false;
                        const tol = 15;
                        window['cadItems' + id].forEach(other => {
                            if (other === item) return;
                            if (Math.abs((item.y - item.h/2) - (other.y + other.h/2)) <= tol && Math.abs(item.x - other.x) < (item.w/2 + other.w/2)) hasTop = true;
                            if (Math.abs((item.y + item.h/2) - (other.y - other.h/2)) <= tol && Math.abs(item.x - other.x) < (item.w/2 + other.w/2)) hasBottom = true;
                            if (Math.abs((item.x + item.w/2) - (other.x - other.w/2)) <= tol && Math.abs(item.y - other.y) < (item.h/2 + other.h/2)) hasRight = true;
                            if (Math.abs((item.x - item.w/2) - (other.x + other.w/2)) <= tol && Math.abs(item.y - other.y) < (item.h/2 + other.h/2)) hasLeft = true;
                        });

                        ctx.fillStyle = '#0A3D62'; 
                        ctx.font = 'bold 11px Arimo'; 
                        
                        if (item.state.ancho > 0) {
                            ctx.textAlign = 'center';
                            if (!hasTop) {
                                ctx.fillText(item.state.ancho + ' mm', item.x, item.y - item.h/2 - 8);
                            } else if (!hasBottom) {
                                ctx.fillText(item.state.ancho + ' mm', item.x, item.y + item.h/2 + 15);
                            }
                        }
                        
                        if (item.state.alto > 0) {
                            if (!hasRight) {
                                ctx.textAlign = 'left';
                                ctx.fillText(item.state.alto + ' mm', item.x + item.w/2 + 8, item.y + 4);
                            } else if (!hasLeft) {
                                ctx.textAlign = 'right';
                                ctx.fillText(item.state.alto + ' mm', item.x - item.w/2 - 8, item.y + 4);
                            }
                        }

                        // CÍRCULO NUMÉRICO
                        ctx.beginPath();
                        ctx.arc(item.x, item.y, 8, 0, 2 * Math.PI);
                        ctx.fillStyle = 'rgba(255,255,255,0.9)';
                        ctx.fill();
                        ctx.lineWidth = 1;
                        ctx.strokeStyle = '#e74c3c';
                        ctx.stroke();
                        ctx.fillStyle = '#e74c3c';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.font = 'bold 10px Arimo';
                        ctx.fillText(index + 1, item.x, item.y);
                        ctx.textBaseline = 'alphabetic'; 

                        if (window['selectedCADItem' + id] === item) {
                            ctx.strokeStyle = '#F6B93B';
                            ctx.lineWidth = 2;
                            ctx.strokeRect(item.x - item.w/2 - 2, item.y - item.h/2 - 2, item.w + 4, item.h + 4);
                        }
                    }
                });
            }

            ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.strokeStyle = '#0A3D62';
            lines.forEach(l => {
                ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); ctx.stroke();
            });
            
            ctx.restore();
        }
        
        window['drawAll' + id] = drawAll;

        function startDraw(e) {
            let p = getPos(e);
            let clickedItem = null;
            
            if (window['cadItems' + id]) {
                for (let i = window['cadItems' + id].length - 1; i >= 0; i--) {
                    let item = window['cadItems' + id][i];
                    if (p.x >= item.x - item.w/2 && p.x <= item.x + item.w/2 &&
                        p.y >= item.y - item.h/2 && p.y <= item.y + item.h/2) {
                        clickedItem = item;
                        break;
                    }
                }
            }

            if (clickedItem) {
                window['selectedCADItem' + id] = clickedItem;
                draggingImg = clickedItem;
                dragOffsetX = p.x - clickedItem.x;
                dragOffsetY = p.y - clickedItem.y;
                if(e.type === 'touchstart') e.preventDefault();
                window['updateCADOptionsUI' + id]();
                drawAll();
                return; 
            } else {
                window['selectedCADItem' + id] = null;
                window['updateCADOptionsUI' + id]();
                drawAll();
            }
            if(e.type === 'touchstart') e.preventDefault();
            drawing = true;
            p = snap(p);
            startX = p.x; startY = p.y;
        }

        function moveDraw(e) {
            if (draggingImg) {
                if(e.type === 'touchmove') e.preventDefault();
                let p = getPos(e);
                let targetX = p.x - dragOffsetX;
                let targetY = p.y - dragOffsetY;
                
                // IMÁN: busca la mejor posición de encaje (pegado o alineado) en cada eje
                const snapDist = 55;
                const dw = draggingImg.w / 2, dh = draggingImg.h / 2;
                let bestX = null, bestXd = snapDist;
                let bestY = null, bestYd = snapDist;

                window['cadItems' + id].forEach(other => {
                    if (other === draggingImg) return;
                    const oL = other.x - other.w / 2, oR = other.x + other.w / 2;
                    const oT = other.y - other.h / 2, oB = other.y + other.h / 2;
                    const myL = targetX - dw, myR = targetX + dw;
                    const myT = targetY - dh, myB = targetY + dh;

                    const nearY = (myT < oB + snapDist && myB > oT - snapDist);
                    const nearX = (myL < oR + snapDist && myR > oL - snapDist);

                    // Eje X: pegar lateralmente o alinear (solo si están cerca verticalmente)
                    if (nearY) {
                        [[oR + dw, Math.abs(myL - oR)],   // mi izquierda contra derecha del otro
                         [oL - dw, Math.abs(myR - oL)],   // mi derecha contra izquierda del otro
                         [other.x, Math.abs(targetX - other.x)], // centros alineados
                         [oL + dw, Math.abs(myL - oL)],   // bordes izquierdos
                         [oR - dw, Math.abs(myR - oR)]    // bordes derechos
                        ].forEach(c => { if (c[1] < bestXd) { bestXd = c[1]; bestX = c[0]; } });
                    }
                    // Eje Y: apilar arriba/abajo o alinear (solo si están cerca horizontalmente)
                    if (nearX) {
                        [[oB + dh, Math.abs(myT - oB)],   // mi arriba contra abajo del otro
                         [oT - dh, Math.abs(myB - oT)],   // mi abajo contra arriba del otro
                         [other.y, Math.abs(targetY - other.y)], // centros alineados
                         [oT + dh, Math.abs(myT - oT)],   // bordes superiores
                         [oB - dh, Math.abs(myB - oB)]    // bordes inferiores
                        ].forEach(c => { if (c[1] < bestYd) { bestYd = c[1]; bestY = c[0]; } });
                    }
                });

                if (bestX !== null) targetX = bestX;
                if (bestY !== null) targetY = bestY;

                draggingImg.x = targetX;
                draggingImg.y = targetY;
                if (typeof recomputeCADTotals === 'function') recomputeCADTotals(id);
                drawAll();
                return;
            }

            if (!drawing) return;
            if(e.type === 'touchmove') e.preventDefault();
            let p = getPos(e);
            
            let dx = Math.abs(p.x - startX);
            let dy = Math.abs(p.y - startY);
            
            if (dx < 10 && dy > 15) p.x = startX;
            else if (dy < 10 && dx > 15) p.y = startY;
            
            p = snap(p);
            
            drawAll();
            ctx.save();
            let z = window['autoZoom' + id] || 1;
            let px = window['panX' + id] || 0;
            let py = window['panY' + id] || 0;
            ctx.translate(px, py);
            ctx.scale(z, z);
            
            ctx.beginPath(); ctx.strokeStyle = '#F6B93B'; 
            ctx.moveTo(startX, startY); ctx.lineTo(p.x, p.y); ctx.stroke();
            ctx.restore();
        }

        function endDraw(e) {
            if (draggingImg) {
                draggingImg = null;
                recomputeCADTotals(id);
                window['autoFit' + id]();
                if(e.type === 'touchend') e.preventDefault();
                drawAll();
                saveProgress();
                return;
            }

            if (!drawing) return;
            if(e.type === 'touchend') e.preventDefault();
            drawing = false;
            let p = getPos(e.changedTouches ? e.changedTouches[0] : e);
            
            let dx = Math.abs(p.x - startX);
            let dy = Math.abs(p.y - startY);
            
            if (dx < 10 && dy > 15) p.x = startX;
            else if (dy < 10 && dx > 15) p.y = startY;
            
            p = snap(p);
            
            if (Math.hypot(p.x - startX, p.y - startY) > 5) {
                lines.push({x1: startX, y1: startY, x2: p.x, y2: p.y});
            }
            window['autoFit' + id](); 
            drawAll();
            saveProgress();
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', moveDraw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseleave', () => { if(drawing) endDraw(new MouseEvent('mouseup')); if(draggingImg) {draggingImg=null; window['autoFit' + id](); drawAll();} });
        
        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', moveDraw, {passive: false});
        canvas.addEventListener('touchend', endDraw, {passive: false});

        window['clearCanvas' + id] = function() {
            window['cadLines' + id] = [];
            lines = window['cadLines' + id];
            window['autoFit' + id]();
            drawAll();
            saveProgress();
        };
    }

    function clearCanvas(id) {
        if(window['clearCanvas' + id]) window['clearCanvas' + id]();
    }

    window.addEventListener('DOMContentLoaded', loadProgress);
</script>

<script type="module">
    import { db, auth, googleProvider } from './ops/firebase-config.js';
    import { collection, addDoc, doc, getDoc, setDoc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js';
    import { signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js';

    // Sincroniza clientes/obras del cuaderno a Firestore (colección `clientes`) para que
    // ops/compras.html y ops/historial.html puedan sugerir TODOS los clientes del cuaderno, no
    // solo los que ya tuvieron un pedido enviado a fábrica/cotización. Silencioso: si no hay
    // sesión o falla (sin internet, típico en campo), no interrumpe el guardado local.
    const normClienteKey = (s) => String(s || '').trim().toLowerCase();
    async function syncClienteObra(cliente, obra) {
        if (!auth.currentUser || !cliente) return;
        try {
            const cambios = { nombre: String(cliente).trim() };
            if (obra) cambios[`obras.${normClienteKey(obra)}`] = String(obra).trim();
            await setDoc(doc(db, 'clientes', normClienteKey(cliente)), cambios, { merge: true });
        } catch (e) { /* sin internet u otro fallo: no bloquea el guardado local */ }
    }
    window.syncClienteObra = syncClienteObra;

    // La primera vez que haya sesión activa en este dispositivo, sube de una vez TODOS los
    // clientes/obras que ya existían localmente antes de este cambio (getProjects() es global,
    // definida en el script clásico). Se marca con una bandera en localStorage para no repetirlo.
    async function bulkSyncClientesUnaVez() {
        if (localStorage.getItem('artal_clients_synced_v1') || !auth.currentUser) return;
        try {
            const projects = getProjects();
            for (const cliente of Object.keys(projects)) {
                await syncClienteObra(cliente, null);
                for (const obra of Object.keys(projects[cliente] || {})) {
                    await syncClienteObra(cliente, obra);
                }
            }
            localStorage.setItem('artal_clients_synced_v1', '1');
        } catch (e) { /* se reintenta la próxima vez que haya sesión */ }
    }
    onAuthStateChanged(auth, (user) => { if (user) bulkSyncClientesUnaVez(); });

    window.enviarOrden = async function () {
        const btn = document.getElementById('btn-enviar-orden');
        const originalHtml = btn ? btn.innerHTML : '';
        try {
            if (!validateAllCards()) return;
            const appJSON = getAppJSON();
            if (!appJSON.header.cliente || !appJSON.header.obra) {
                alert('Completa Cliente y Obra antes de enviar.');
                return;
            }

            if (!auth.currentUser) {
                try {
                    await signInWithPopup(auth, googleProvider);
                } catch (e) {
                    alert('No se pudo iniciar sesión con Google: ' + e.message);
                    return;
                }
            }

            const isFab = (appJSON.docType || '').indexOf('FAB') === 0;

            const items = appJSON.order.map(id => {
                const state = appJSON.cardsState[id] || {};
                const inputs = appJSON.inputsData[id] || {};
                return {
                    id,
                    tipo: getCatName(state.type),
                    ubicacion: inputs.ubi || '',
                    ancho: state.ancho || '',
                    alto: state.alto || '',
                    cantidad: state.cantidad || 1
                };
            });

            if (btn) { btn.disabled = true; btn.innerHTML = 'Enviando…'; }

            await addDoc(collection(db, 'orders'), {
                cliente: appJSON.header.cliente,
                obra: appJSON.header.obra,
                docType: appJSON.docType,
                material: appJSON.header.material,
                color: appJSON.header.color,
                status: isFab ? 'pendiente_fabrica' : 'solicitada',
                items,
                totalItems: items.length,
                appJSON,
                ...(isFab ? { fechaCotizado: serverTimestamp() } : { fechaSolicitada: serverTimestamp() })
            });
            syncClienteObra(appJSON.header.cliente, appJSON.header.obra);
            alert(isFab ? 'Enviado a fábrica correctamente.' : 'Cotización enviada al contratista correctamente.');
        } catch (e) {
            alert('No se pudo enviar: ' + (e && e.message ? e.message : e));
        } finally {
            if (btn) { btn.disabled = false; btn.innerHTML = originalHtml; }
        }
    };

    // Envío directo a Instalaciones (sin pasar por fábrica): para trabajos que no se fabrican
    // (ej. perfiles U). Crea la orden ya en estado "listo para cargar/instalar" con la hoja de
    // fabricación (appJSON) — aparece en Instalaciones para agendar con GPS, y en chofer/
    // instalador. Se marca `directoInstalacion` para no mezclarla en el tablero de Fábrica.
    window.enviarAInstalacion = async function () {
        const btn = document.getElementById('btn-enviar-instalacion');
        const originalHtml = btn ? btn.innerHTML : '';
        try {
            if (!validateAllCards()) return;
            const appJSON = getAppJSON();
            if (!appJSON.header.cliente || !appJSON.header.obra) {
                alert('Completa Cliente y Obra antes de enviar.');
                return;
            }
            if (!confirm('¿Enviar este trabajo DIRECTO a Instalaciones (sin pasar por fábrica), con su hoja de fabricación?')) return;

            if (!auth.currentUser) {
                try {
                    await signInWithPopup(auth, googleProvider);
                } catch (e) {
                    alert('No se pudo iniciar sesión con Google: ' + e.message);
                    return;
                }
            }

            const items = appJSON.order.map(id => {
                const state = appJSON.cardsState[id] || {};
                const inputs = appJSON.inputsData[id] || {};
                return {
                    id,
                    tipo: getCatName(state.type),
                    ubicacion: inputs.ubi || '',
                    ancho: state.ancho || '',
                    alto: state.alto || '',
                    cantidad: state.cantidad || 1
                };
            });

            if (btn) { btn.disabled = true; btn.innerHTML = 'Enviando…'; }

            await addDoc(collection(db, 'orders'), {
                cliente: appJSON.header.cliente,
                obra: appJSON.header.obra,
                docType: 'FABRICACIÓN',
                directoInstalacion: true,
                material: appJSON.header.material,
                color: appJSON.header.color,
                status: 'listo_para_cargar',
                items,
                totalItems: items.length,
                appJSON,
                fechaCotizado: serverTimestamp(),
                fechaListoParaCargar: serverTimestamp()
            });
            syncClienteObra(appJSON.header.cliente, appJSON.header.obra);
            alert('Enviado directo a Instalaciones. Ya puedes agendarlo (con GPS) desde el módulo Instalaciones.');
        } catch (e) {
            alert('No se pudo enviar: ' + (e && e.message ? e.message : e));
        } finally {
            if (btn) { btn.disabled = false; btn.innerHTML = originalHtml; }
        }
    };

    // Checklist obligatorio por ítem para chofer/instalador: index.html?orderId=X&checklist=chofer
    // (o &checklist=instalador) agrega, a cada tarjeta YA renderizada, un recuadro con dos
    // botones + comentario. No toca ninguna plantilla de tarjeta — todas comparten el mismo
    // contenedor genérico id="card-{id}" (ver addItem(), donde se crea antes del innerHTML
    // específico del tipo), así que basta con recorrer .item-card y agregarle un hijo.
    function escChecklist(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }
    // Etapas de instalación por tipo de elemento (validadas por el usuario). "baranda_bal" se
    // decide en runtime según state.fijacion: 'base_u' = lingotes, cualquier otra (prensa de
    // suelo o conectores) = la lista de "base". Todo lo que no está mapeado explícitamente usa
    // "generico" como respaldo razonable (avisar si hace falta afinarlo para ese tipo).
    const STAGE_SETS = {
        abisagrada: ['Preparación hueco', 'Instalación marco', 'Hojas colocadas', 'Sellado marco', 'Sellado Hoja', 'Terminado'],
        corredera: ['Preparación hueco', 'Instalación marco', 'Hojas colocadas', 'Hojas graduadas', 'Puños y cierres', 'Sellado marco', 'Sellado Hojas', 'Terminado'],
        galandaje: ['Preparación hueco', 'Instalación marco', 'Hojas colocadas', 'Hojas graduadas', 'Puños y cierres', 'Sellado marco', 'Sellado Hojas', 'Chicanes puestos', 'Terminado'],
        panoFijo: ['Preparación hueco', 'Instalación marco', 'Sellado marco', 'Vidrio colocado', 'Terminado'],
        barandaLingote: ['Cortes lingotes', 'Oyos lingotes', 'Instalación lingotes', 'Sellado lingotes', 'Instalación vidrios', 'Gomas puestas', 'Terminado'],
        barandaBase: ['Instalación base (prensa de suelo o conectores laterales)', 'Medidas vidrios tomada', 'Instalación vidrio', 'Instalación refuerzo (si lleva)', 'Terminado'],
        generico: ['Preparación', 'Instalación', 'Sellado/ajustes', 'Terminado']
    };
    function getStageSetKey(type, state) {
        if (['win_abat', 'win_ob', 'win_proy', 'win_souf', 'door_abat'].includes(type)) return 'abisagrada';
        if (['cor2', 'cor3', 'cor4_cent', 'cor4_lat', 'cor6_cent', 'cor6_lat', 'door_slide'].includes(type)) return 'corredera';
        if (['gal1', 'gal2_lat', 'gal2_cent', 'gal3_3v', 'gal4_2v', 'gal4_4v', 'gal6_3v'].includes(type)) return 'galandaje';
