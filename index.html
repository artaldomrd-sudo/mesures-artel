        if (['fachada_din', 'mamp_fija', 'door_glass', 'ducha_facade', 'ducha_cab'].includes(type)) return 'panoFijo';
        if (type === 'baranda_bal') return (state && state.fijacion === 'base_u') ? 'barandaLingote' : 'barandaBase';
        return 'generico';
    }

    function injectChecklist(role, orderId, orderData) {
        if (role === 'chofer') { injectChoferChecklist(orderId, orderData); return; }
        if (role === 'fabrica') { injectFabricaChecklist(orderId, orderData); return; }
        injectInstaladorChecklist(orderId, orderData);
    }

    // Fábrica marca, ítem por ítem, cuáles ya están listos para cargar (para pedidos que se
    // fabrican en dos etapas o donde solo una parte está lista). Escribe en
    // itemsListosFabrica.{itemId}; ops/alucufel/fabrica.html lee esto para el botón
    // "Parcialmente listo para cargar", y el chofer lo ve marcado (ver injectChoferChecklist).
    function injectFabricaChecklist(orderId, orderData) {
        const listosMap = orderData.itemsListosFabrica || {};
        document.querySelectorAll('.item-card').forEach(card => {
            const itemId = card.id.replace('card-', '');
            const listo = listosMap[itemId] === true;

            const box = document.createElement('div');
            box.style.cssText = 'margin-top:12px;padding:12px;border-radius:8px;background:#f3f4f6;border:2px solid #ddd;font-family:Arimo,sans-serif;';
            box.innerHTML = `
                <label style="display:flex;align-items:center;gap:10px;font-size:13px;font-weight:bold;color:#0A3D62;cursor:pointer;">
                    <input type="checkbox" class="cl-listo" ${listo ? 'checked' : ''} style="width:22px;height:22px;">
                    <span>Listo para cargar</span>
                </label>
                <div class="cl-msg" style="font-size:11px;color:#666;margin-top:6px;">${listo ? 'Marcado como listo' : ''}</div>
            `;
            card.appendChild(box);

            const checkbox = box.querySelector('.cl-listo');
            const msg = box.querySelector('.cl-msg');
            checkbox.onchange = async () => {
                msg.textContent = 'Guardando…';
                try {
                    await updateDoc(doc(db, 'orders', orderId), {
                        [`itemsListosFabrica.${itemId}`]: checkbox.checked
                    });
                    msg.textContent = checkbox.checked ? 'Marcado como listo ✓' : 'Desmarcado';
                } catch (e) {
                    msg.textContent = 'Error al guardar: ' + e.message;
                }
            };
        });
    }

    function injectChoferChecklist(orderId, orderData) {
        const statusMap = orderData.itemStatus || {};
        const listosMap = orderData.itemsListosFabrica || {};
        const esParcial = orderData.status === 'parcialmente_listo';
        document.querySelectorAll('.item-card').forEach(card => {
            const itemId = card.id.replace('card-', '');
            const current = statusMap[itemId] || {};
            const listo = listosMap[itemId] === true;

            const box = document.createElement('div');
            box.style.cssText = 'margin-top:12px;padding:12px;border-radius:8px;background:#f3f4f6;border:2px solid #ddd;font-family:Arimo,sans-serif;';
            box.innerHTML = `
                ${esParcial ? `<div style="font-size:12.5px;font-weight:bold;margin-bottom:8px;color:${listo ? '#2ecc71' : '#e67e22'};">${listo ? '✅ Listo para cargar (marcado por fábrica)' : '⏳ Aún NO está listo — falta en fábrica'}</div>` : ''}
                <div style="font-size:12px;font-weight:bold;color:#0A3D62;margin-bottom:8px;">Estado de este ítem (obligatorio)</div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <button type="button" class="cl-ok" style="flex:1;min-width:140px;min-height:42px;border:none;border-radius:7px;font-weight:bold;cursor:pointer;font-family:Arimo;background:${current.estado === 'cargado' ? '#2ecc71' : '#e5e7eb'};color:${current.estado === 'cargado' ? '#fff' : '#333'};">✓ Cargado en óptima condición</button>
                    <button type="button" class="cl-bad" style="flex:1;min-width:140px;min-height:42px;border:none;border-radius:7px;font-weight:bold;cursor:pointer;font-family:Arimo;background:${current.estado === 'problema' ? '#e74c3c' : '#e5e7eb'};color:${current.estado === 'problema' ? '#fff' : '#333'};">⚠ Problema (dejar comentario)</button>
                </div>
                <textarea class="cl-comment" placeholder="Describe el problema (obligatorio)…" style="width:100%;margin-top:8px;padding:8px;border-radius:6px;border:1px solid #ccc;font-family:Arimo;font-size:13px;min-height:60px;${current.estado === 'problema' ? '' : 'display:none;'}">${escChecklist(current.comentario)}</textarea>
                <button type="button" class="cl-save" style="margin-top:6px;padding:8px 14px;border:none;border-radius:6px;background:#0A3D62;color:#fff;font-weight:bold;cursor:pointer;font-family:Arimo;${current.estado === 'problema' ? '' : 'display:none;'}">Guardar comentario</button>
                <div class="cl-msg" style="font-size:11px;color:#666;margin-top:6px;">${current.estado ? 'Guardado' + (current.por ? ' por ' + escChecklist(current.por) : '') : ''}</div>
            `;
            card.appendChild(box);

            const btnOk = box.querySelector('.cl-ok');
            const btnBad = box.querySelector('.cl-bad');
            const textarea = box.querySelector('.cl-comment');
            const btnSave = box.querySelector('.cl-save');
            const msg = box.querySelector('.cl-msg');

            async function guardar(estado, comentario) {
                msg.textContent = 'Guardando…';
                try {
                    await updateDoc(doc(db, 'orders', orderId), {
                        [`itemStatus.${itemId}`]: {
                            estado,
                            comentario: comentario || '',
                            por: (auth.currentUser && auth.currentUser.displayName) || (auth.currentUser && auth.currentUser.email) || '',
                            fecha: serverTimestamp(),
                            atendido: estado === 'problema' ? false : true
                        }
                    });
                    msg.textContent = 'Guardado ✓' + (auth.currentUser && auth.currentUser.displayName ? ' por ' + auth.currentUser.displayName : '');
                    btnOk.style.background = estado === 'cargado' ? '#2ecc71' : '#e5e7eb';
                    btnOk.style.color = estado === 'cargado' ? '#fff' : '#333';
                    btnBad.style.background = estado === 'problema' ? '#e74c3c' : '#e5e7eb';
                    btnBad.style.color = estado === 'problema' ? '#fff' : '#333';
                } catch (e) {
                    msg.textContent = 'Error al guardar: ' + e.message;
                }
            }

            btnOk.onclick = () => {
                textarea.style.display = 'none';
                btnSave.style.display = 'none';
                guardar('cargado', '');
            };
            btnBad.onclick = () => {
                textarea.style.display = 'block';
                btnSave.style.display = 'inline-block';
                textarea.focus();
            };
            btnSave.onclick = () => {
                if (!textarea.value.trim()) { alert('Describe el problema antes de guardar.'); return; }
                guardar('problema', textarea.value.trim());
            };
        });
    }

    function injectInstaladorChecklist(orderId, orderData) {
        const statusMap = orderData.itemStatusInstalador || {};
        document.querySelectorAll('.item-card').forEach(card => {
            const itemId = card.id.replace('card-', '');
            const itemState = (orderData.appJSON && orderData.appJSON.cardsState && orderData.appJSON.cardsState[itemId]) || {};
            const stageKey = getStageSetKey(itemState.type, itemState);
            const stages = STAGE_SETS[stageKey];
            const current = statusMap[itemId] || {};
            const etapasGuardadas = current.etapas || {};
            let comentarioActual = current.comentario || '';
            let estadoActual = current.estado || null;

            const box = document.createElement('div');
            box.style.cssText = 'margin-top:12px;padding:12px;border-radius:8px;background:#f3f4f6;border:2px solid #ddd;font-family:Arimo,sans-serif;';
            box.innerHTML = `
                <div style="font-size:12px;font-weight:bold;color:#0A3D62;margin-bottom:8px;">Etapas de instalación (marca cada una)</div>
                <div class="cl-stages" style="display:flex;flex-direction:column;gap:6px;">
                    ${stages.map((label, idx) => `
                        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
                            <input type="checkbox" class="cl-stage" data-idx="${idx}" ${etapasGuardadas[idx] ? 'checked' : ''} style="width:20px;height:20px;">
                            <span>${escChecklist(label)}</span>
                        </label>
                    `).join('')}
                </div>
                <button type="button" class="cl-bad" style="margin-top:10px;width:100%;min-height:40px;border:none;border-radius:7px;font-weight:bold;cursor:pointer;font-family:Arimo;background:${estadoActual === 'problema' ? '#e74c3c' : '#e5e7eb'};color:${estadoActual === 'problema' ? '#fff' : '#333'};">⚠ Reportar problema</button>
                <textarea class="cl-comment" placeholder="Describe el problema (obligatorio)…" style="width:100%;margin-top:8px;padding:8px;border-radius:6px;border:1px solid #ccc;font-family:Arimo;font-size:13px;min-height:60px;${estadoActual === 'problema' ? '' : 'display:none;'}">${escChecklist(comentarioActual)}</textarea>
                <button type="button" class="cl-save" style="margin-top:6px;padding:8px 14px;border:none;border-radius:6px;background:#0A3D62;color:#fff;font-weight:bold;cursor:pointer;font-family:Arimo;${estadoActual === 'problema' ? '' : 'display:none;'}">Guardar comentario</button>
                <div class="cl-msg" style="font-size:11px;color:#666;margin-top:6px;">${estadoActual ? 'Guardado' + (current.por ? ' por ' + escChecklist(current.por) : '') : ''}</div>
            `;
            card.appendChild(box);

            const checkboxes = Array.from(box.querySelectorAll('.cl-stage'));
            const btnBad = box.querySelector('.cl-bad');
            const textarea = box.querySelector('.cl-comment');
            const btnSave = box.querySelector('.cl-save');
            const msg = box.querySelector('.cl-msg');

            async function guardar(nuevoComentario) {
                const etapas = {};
                checkboxes.forEach(cb => { etapas[cb.dataset.idx] = cb.checked; });
                const todasMarcadas = checkboxes.every(cb => cb.checked);
                estadoActual = nuevoComentario != null ? 'problema' : (todasMarcadas ? 'instalado' : null);
                if (nuevoComentario != null) comentarioActual = nuevoComentario;

                msg.textContent = 'Guardando…';
                try {
                    await updateDoc(doc(db, 'orders', orderId), {
                        [`itemStatusInstalador.${itemId}`]: {
                            etapas,
                            estado: estadoActual,
                            comentario: comentarioActual,
                            por: (auth.currentUser && auth.currentUser.displayName) || (auth.currentUser && auth.currentUser.email) || '',
                            fecha: serverTimestamp(),
                            atendido: estadoActual === 'problema' ? false : true
                        }
                    });
                    msg.textContent = 'Guardado ✓' + (auth.currentUser && auth.currentUser.displayName ? ' por ' + auth.currentUser.displayName : '');
                    btnBad.style.background = estadoActual === 'problema' ? '#e74c3c' : '#e5e7eb';
                    btnBad.style.color = estadoActual === 'problema' ? '#fff' : '#333';
                } catch (e) {
                    msg.textContent = 'Error al guardar: ' + e.message;
                }
            }

            checkboxes.forEach(cb => { cb.onchange = () => guardar(null); });
            btnBad.onclick = () => {
                textarea.style.display = 'block';
                btnSave.style.display = 'inline-block';
                textarea.focus();
            };
            btnSave.onclick = () => {
                if (!textarea.value.trim()) { alert('Describe el problema antes de guardar.'); return; }
                guardar(textarea.value.trim());
            };
        });
    }

    // Visor de solo lectura: index.html?orderId=XXX carga la ficha técnica guardada en
    // Firestore (usado por contratista.html/cotizaciones.html para revisar planos/specs antes
    // de subir su PDF). Nunca reenvía datos: solo pinta lo que ya está en el pedido.
    // Se espera a DOMContentLoaded (y se registra después) para que corra DESPUÉS de
    // loadProgress() (que restaura el autosave local) y así el pedido de Firestore no quede
    // pisado por lo último que hubiera quedado abierto en este dispositivo.
    const orderIdParam = new URLSearchParams(location.search).get('orderId');
    const checklistRole = new URLSearchParams(location.search).get('checklist');
    if (orderIdParam) {
        document.body.classList.add('readonly-view');
        window.addEventListener('DOMContentLoaded', () => {
            const loadOrder = async () => {
                try {
                    const snap = await getDoc(doc(db, 'orders', orderIdParam));
                    if (!snap.exists()) { alert('No se encontró ese pedido.'); return; }
                    const orderData = snap.data();
                    restoreData(orderData.appJSON);
                    if (checklistRole === 'chofer' || checklistRole === 'instalador' || checklistRole === 'fabrica') {
                        injectChecklist(checklistRole, orderIdParam, orderData);
                    }
                    // Avisa a la ventana que nos embebió (el modal de vista previa de ops/)
                    // que ya se puede imprimir/exportar — exportPDF() necesita cardsState listo.
                    if (window.parent !== window) {
                        window.parent.postMessage({ type: 'artal-order-loaded' }, '*');
                    }
                } catch (e) {
                    alert('No se pudo cargar el pedido: ' + e.message);
                }
            };
            const unsub = onAuthStateChanged(auth, (user) => {
                unsub();
                if (user) { loadOrder(); return; }
                const overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed;inset:0;background:#0A3D62;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:Arimo,sans-serif;z-index:9999;';
                overlay.innerHTML = '<h2 style="margin:0;font-size:20px;">ARTAL Operaciones</h2>' +
                    '<button id="loader-google-btn" style="font-size:16px;padding:12px 24px;border-radius:8px;border:none;background:#fff;color:#0A3D62;cursor:pointer;font-weight:600;">Iniciar sesión con Google</button>';
                document.body.appendChild(overlay);
                document.getElementById('loader-google-btn').onclick = async () => {
                    try {
                        await signInWithPopup(auth, googleProvider);
                        overlay.remove();
                        loadOrder();
                    } catch (e) {
                        alert('No se pudo iniciar sesión: ' + e.message);
                    }
                };
            });
        });
    }
</script>

<script>
    // Garantiza que la app abra sin internet (medición en campo sin señal): registra el
    // service worker que cachea el cascarón de la app. No aplica dentro del visor
    // ?orderId= embebido (no tiene sentido cachear ahí y evita registros repetidos en el iframe).
    if (typeof navigator !== 'undefined' && 'serviceWorker' in navigator && window.self === window.top) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        });
    }
</script>
