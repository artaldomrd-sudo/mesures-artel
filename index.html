    window.insertCADModel = function(id, type) {
        if(!type) return;
        let offset = (window['cadItems' + id] ? window['cadItems' + id].length * 20 : 0);
        let newItem = {
            uid: Date.now(),
            type: type,
            categoria: getCategoriaByType(type),
            x: 100 + offset, y: 100 + offset, w: 100, h: 60, 
            state: { orientacion: 'I', panos: 1, bisagras: 'botella', cerradura_tipo: 'ninguna', cerradura_piso: 'no', tirador: '', ancho: 0, alto: 0, union: 'T', vista: '', color_vidrio: '', vidrio: '', espesor: '', cierre: '', mosquitera: '', apertura: '', perfil: '', fijacion: '', herraje_color: '', tipo_aluminio: '' }
        };
        if (!window['cadItems' + id]) window['cadItems' + id] = [];
        window['cadItems' + id].push(newItem);
        window['selectedCADItem' + id] = newItem; 
        
        updatePanoramicState(id);
        
        updateCADItemImage(id, newItem, () => {
            if (window['autoFit' + id]) window['autoFit' + id]();
            if (window['drawAll' + id]) window['drawAll' + id]();
            if (window['updateCADOptionsUI' + id]) window['updateCADOptionsUI' + id]();
            recomputeCADTotals(id);
            saveProgress();
        });
    };

    window.updateCADItemImage = function(id, item, callback) {
        cardsState['temp'] = Object.assign({}, item.state, {type: item.type, categoria: item.categoria}); 
        let svgStr = renderSVG('temp'); 
        delete cardsState['temp'];
        svgStr = svgStr.replace('width="100%" height="100%"', `width="${Math.max(100, item.w * 3)}px" height="${Math.max(100, item.h * 3)}px"`);
        const img = new Image();
        const svgBlob = new Blob([svgStr], {type: 'image/svg+xml;charset=utf-8'});
        const url = URL.createObjectURL(svgBlob);
        img.onload = () => { item.img = img; if(callback) callback(); URL.revokeObjectURL(url); };
        img.src = url;
    };

    window.updateCADItemState = function(id, key, value) {
        let item = window['selectedCADItem' + id];
        if(!item) return;
        const scaleFactor = 0.06; 
        
        if (key === 'panos' && item.categoria === 'fachada') {
            item.state.panos = value;
            if (window['updateCADOptionsUI' + id]) window['updateCADOptionsUI' + id]();
        } else if (key === 'ancho') { 
            let cleanVal = parseInt(String(value).replace(/\D/g, '')) || 0;
            item.state.ancho = cleanVal; 
            if(cleanVal > 0) item.w = Math.max(20, cleanVal * scaleFactor);
            document.getElementById(`ancho-${id}`).classList.remove('error-pulse');
        } else if (key === 'alto') { 
            let cleanVal = parseInt(String(value).replace(/\D/g, '')) || 0;
            item.state.alto = cleanVal; 
            if(cleanVal > 0) item.h = Math.max(20, cleanVal * scaleFactor);
            document.getElementById(`alto-${id}`).classList.remove('error-pulse');
        } else { item.state[key] = value; }
        
        updateCADItemImage(id, item, () => {
            if (window['autoFit' + id]) window['autoFit' + id]();
            if(window['drawAll' + id]) window['drawAll' + id]();
            recomputeCADTotals(id);
            saveProgress();
        });
        if(key === 'orientacion' || key === 'tipo_aluminio' || key === 'vidrio' || key === 'apertura' || key === 'vista') {
            if (window['updateCADOptionsUI' + id]) window['updateCADOptionsUI' + id]();
        }
    }

    // Mapea el texto del color del encabezado (COLOR / ACABADO) a la clave de acabado del perfil.
    function headerAcabado() {
        const raw = (document.getElementById('header-color') ? document.getElementById('header-color').value : '').trim();
        if (!raw) return null;
        const t = raw.toLowerCase();
        if (/negro|black/.test(t)) return { key: 'negro' };
        if (/blanco|white/.test(t)) return { key: 'blanco' };
        if (/grafito|antracita|antra/.test(t)) return { key: 'grafito' };
        if (/madera|wood|roble|nogal/.test(t)) return { key: 'madera' };
        // Código RAL: la palabra "RAL", un hex, o un número de 4 dígitos (ej. "Gris 7039") —
        // antes de "natural" para que "Gris 7039" tome el RAL, no el gris genérico.
        if (/^#?[0-9a-fA-F]{6}$/.test(raw) || /\bral\b/.test(t) || /\b\d{4}\b/.test(t)) return { key: 'ral', ral: raw };
        if (/natural|plata|aluminio|silver|mate|gris|gray/.test(t)) return { key: 'natural' };
        return null; // texto desconocido -> deja el default
    }

    // Extrae el tipo de aluminio (P92/E70/E100/E200) del texto del encabezado TIPO DE MATERIAL.
    function headerAluminio() {
        const raw = (document.getElementById('header-material') ? document.getElementById('header-material').value : '').toUpperCase().replace(/\s+/g, '');
        if (!raw) return '';
        const opts = ['P92', 'E200', 'E100', 'E70'];
        for (let i = 0; i < opts.length; i++) if (raw.indexOf(opts[i]) !== -1) return opts[i];
        return '';
    }

    // Marca por ítem: "Medida de fabricación" o "Medida de cotización" — guía para quien produce.
    // Se inserta en TODAS las tarjetas (después de la Ubicación), se ve también en el resumen/PDF
    // y se guarda en el estado del ítem (medidaTipo). Por defecto toma el tipo del documento.
    function insertarMarcaMedida(id, card) {
        if (!card || !cardsState[id]) return;
        if (cardsState[id].medidaTipo == null) {
            const dt = ((document.getElementById('doc-type-title') || {}).innerText || '').toUpperCase();
            cardsState[id].medidaTipo = dt.indexOf('FAB') === 0 ? 'fabricacion' : 'cotizacion';
        }
        const ubi = card.querySelector('input[placeholder*="Ubicación"]');
        const anchor = ubi || card.querySelector('.card-ref-row');
        if (!anchor) return;
        const el = document.createElement('div');
        el.className = 'medida-toggle';
        el.id = 'medida-' + id;
        el.innerHTML = `<span class="ml">Medida:</span>` +
            `<button type="button" data-v="fabricacion" onclick="setMedidaTipo(${id}, 'fabricacion')">Fabricación</button>` +
            `<button type="button" data-v="cotizacion" onclick="setMedidaTipo(${id}, 'cotizacion')">Cotización</button>`;
        anchor.insertAdjacentElement('afterend', el);
        marcarMedidaBotones(id);
    }
    function marcarMedidaBotones(id) {
        const el = document.getElementById('medida-' + id);
        if (!el) return;
        const tipo = cardsState[id].medidaTipo || 'cotizacion';
        el.querySelectorAll('button').forEach(b => {
            b.classList.toggle('active', b.dataset.v === tipo);
            b.classList.toggle('fab', b.dataset.v === 'fabricacion');
        });
    }
    window.setMedidaTipo = function (id, tipo) {
        if (!cardsState[id]) return;
        cardsState[id].medidaTipo = tipo;
        marcarMedidaBotones(id);
        saveProgress();
    };

    function addItem(label, type, categoria, savedData = null, forcedId = null, forcedState = null) {
        let id = forcedId || ++itemId;
        if (forcedId && id > itemId) itemId = id;
        
        if (forcedState) {
            cardsState[id] = forcedState;
        } else if (!forcedId) {
            // Vidrio Laminado 4+4 por defecto (se puede cambiar por ítem) — evita tener que
            // elegirlo a mano en cada ítem nuevo. Ducha/cerramiento/baranda pisan este default
            // más abajo con su propio vidrio típico (templado 10mm).
            cardsState[id] = { type, categoria, label, orientacion: 'I', panos: 1, cantidad: 1, bisagras: 'botella', cerradura_tipo: 'ninguna', cerradura_piso: 'no', tirador: '', ancho: 0, alto: 0, union: 'T', tipo_aluminio: '', vista: 'adentro', vidrio: 'laminado', espesor: '4+4', locked: false };
            if (categoria === 'ducha') {
                cardsState[id].forma = 'recto';
                cardsState[id].fijacion = 'conector';
                cardsState[id].vidrio = 'templado';
                cardsState[id].espesor = '10mm';
            } else if (categoria === 'cerramiento') {
                cardsState[id].alto = 2000;
                cardsState[id].paneles = [
                    { tipo: 'fijo', ancho: 900, color_vidrio: 'natural', vidrio: 'templado', espesor: '10mm', herraje_color: 'cromado' }
                ];
                cardsState[id].ancho = 900;
            } else if (categoria === 'baranda') {
                cardsState[id].pose = 'horizontal';
                cardsState[id].forma = 'recto';
                cardsState[id].fijacion = 'base_u';
                cardsState[id].herraje_color = 'cromado';
                cardsState[id].color_perfil = 'natural';
                cardsState[id].vidrio = 'templado';
                cardsState[id].espesor = '10mm';
                cardsState[id].tramos = [{ L: 2000 }];
                cardsState[id].alto = 1200;
                cardsState[id].ancho = 2000;
            }
            // Acabado por defecto = color del encabezado (se puede cambiar por ítem)
            const ha = headerAcabado();
            if (ha) { cardsState[id].color_perfil = ha.key; if (ha.ral) cardsState[id].color_ral = ha.ral; }
            // Tipo de aluminio por defecto = material del encabezado (correderas y galandajes)
            if (categoria === 'corredera' || categoria === 'galandaje') {
                const al = headerAluminio();
                if (al) cardsState[id].tipo_aluminio = al;
            }
        }

        const list = document.getElementById('item-list');
        const card = document.createElement('div');
        
        let extraClasses = cardsState[id].locked ? ' locked' : '';
        if (cardsState[id].type === 'draw') extraClasses += ' cad-card';
        if (categoria === 'corredera' || categoria === 'galandaje') extraClasses += ' plan-view-card';
        card.className = 'item-card' + extraClasses;
        card.id = 'card-' + id;
        card.setAttribute('draggable', 'false');

    function deleteCard(id) {
        document.getElementById('card-' + id).remove();
        delete cardsState[id];
        saveProgress();
    }

    function updateState(id, key, value) {
        if (!cardsState[id]) return;
        
        if (key === 'panos' && cardsState[id].categoria === 'fachada') {
            cardsState[id].panos = value;
            let pCount = parseInt(value) || 1;
            cardsState[id].label = pCount === 1 ? 'Paño Fijo' : 'Fachada Fija Multipañó';
            let titleSpan = document.getElementById('title-' + id);
            if(titleSpan) titleSpan.innerText = cardsState[id].label;
            
            const optionsContainer = document.getElementById('options-' + id);
            if (optionsContainer) {
                optionsContainer.innerHTML = getMenuOpciones(id, cardsState[id].categoria, cardsState[id].type, false);
                const selects = optionsContainer.querySelectorAll('select');
                selects.forEach(sel => {
                    let onchangeStr = sel.getAttribute('onchange');
                    if(onchangeStr) {
                        let match = onchangeStr.match(/,\s*'([^']+)'\s*,/);
                        if(match && match[1] && cardsState[id][match[1]] !== undefined) sel.value = cardsState[id][match[1]];
                    }
                });
            }
        } else if (key === 'ancho' || key === 'alto' || key === 'cantidad') {
            cardsState[id][key] = parseInt(String(value).replace(/\D/g, '')) || 0;
        } else {
            cardsState[id][key] = value;
        }

        // Auto-tipo de vidrio según el grosor: laminado (X+X) o templado (10/12mm)
        if (key === 'espesor' && value) {
            if (['3+3', '4+4', '5+5', '6+6'].includes(value)) cardsState[id].vidrio = 'laminado';
            else if (['10mm', '12mm'].includes(value)) cardsState[id].vidrio = 'templado';
            const oc = document.getElementById('options-' + id);
            if (oc) {
                oc.innerHTML = getMenuOpciones(id, cardsState[id].categoria, cardsState[id].type, false);
                oc.querySelectorAll('select').forEach(sel => {
                    const m = (sel.getAttribute('onchange') || '').match(/,\s*'([^']+)'\s*,/);
                    if (m && m[1] && cardsState[id][m[1]] !== undefined) sel.value = cardsState[id][m[1]];
                });
            }
            const sc = document.getElementById('schematic-' + id);
            if (sc) sc.innerHTML = renderSVG(id);
        }

        if (cardsState[id].categoria === 'ducha' || cardsState[id].categoria === 'baranda') {
            if (key === 'pose') {
                barandaRecalc(id);
                const b = document.getElementById('baranda-builder-' + id);
                if (b) b.innerHTML = renderBarandaBuilder(id);
            }
            const sc = document.getElementById('schematic-' + id);
            if (sc) sc.innerHTML = renderSVG(id);
        }

        // La mosquitera suma 1 vía en correderas (ocupa un riel extra): refrescar la etiqueta.
        if (key === 'mosquitera' && cardsState[id].categoria === 'corredera') {
            const viasDiv = document.getElementById('vias-' + id);
            const vc = correderaVias(cardsState[id].type, cardsState[id].mosquitera === 'con');
            if (viasDiv && vc !== null) viasDiv.textContent = vc + ' vías';
        }

        if (cardsState[id].type !== 'draw') {
            if (['panos', 'union', 'bisagras', 'cerradura_tipo', 'cerradura_piso', 'cerr_luna', 'cerr_digital', 'cerr_piso', 'tirador', 'orientacion', 'ancho', 'alto', 'apertura', 'vista', 'color_perfil', 'color_vidrio', 'color_ral', 'gal_install', 'gal_sheetrock', 'cor_interior', 'mosquitera', 'herraje_color'].includes(key)) {
                const container = document.getElementById('schematic-' + id);
                if (container) container.innerHTML = renderSVG(id);
            }
            if (key === 'tipo_aluminio' || key === 'vidrio' || key === 'color_perfil' || key === 'fijacion') {
                const card = document.getElementById('card-' + id);
                if (card) {
                    const optionsContainer = card.querySelector('.config-options');
                    if (optionsContainer) {
                        optionsContainer.innerHTML = getMenuOpciones(id, cardsState[id].categoria, cardsState[id].type, false);
                        const selects = optionsContainer.querySelectorAll('select');
                        selects.forEach(sel => {
                            let onchangeStr = sel.getAttribute('onchange');
                            if(onchangeStr) {
                                let match = onchangeStr.match(/,\s*'([^']+)'\s*,/);
                                if(match && match[1] && cardsState[id][match[1]] !== undefined) sel.value = cardsState[id][match[1]];
                            }
                        });
                    }
                }
            }
        }
        saveProgress();
    }

    function setOrientation(id, side) {
        const card = document.getElementById('card-' + id);
        const btnI = card.querySelector('#btn-i-' + id);
        const btnD = card.querySelector('#btn-d-' + id);
        if(btnI) btnI.className = 'toggle-btn' + (side === 'I' ? ' active' : '');
        if(btnD) btnD.className = 'toggle-btn' + (side === 'D' ? ' active' : '');
        updateState(id, 'orientacion', side);
    }

    // --- Paño Fijo adosado (arriba/abajo) en ventanas/puertas: modelo de datos + UI ---------
    function getPanoDefault() {
        const state = { alto: 0, vidrio: 'templado', espesor: '10mm', color_vidrio: 'natural', fijacion: 'conectores', color_perfil: 'natural', color_ral: '' };
        const ha = headerAcabado();
        if (ha) { state.color_perfil = ha.key; if (ha.ral) state.color_ral = ha.ral; }
        return state;
    }

    window.togglePano = function(id, side) {
        if (!cardsState[id]) return;
        const key = side === 'arriba' ? 'panoArriba' : 'panoAbajo';
        cardsState[id][key] = cardsState[id][key] ? null : getPanoDefault();
        refreshPanoUI(id);
        const sc = document.getElementById('schematic-' + id);
        if (sc) sc.innerHTML = renderSVG(id);
        saveProgress();
    };

    window.updatePanoState = function(id, side, key, value) {
        if (!cardsState[id]) return;
        const panoKey = side === 'arriba' ? 'panoArriba' : 'panoAbajo';
        const pano = cardsState[id][panoKey];
        if (!pano) return;
        if (key === 'alto') pano.alto = parseInt(String(value).replace(/\D/g, '')) || 0;
        else pano[key] = value;

        if (key === 'espesor' && value) {
            if (['3+3', '4+4', '5+5', '6+6'].includes(value)) pano.vidrio = 'laminado';
            else if (['10mm', '12mm'].includes(value)) pano.vidrio = 'templado';
        }

        const container = document.getElementById('schematic-' + id);
        if (container) container.innerHTML = renderSVG(id);
        if (key === 'color_perfil' || key === 'espesor') refreshPanoUI(id);
        if (cardsState[id].locked) generateSummary(id);
        saveProgress();
    };

    function buildPanoConfigHtml(id, side, pano) {
        const fn = `updatePanoState(${id}, '${side}'`;
        const vt = pano.vidrio || 'templado';
        const ce = pano.espesor || '';
        const cv = pano.color_vidrio || '';
        const fij = pano.fijacion || 'conectores';
        const cp = pano.color_perfil || 'natural';
        let colorPerfilSel = `<select onchange="${fn}, 'color_perfil', this.value)" title="Acabado del perfil de aluminio"><option value="blanco" ${cp==='blanco'?'selected':''}>Acabado: Blanco</option><option value="negro" ${cp==='negro'?'selected':''}>Acabado: Negro</option><option value="natural" ${cp==='natural'?'selected':''}>Acabado: Natural/Plata</option><option value="grafito" ${cp==='grafito'?'selected':''}>Acabado: Grafito</option><option value="madera" ${cp==='madera'?'selected':''}>Acabado: Madera</option><option value="ral" ${cp==='ral'?'selected':''}>Acabado: RAL Especial</option></select>`;
        if (cp === 'ral') colorPerfilSel += `<input type="text" value="${pano.color_ral || ''}" placeholder="RAL / Hex (ej: RAL 7016)" oninput="${fn}, 'color_ral', this.value)" style="grid-column: span 2;">`;
        return `
            <input type="text" inputmode="numeric" value="${pano.alto || ''}" placeholder="Alto del paño (mm)" oninput="${fn}, 'alto', this.value)" style="grid-column: span 2;">
            <select onchange="${fn}, 'vidrio', this.value)"><option value="templado" ${vt==='templado'?'selected':''}>Vidrio Templado</option><option value="laminado" ${vt==='laminado'?'selected':''}>Vidrio Laminado</option></select>
            <select onchange="${fn}, 'espesor', this.value)"><option value="" ${ce===''?'selected':''}>-- Grosor --</option><option value="10mm" ${ce==='10mm'?'selected':''}>3/8" (10mm)</option><option value="12mm" ${ce==='12mm'?'selected':''}>1/2" (12mm)</option><option value="3+3" ${ce==='3+3'?'selected':''}>3+3</option><option value="4+4" ${ce==='4+4'?'selected':''}>4+4</option><option value="5+5" ${ce==='5+5'?'selected':''}>5+5</option><option value="6+6" ${ce==='6+6'?'selected':''}>6+6</option></select>
            <select onchange="${fn}, 'color_vidrio', this.value)"><option value="" ${cv===''?'selected':''}>-- Color del Vidrio --</option><option value="natural" ${cv==='natural'?'selected':''}>Natural / Transparente</option><option value="negro" ${cv==='negro'?'selected':''}>Negro / Transparente</option><option value="azul" ${cv==='azul'?'selected':''}>Azul / Transparente</option><option value="esmerilado" ${cv==='esmerilado'?'selected':''}>Esmerilado / Opaco</option><option value="reflectivo" ${cv==='reflectivo'?'selected':''}>Reflectivo</option></select>
            <select onchange="${fn}, 'fijacion', this.value)" title="Sistema / Fijación"><option value="conectores" ${fij==='conectores'?'selected':''}>Con Conectores</option><option value="moldura" ${fij==='moldura'?'selected':''}>Con Moldura Perimetral</option><option value="p40" ${fij==='p40'?'selected':''}>Perfiles Aluminio (P40)</option><option value="sin_marco" ${fij==='sin_marco'?'selected':''}>Sin Marco</option></select>
            ${colorPerfilSel}
        `;
    }

    function renderPanoSection(id) {
        const state = cardsState[id];
        if (!state || state.categoria !== 'ventana') return '';
        const sideBtn = (side, label) => {
            const active = !!state[side === 'arriba' ? 'panoArriba' : 'panoAbajo'];
            return `<div class="toggle-btn ${active ? 'active' : ''}" onclick="togglePano(${id}, '${side}')">${label}</div>`;
        };
        let html = `<div class="orientation-toggle">${sideBtn('arriba', '+ Paño Fijo arriba')}${sideBtn('abajo', '+ Paño Fijo abajo')}</div>`;
        if (state.panoArriba) html += `<div class="pano-config-options"><div style="grid-column:span 2; font-size:11px; font-weight:bold; color:var(--artal-blue);">PAÑO FIJO ARRIBA</div>${buildPanoConfigHtml(id, 'arriba', state.panoArriba)}</div>`;
        if (state.panoAbajo) html += `<div class="pano-config-options"><div style="grid-column:span 2; font-size:11px; font-weight:bold; color:var(--artal-blue);">PAÑO FIJO ABAJO</div>${buildPanoConfigHtml(id, 'abajo', state.panoAbajo)}</div>`;
        return html;
    }

    function refreshPanoUI(id) {
        const section = document.getElementById('pano-section-' + id);
        if (section) section.innerHTML = renderPanoSection(id);
    }

    // =====================================================================
    //  MOTOR DE RENDER ISOMÉTRICO 3D (ARTAL)
    // =====================================================================
    const ISO_C = 0.866, ISO_S = 0.5;
    const OBL_C = 0.62, OBL_S = 0.42; // proyección oblicua (frontal; la profundidad sube hacia atrás-derecha)

    function isoPt(X, Y, Z) { return [ (X - Z) * ISO_C, (X + Z) * ISO_S - Y ]; }
    function oblPt(px, h, pz) { return [ px + pz * OBL_C, -h - pz * OBL_S ]; }

    // Acabado del perfil/contorno — recolorea todo el contorno azul ARTAL al color elegido
    const FINISHES = {
        natural: { main: '#7c858c', light: '#9aa2a9', dark: '#626a70' }, // plata / aluminio (gris)
        negro:   { main: '#1a1a1a', light: '#3a3a3a', dark: '#000000' },
        grafito: { main: '#54606b', light: '#6f7b87', dark: '#3d4751' }, // gris azulado (antracita)
        blanco:  { main: '#cdd3d7', light: '#e6e9eb', dark: '#b4babf' }, // perfil blanco (gris muy claro)
        madera:  { main: '#6b4a2b', light: '#85613c', dark: '#4d351e' }
    };
    function shade(hex, p) {
        let n = parseInt(hex.slice(1), 16), r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
        const f = x => Math.max(0, Math.min(255, Math.round(x + (p / 100) * 255)));
        return '#' + ((1 << 24) + (f(r) << 16) + (f(g) << 8) + f(b)).toString(16).slice(1);
    }
    // Aproximación de códigos RAL comunes en perfiles de aluminio (no es la carta RAL completa,
    // solo los más usados acá) — si el usuario escribe un hex se usa ese directo; si escribe un
    // código RAL de 4 dígitos conocido (ej. "Gris 7039") se usa esta tabla; si no, gris genérico.
    const RAL_HEX = {
        '9010': '#f0ede5', '9016': '#f1f0ea', '1013': '#e3d9c6', '9006': '#a5a5a5',
        '9007': '#8f8f8f', '7016': '#383e42', '7024': '#474a4d', '7039': '#6b6f66',
        '7035': '#d7d7d7', '7001': '#8a9597', '7011': '#4e5459', '7042': '#8f9695',
        '9005': '#0a0a0a', '8019': '#3b3332',
    };
    function ralHex(ral) {
        let h = (ral || '').trim();
        if (/^#?[0-9a-fA-F]{6}$/.test(h)) return h[0] === '#' ? h : '#' + h;
        const m = h.match(/\b(\d{4})\b/);
        if (m && RAL_HEX[m[1]]) return RAL_HEX[m[1]];
        return '#8a8f94';
    }
    function finishColors(key, ral) {
        if (key === 'ral') { const h = ralHex(ral); return { main: h, light: shade(h, 12), dark: shade(h, -22) }; }
        return FINISHES[key];
    }
    function applyFinish(svg, key, ral) {
        key = key || 'natural';
        const f = finishColors(key, ral);
        if (!f) return svg;
        return svg.split('#0A3D62').join(f.main)
                  .split('#1c5a85').join(f.light)
                  .split('#0d3f5f').join(f.dark)
                  .split('#072c46').join(f.dark);
    }
    // Color del aluminio (relleno) según el acabado — para la base U
    function profileFill(cp, ral) {
        switch (cp) {
            case 'negro': return { fill: '#1f1f1f', stroke: '#000000' };
            case 'grafito': return { fill: '#54606b', stroke: '#3d4751' };
            case 'blanco': return { fill: '#e9ecee', stroke: '#b7bec4' };
            case 'madera': return { fill: '#6b4a2b', stroke: '#4d351e' };
            case 'ral': { const h = ralHex(ral); return { fill: h, stroke: shade(h, -25) }; }
            case 'natural': default: return { fill: '#c9ced3', stroke: '#9aa1a8' }; // plata / aluminio
        }
    }
    function roundFit(cx, cy, r) { return `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${r.toFixed(1)}" fill="#0A3D62"/><circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${(r * 0.42).toFixed(1)}" fill="#cdd9e3"/>`; }
    function ptStr(p) { return p[0].toFixed(2) + ',' + p[1].toFixed(2); }
    function polyFrom(pts, attrs) { return `<polygon points="${pts.map(ptStr).join(' ')}" ${attrs}/>`; }
    function newBox() { return { minX: 1e9, minY: 1e9, maxX: -1e9, maxY: -1e9 }; }
    function extBox(b, p) { if (p[0] < b.minX) b.minX = p[0]; if (p[0] > b.maxX) b.maxX = p[0]; if (p[1] < b.minY) b.minY = p[1]; if (p[1] > b.maxY) b.maxY = p[1]; }

    // Paradas del degradado según el color/tipo de vidrio (tiñe el vidrio, no el borde)
    function glassFillStops(color) {
        switch (color) {
            case 'negro': // negro / transparente (vidrio ahumado)
                return [['0%', '#7b828a', '0.62'], ['50%', '#4a5057', '0.6'], ['100%', '#2b3036', '0.64']];
            case 'azul': // azul / transparente
                return [['0%', '#cfe9fb', '0.6'], ['50%', '#86bdea', '0.62'], ['100%', '#4f93d1', '0.66']];
            case 'esmerilado': // esmerilado / opaco
                return [['0%', '#eceff1', '0.97'], ['50%', '#e0e5e9', '0.97'], ['100%', '#d3dadf', '0.98']];
            case 'reflectivo': // reflectivo (espejado, tono plateado-azulado)
                return [['0%', '#dde9ef', '0.88'], ['50%', '#a9c4d2', '0.85'], ['100%', '#7ea0b4', '0.88']];
            case 'natural':
            default: // natural / transparente
                return [['0%', '#eef5fb', '0.72'], ['45%', '#d4e3f0', '0.55'], ['100%', '#bcd4e7', '0.6']];
        }
    }
    function glassDefs(uid, color) {
        const stops = glassFillStops(color).map(s => `<stop offset="${s[0]}" stop-color="${s[1]}" stop-opacity="${s[2]}"/>`).join('');
        return `<defs>
            <linearGradient id="glass-${uid}" x1="0%" y1="0%" x2="100%" y2="100%">${stops}</linearGradient>
            <filter id="shadow-${uid}" x="-40%" y="-40%" width="180%" height="180%">
                <feDropShadow dx="2" dy="4" stdDeviation="2.4" flood-color="#0A3D62" flood-opacity="0.28"/>
            </filter>
        </defs>`;
    }

    // Panel plano con vidrio sombreado + un borde fino que simboliza el espesor (no perspectiva completa)
    function extrudedPanel(uid, x, y, w, h) {
        const t = 2.5; // grosor visual del marco/vidrio
        const x2 = x + w, y2 = y + h;
        let s = '';
        // vidrio con sombra suave
        s += `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="url(#glass-${uid})" stroke="none" filter="url(#shadow-${uid})"/>`;
        // borde de espesor: cara derecha e inferior
        s += polyFrom([[x2, y], [x2 + t, y + t], [x2 + t, y2 + t], [x2, y2]], 'fill="#1c5a85" stroke="#0A3D62" stroke-width="0.4"');
        s += polyFrom([[x, y2], [x2, y2], [x2 + t, y2 + t], [x + t, y2 + t]], 'fill="#0d3f5f" stroke="#0A3D62" stroke-width="0.4"');
        // reflejo de vidrio (dos franjas diagonales translúcidas)
        s += glassReflection(x, y, w, h);
        return s;
    }

    // Reflejo de vidrio: franjas diagonales suaves (en lugar de una sola línea)
    function glassReflection(x, y, w, h) {
        const band = (ox, ww, op) => {
            const x1 = x + w * ox, x2 = x1 + w * ww, sk = w * 0.16;
            return `<polygon points="${x1.toFixed(1)},${(y + h).toFixed(1)} ${x2.toFixed(1)},${(y + h).toFixed(1)} ${(x2 + sk).toFixed(1)},${y.toFixed(1)} ${(x1 + sk).toFixed(1)},${y.toFixed(1)}" fill="#ffffff" fill-opacity="${op}" stroke="none"/>`;
        };
        return band(0.12, 0.07, 0.16) + band(0.24, 0.022, 0.30);
    }

    // Panel de VIDRIO sin marco (mampara/puerta de vidrio): canto fino translúcido en vez de borde oscuro
    function glassOnlyPanel(uid, x, y, w, h) {
        const t = 1.8; // canto de vidrio
        const x2 = x + w, y2 = y + h;
        let s = '';
        s += `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="url(#glass-${uid})" stroke="none" filter="url(#shadow-${uid})"/>`;
        // canto del vidrio (claro translúcido, no marco)
        s += polyFrom([[x2, y], [x2 + t, y + t], [x2 + t, y2 + t], [x2, y2]], 'fill="#a9c6dc" fill-opacity="0.65" stroke="#86a8c4" stroke-width="0.3"');
        s += polyFrom([[x, y2], [x2, y2], [x2 + t, y2 + t], [x + t, y2 + t]], 'fill="#9bbbd2" fill-opacity="0.65" stroke="#86a8c4" stroke-width="0.3"');
        s += glassReflection(x, y, w, h);
        return s;
    }

    // Pared moderna: bloque con sombreado arquitectónico (hatch diagonal), color neutro (no cambia con el acabado)
    function wallBlock(uid, x, y, w, h) {
        const cid = `wc-${uid}-${Math.round(x)}`;
        let s = `<clipPath id="${cid}"><rect x="${x}" y="${y}" width="${w}" height="${h}"/></clipPath>`;
        s += `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="1" fill="#eceef1" stroke="#8b95a0" stroke-width="1.3"/>`;
        s += `<g clip-path="url(#${cid})">`;
        for (let d = -h; d <= w; d += 4) {
            s += `<line x1="${(x + d).toFixed(1)}" y1="${(y + h).toFixed(1)}" x2="${(x + d + h).toFixed(1)}" y2="${y}" stroke="#c2cad1" stroke-width="0.7"/>`;
        }
        s += `</g>`;
        return s;
    }

    // Líneas de medida técnica (estilo plano de fabricación): línea principal entre los dos
    // extremos reales de la medida + líneas testigo (perpendiculares, desde el borde real del
    // elemento hasta la línea) + marcas en 45° en los extremos + el valor de la medida. Se usa
    // en vez de solo un texto flotante para que quede claro a qué tramo corresponde cada medida
    // (línea de un extremo al otro), sobre todo cuando hay más de una medida junta (paños).
    const DIM_COLOR = '#5a6772';
    function dimLineH(x1, x2, y, edgeY, label, fontSize) {
        fontSize = fontSize || 6;
        const dir = Math.sign(y - edgeY) || -1;
        const over = 1.3, tick = 1.4, textGap = 2.6;
        const yFar = y + dir * over;
        let s = `<g stroke="${DIM_COLOR}" stroke-width="0.4" fill="none">`;
        s += `<line x1="${x1.toFixed(1)}" y1="${edgeY.toFixed(1)}" x2="${x1.toFixed(1)}" y2="${yFar.toFixed(1)}"/>`;
        s += `<line x1="${x2.toFixed(1)}" y1="${edgeY.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${yFar.toFixed(1)}"/>`;
        s += `<line x1="${x1.toFixed(1)}" y1="${y.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y.toFixed(1)}"/>`;
        s += `<line x1="${(x1 - tick / 2).toFixed(1)}" y1="${(y + tick / 2).toFixed(1)}" x2="${(x1 + tick / 2).toFixed(1)}" y2="${(y - tick / 2).toFixed(1)}"/>`;
        s += `<line x1="${(x2 - tick / 2).toFixed(1)}" y1="${(y + tick / 2).toFixed(1)}" x2="${(x2 + tick / 2).toFixed(1)}" y2="${(y - tick / 2).toFixed(1)}"/>`;
        s += `</g>`;
        const textY = y + dir * textGap;
        s += `<text x="${((x1 + x2) / 2).toFixed(1)}" y="${textY.toFixed(1)}" font-family="Arimo" font-size="${fontSize}" font-weight="bold" fill="#2c3742" text-anchor="middle" stroke="none">${label}</text>`;
        return s;
    }
    function dimLineV(y1, y2, x, edgeX, label, fontSize) {
        fontSize = fontSize || 6;
        const dir = Math.sign(x - edgeX) || 1;
        const over = 1.3, tick = 1.4, textGap = 2.2;
        const xFar = x + dir * over;
        let s = `<g stroke="${DIM_COLOR}" stroke-width="0.4" fill="none">`;
        s += `<line x1="${edgeX.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${xFar.toFixed(1)}" y2="${y1.toFixed(1)}"/>`;
        s += `<line x1="${edgeX.toFixed(1)}" y1="${y2.toFixed(1)}" x2="${xFar.toFixed(1)}" y2="${y2.toFixed(1)}"/>`;
        s += `<line x1="${x.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x.toFixed(1)}" y2="${y2.toFixed(1)}"/>`;
        s += `<line x1="${(x - tick / 2).toFixed(1)}" y1="${(y1 + tick / 2).toFixed(1)}" x2="${(x + tick / 2).toFixed(1)}" y2="${(y1 - tick / 2).toFixed(1)}"/>`;
        s += `<line x1="${(x - tick / 2).toFixed(1)}" y1="${(y2 + tick / 2).toFixed(1)}" x2="${(x + tick / 2).toFixed(1)}" y2="${(y2 - tick / 2).toFixed(1)}"/>`;
        s += `</g>`;
        const textX = x + dir * textGap;
        const midY = (y1 + y2) / 2;
        s += `<text x="${textX.toFixed(1)}" y="${midY.toFixed(1)}" font-family="Arimo" font-size="${fontSize}" font-weight="bold" fill="#2c3742" text-anchor="${dir > 0 ? 'start' : 'end'}" dominant-baseline="middle" stroke="none">${label}</text>`;
        return s;
    }

    function getPanelRects(state) {
        const t = state.type, isD = state.orientacion === 'D';
        switch (t) {
            case 'cor2': case 'cor3': case 'cor4_cent': case 'cor4_lat': case 'cor6_cent': case 'cor6_lat':
                return [[10, 10, 80, 40]];
            case 'gal1': return [isD ? [10, 10, 70, 40] : [20, 10, 70, 40]];
            case 'gal2_lat': return [isD ? [10, 10, 70, 40] : [20, 10, 70, 40]];
            case 'gal2_cent': return [[20, 10, 60, 40]];
            case 'gal3_3v': return [isD ? [5, 10, 75, 40] : [20, 10, 75, 40]];
            case 'gal4_2v': return [[20, 10, 60, 40]];
            case 'gal4_4v': return [isD ? [0, 10, 80, 40] : [20, 10, 80, 40]];
            case 'gal6_3v': return [[20, 10, 60, 40]];
            case 'win_proy': case 'win_souf': return [[25, 15, 50, 30]];
            case 'win_abat': case 'win_ob': return [[30, 10, 40, 40]];
            case 'door_abat': return [[35, 5, 30, 50]];
            case 'mamp_fija': return [[30, 5, 40, 50]];
            case 'door_glass': return [[30, 5, 40, 50]];
            case 'door_slide': return [[30, 9, 40, 47]];
            case 'fachada_din': return [[10, 5, 80, 50]];
        }
        return [];
    }

    // --- Paño Fijo adosado (arriba/abajo) en ventanas/puertas -----------------------------
    // Se compone DESPUÉS de que renderSVG ya terminó el dibujo del ítem base (mismo ancho,
    // trasladado verticalmente, sin reescalar nada) para no distorsionar tipos que ya
    // combinan elevación + vista de planta en un mismo viewBox (win_abat/win_ob/door_abat).
    const PANO_BAND_H = 34;

    function buildPanoFragment(uid, side, pano, panelRect, isFlipped) {
        const [bx, , bw] = panelRect;
        const puid = `${uid}${side}`;
        const glassOnly = pano.fijacion === 'sin_marco';
        const panelFn = glassOnly ? glassOnlyPanel : extrudedPanel;
        let frag = glassDefs(puid, pano.color_vidrio);
        frag += `<style>path, rect, line, circle, polyline, polygon { vector-effect: non-scaling-stroke; stroke-width: 1.5px; }</style>`;
        // El panel de vidrio (borde de espesor + reflejos) se voltea igual que el ítem base
        // cuando la apertura está "A la derecha" — si no, el paño se ve desde una perspectiva
        // distinta a la ventana (el borde de espesor queda del lado contrario). El texto ("F" y
        // la medida) NUNCA se voltea, para que siga siendo legible.
        const panelSvg = panelFn(puid, bx, 0, bw, PANO_BAND_H);
        frag += isFlipped ? `<g transform="scale(-1, 1) translate(-100, 0)">${panelSvg}</g>` : panelSvg;
        frag += `<text x="${(bx + bw / 2).toFixed(1)}" y="${(PANO_BAND_H / 2 + 3).toFixed(1)}" font-family="Arimo" font-size="9" font-weight="bold" fill="#2c3742" text-anchor="middle" stroke="none">F</text>`;
        if (pano.alto > 0) {
            // Misma fórmula (borde real del panel + margen) que usa la medida "alto" del ítem
            // base — al compartir el mismo panelRect, ambas líneas quedan alineadas en la misma
            // columna sin importar el tipo.
            frag += dimLineV(0, PANO_BAND_H, bx + bw + 4, bx + bw, `${pano.alto} mm`, 7);
        }
        return applyFinish(frag, pano.color_perfil, pano.color_ral);
    }

    // finishedSvg ya pasó por applyFinish() con el acabado del ítem BASE — cada paño se
    // finaliza por separado con su propio acabado antes de pegarse, para que no se mezclen.
    function composePanos(id, state, finishedSvg, viewBox) {
        const m = finishedSvg.match(/^<svg([^>]*)>([\s\S]*)<\/svg>\s*$/);
        if (!m) return finishedSvg;
        const attrs = m[1];
        let inner = m[2];
        const [vbX, vbY, vbW, vbH] = viewBox.split(' ').map(Number);
        const panelRect = getPanelRects(state)[0] || [vbX + 14, 0, vbW - 28, vbH];
        const gap = 4;
        // Mismo criterio de "volteado" que usa renderSVG para el ítem base (línea ~3644):
        // apertura "A la derecha" en estos 4 tipos espeja el dibujo horizontalmente.
        const isFlipped = ['win_abat', 'win_ob', 'win_souf', 'door_abat'].includes(state.type) && state.orientacion === 'D';

        // La vista de planta (si existe) queda "flotando" al final del contenido base, entre
        // la elevación y el borde del viewBox — eso hace que el paño de abajo se pegue después
        // de la vista de planta en vez de después de la ventana. Se extrae y se reubica SIEMPRE
        // al final del compuesto (debajo de los paños), pegada directo a la elevación cuando no
        // hay paño abajo. "elevH" se ancla al borde real del panel de vidrio (getPanelRects),
        // no a un valor fijo — así el paño de abajo queda pegado al vidrio mismo, sin el hueco
        // que antes dejaba antes la vista de planta.
        let planViewFrag = '';
        let elevH = vbH;
        const planMatch = inner.match(/<g class="plan-view-layer">[\s\S]*?<\/g>/);
        if (planMatch) {
            planViewFrag = planMatch[0];
            inner = inner.replace(planViewFrag, '');
            elevH = (panelRect[1] + panelRect[3]) - vbY;
        }

        // El viewBox original deja un margen superior amplio (pensado para el espacio en blanco
        // antes de la ventana, sin paño). Si se ancla el paño de arriba a ese margen (vbY) queda
        // "flotando" separado de la ventana. En vez de eso se ancla al mismo punto de referencia
        // que ya usa la medida "ancho" (texto fijo en y=4 para todos los tipos): el paño queda
        // justo `gap` unidades por encima de esa medida, sin el hueco sobrante.
        const ANCHO_LABEL_Y = 4;
        const topBoundary = state.panoArriba ? (ANCHO_LABEL_Y - gap - PANO_BAND_H) : vbY;
        const botH = state.panoAbajo ? PANO_BAND_H + gap : 0;
        const elevBottom = vbY + elevH;
        const planReservedH = planViewFrag ? (vbH - elevH) + gap : 0;
        const newVbY = topBoundary;
        const newVbH = (elevBottom + botH + planReservedH) - newVbY;
        const newAttrs = attrs.replace(/viewBox="[^"]*"/, `viewBox="${vbX} ${newVbY.toFixed(1)} ${vbW} ${newVbH.toFixed(1)}"`);

        let out = `<svg${newAttrs}>`;
        if (state.panoArriba) out += `<g transform="translate(0, ${(ANCHO_LABEL_Y - gap - PANO_BAND_H).toFixed(1)})">${buildPanoFragment(id, 'arriba', state.panoArriba, panelRect, isFlipped)}</g>`;
        out += inner;
        if (state.panoAbajo) out += `<g transform="translate(0, ${(elevBottom + gap).toFixed(1)})">${buildPanoFragment(id, 'abajo', state.panoAbajo, panelRect, isFlipped)}</g>`;
        // Medida total (ventana + paños) del lado izquierdo, con su propia línea de un extremo
        // (tope del paño de arriba, o de la ventana si no hay) al otro (tope del paño de abajo,
        // o de la ventana si no hay) — para no confundirla con la medida individual de cada
        // pieza (que sigue a la derecha). No incluye el espacio reservado para la vista de
        // planta reubicada: el total es solo ventana + paños, no la vista de planta.
        const totalAlto = (parseInt(state.alto) || 0) + (state.panoArriba ? (parseInt(state.panoArriba.alto) || 0) : 0) + (state.panoAbajo ? (parseInt(state.panoAbajo.alto) || 0) : 0);
        if (totalAlto > 0) {
            const totalTop = state.panoArriba ? newVbY : panelRect[1];
            const totalBottom = state.panoAbajo ? (elevBottom + gap + PANO_BAND_H) : elevBottom;
            out += dimLineV(totalTop, totalBottom, panelRect[0] - 10, panelRect[0], `${totalAlto} mm`, 7);
        }
        if (planViewFrag) {
            const planDelta = state.panoAbajo ? botH : 0;
            out += planDelta ? `<g transform="translate(0, ${planDelta.toFixed(1)})">${planViewFrag}</g>` : planViewFrag;
        }
        out += '</svg>';
        return out;
    }

    function wrapIso(uid, inner, box, pad, color) {
        pad = pad || 60;
        const w = (box.maxX - box.minX) + 2 * pad;
        const h = (box.maxY - box.minY) + 2 * pad;
        const vb = `${(box.minX - pad).toFixed(1)} ${(box.minY - pad).toFixed(1)} ${w.toFixed(1)} ${h.toFixed(1)}`;
        return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${vb}" preserveAspectRatio="xMidYMid meet" width="100%" height="100%">`
            + glassDefs(uid, color)
            + `<style>polygon,rect,line,path,circle{vector-effect:non-scaling-stroke}</style>`
            + inner + `</svg>`;
    }

    // Núcleo compartido: recorrido de paneles de vidrio en planta, extruidos en altura (mm reales)
    function renderGlassRun(uid, segs, H, opts) {
        opts = opts || {};
        const box = newBox();
        const baseH = opts.base ? (opts.baseH || H * 0.06) : 0;
        // orden de pintado: de atrás (menor x+z) hacia adelante
        const order = segs.map((s, i) => i).sort((a, b) =>
            (segs[a].x1 + segs[a].z1 + segs[a].x2 + segs[a].z2) - (segs[b].x1 + segs[b].z1 + segs[b].x2 + segs[b].z2));
        let inner = '';
        order.forEach(i => {
            const s = segs[i];
            const y0 = baseH;
            const B1 = oblPt(s.x1, y0, s.z1), B2 = oblPt(s.x2, y0, s.z2);
            const T1 = oblPt(s.x1, y0 + H, s.z1), T2 = oblPt(s.x2, y0 + H, s.z2);
            [B1, B2, T1, T2].forEach(p => extBox(box, p));
            // base de aluminio en U (perfil inferior con grosor)
            if (opts.base) {
                const b1 = oblPt(s.x1, 0, s.z1), b2 = oblPt(s.x2, 0, s.z2);
                const bt1 = oblPt(s.x1, baseH, s.z1), bt2 = oblPt(s.x2, baseH, s.z2);
                [b1, b2].forEach(p => extBox(box, p));
                inner += polyFrom([b1, b2, bt2, bt1], 'fill="#0A3D62" stroke="#072c46" stroke-width="1.2"');
            }
            // vidrio
            inner += polyFrom([B1, B2, T2, T1], `fill="url(#glass-${uid})" stroke="#0A3D62" stroke-width="1.6" stroke-linejoin="round"`);
            // reflejo
            inner += `<line x1="${(B1[0] + (T1[0] - B1[0]) * 0.0).toFixed(1)}" y1="${B1[1].toFixed(1)}" x2="${T1[0].toFixed(1)}" y2="${T1[1].toFixed(1)}" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>`;
            // conectores (insertados, nunca en los bordes del vidrio)
            if (opts.connectors && opts.connectors !== 'none') {
                const len = Math.hypot(s.x2 - s.x1, s.z2 - s.z1);
                const m = Math.max(2, Math.round(len / 1100));
                for (let k = 0; k < m; k++) {
                    const f = (k + 0.5) / m; // posiciones interiores, separadas de los extremos
                    const px = s.x1 + (s.x2 - s.x1) * f;
                    const pz = s.z1 + (s.z2 - s.z1) * f;
                    if (opts.connectors === 'doble') {
                        // placa lateral: pletina vertical con dos pernos, en la parte baja
                        const pw = Math.max(7, H * 0.05);
                        const cTop = oblPt(px, y0 + H * 0.34, pz), cBot = oblPt(px, y0 + H * 0.10, pz);
                        inner += `<rect x="${(cTop[0] - pw / 2).toFixed(1)}" y="${cTop[1].toFixed(1)}" width="${pw.toFixed(1)}" height="${(cBot[1] - cTop[1]).toFixed(1)}" rx="${(pw * 0.3).toFixed(1)}" fill="#0A3D62"/>`;
                        const br = pw * 0.2;
                        inner += `<circle cx="${cTop[0].toFixed(1)}" cy="${(cTop[1] + (cBot[1] - cTop[1]) * 0.28).toFixed(1)}" r="${br.toFixed(1)}" fill="#cdd9e3"/>`;
                        inner += `<circle cx="${cTop[0].toFixed(1)}" cy="${(cTop[1] + (cBot[1] - cTop[1]) * 0.72).toFixed(1)}" r="${br.toFixed(1)}" fill="#cdd9e3"/>`;
                    } else {
                        // conector puntual: disco/botón redondo en la parte baja
                        const q = oblPt(px, y0 + H * 0.12, pz);
                        inner += roundFit(q[0], q[1], Math.max(4, H * 0.045));
                    }
                }
            }
        });
        return { inner, box };
    }

    // ---- CABINA DE DUCHA ----
    function renderDucha(state, id) {
        const uid = id;
        const A = state.ancho > 0 ? state.ancho : 1000;
        const H = state.alto > 0 ? state.alto : 1900;
        if (state.forma === 'angulo') return renderDuchaCorner(state, id);
        const usePerfil = state.fijacion === 'perfil';
        const conn = usePerfil ? 'none' : (state.fijacion === 'bisagra' ? 'simple' : 'doble');
        const segs = [{ x1: 0, z1: 0, x2: A, z2: 0 }];
        const r = renderGlassRun(uid, segs, H, { base: usePerfil, baseH: H * 0.04, connectors: conn });
        let inner = r.inner;
        // forma 'panel': línea de puerta + tiradores
        if (state.forma === 'panel') {
            const dx = A * 0.55;
            const top = oblPt(dx, H, 0), bot = oblPt(dx, 0, 0);
            inner += `<line x1="${top[0].toFixed(1)}" y1="${top[1].toFixed(1)}" x2="${bot[0].toFixed(1)}" y2="${bot[1].toFixed(1)}" stroke="#0A3D62" stroke-width="1.4"/>`;
            const h1 = oblPt(dx + A * 0.05, H * 0.56, 0), h2 = oblPt(dx + A * 0.05, H * 0.44, 0);
            inner += roundFit(h1[0], h1[1], H * 0.02) + roundFit(h2[0], h2[1], H * 0.02);
        }
        return wrapIso(uid, inner, r.box, 80, state.color_vidrio);
    }

    // Cabina de ducha en ángulo (esquina) — reproduce el "libro abierto" simétrico
    function renderDuchaCorner(state, id) {
        const uid = id;
        const A = state.ancho > 0 ? state.ancho : 1800;
        const H = state.alto > 0 ? state.alto : 1900;
        const D = state.ancho2 > 0 ? state.ancho2 : Math.round(A * 0.6);
        const W = A / 2;
        const P = (X, Y, Z) => [X * 0.92, Z * 0.5 - Y];
        const box = newBox();
        const conn = state.fijacion !== 'perfil';
        // nodos en planta (x, z): c=esquina frontal, le/re extremos, lm/rm divisiones
        const c = [0, 0], lm = [-W / 2, D / 2], le = [-W, D], rm = [W / 2, D / 2], re = [W, D];
        function panel(p1, p2, glass) {
            const B1 = P(p1[0], 0, p1[1]), B2 = P(p2[0], 0, p2[1]);
            const T1 = P(p1[0], H, p1[1]), T2 = P(p2[0], H, p2[1]);
            [B1, B2, T1, T2].forEach(q => extBox(box, q));
            const fill = glass ? `url(#glass-${uid})` : '#d3dce2';
            const op = glass ? 1 : 0.65;
            let s = polyFrom([B1, B2, T2, T1], `fill="${fill}" fill-opacity="${op}" stroke="#0A3D62" stroke-width="1.6" stroke-linejoin="round"`);
            s += `<line x1="${B1[0].toFixed(1)}" y1="${B1[1].toFixed(1)}" x2="${T1[0].toFixed(1)}" y2="${T1[1].toFixed(1)}" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.5"/>`;
            return s;
        }
        let inner = '';
        // de atrás (exteriores) al frente (interiores, junto a la esquina)
        inner += panel(le, lm, false);
        inner += panel(re, rm, false);
        inner += panel(lm, c, true);
        inner += panel(rm, c, true);
        // conectores redondos insertados: 2 arriba + 2 abajo por panel
        if (conn) {
            const r = Math.max(4, A * 0.016);
            [[le, lm], [lm, c], [c, rm], [rm, re]].forEach(seg => {
                [0.18, 0.82].forEach(f => {
                    const px = seg[0][0] + (seg[1][0] - seg[0][0]) * f;
                    const pz = seg[0][1] + (seg[1][1] - seg[0][1]) * f;
                    const top = P(px, H * 0.88, pz), bot = P(px, H * 0.12, pz);
                    inner += roundFit(top[0], top[1], r) + roundFit(bot[0], bot[1], r);
                });
            });
        }
        // tiradores de puerta (paneles interiores, junto a la esquina central)
        const rr = Math.max(3, A * 0.012);
        const pl1 = P(-W * 0.10, H * 0.54, D * 0.05), pl2 = P(-W * 0.10, H * 0.44, D * 0.05);
        const pr1 = P(W * 0.10, H * 0.54, D * 0.05), pr2 = P(W * 0.10, H * 0.44, D * 0.05);
        inner += roundFit(pl1[0], pl1[1], rr) + roundFit(pl2[0], pl2[1], rr) + roundFit(pr1[0], pr1[1], rr) + roundFit(pr2[0], pr2[1], rr);
        return wrapIso(uid, inner, box, 70, state.color_vidrio);
    }

    // ====================== BARANDA DE VIDRIO ======================
    function herrajeColors(state) {
        const c = state.herraje_color || 'cromado';
        if (c === 'negro') return { fill: '#1f1f1f', stroke: '#000000', hi: '#5a5a5a' };
        return { fill: '#c2cad1', stroke: '#7d868f', hi: '#ffffff' }; // cromado (inox)
    }
    function discFit(p, r, col) {
        return `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${r.toFixed(1)}" fill="${col.fill}" stroke="${col.stroke}" stroke-width="1"/>`
            + `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${(r * 0.38).toFixed(1)}" fill="${col.hi}"/>`;
    }
    function squareFit(p, sz, col) {
        return `<rect x="${(p[0] - sz / 2).toFixed(1)}" y="${(p[1] - sz / 2).toFixed(1)}" width="${sz.toFixed(1)}" height="${sz.toFixed(1)}" rx="1" fill="${col.fill}" stroke="${col.stroke}" stroke-width="1"/>`
            + `<rect x="${(p[0] - sz * 0.16).toFixed(1)}" y="${(p[1] - sz * 0.16).toFixed(1)}" width="${(sz * 0.32).toFixed(1)}" height="${(sz * 0.32).toFixed(1)}" fill="${col.hi}"/>`;
    }
    function reflectionLine(B1, T1) {
        return `<line x1="${B1[0].toFixed(1)}" y1="${B1[1].toFixed(1)}" x2="${T1[0].toFixed(1)}" y2="${T1[1].toFixed(1)}" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>`;
    }

    // Dibuja base / conectores a lo largo del borde inferior (s -> e en modelo) con la proyección P
    // lift = separación entre el suelo y el borde inferior del vidrio (para prensa de suelo)
    function emitFixings(P, s, e, H, state, box, phase, lift) {
        lift = lift || 0;
        const fij = state.fijacion || 'base_u';
        const col = herrajeColors(state);
        const baseH = H * 0.055;
        let out = '';
        const at = (f, hh) => P(s.x + (e.x - s.x) * f, s.y + (e.y - s.y) * f + hh, s.z + (e.z - s.z) * f);

        // FASE 'base' (detrás del vidrio): solo la base de aluminio en U (color = acabado del perfil)
        if (phase === 'base') {
            if (fij === 'base_u') {
                const pf = profileFill(state.color_perfil, state.color_ral);
                const a1 = P(s.x, s.y, s.z), a2 = P(e.x, e.y, e.z);
                const b1 = P(s.x, s.y - baseH, s.z), b2 = P(e.x, e.y - baseH, e.z);
                if (box) [a1, a2, b1, b2].forEach(p => extBox(box, p));
                out += polyFrom([a1, a2, b2, b1], `fill="${pf.fill}" stroke="${pf.stroke}" stroke-width="1.2"`);
            }
            return out;
        }

        // FASE 'conn' (sobre el vidrio): conectores / prensa
        if (fij === 'base_u') return '';

        const len = Math.hypot(e.x - s.x, e.y - s.y, e.z - s.z);
        const m = Math.max(2, Math.round(len / 1100));
        for (let k = 0; k < m; k++) {
            const f = (k + 0.5) / m;
            if (fij === 'prensa_suelo') {
                // Poste de suelo que sube por DELANTE del vidrio (proporcional a la altura)
                const spigotH = Math.max(H * 0.2, 200);
                const floorP = at(f, -lift);                 // apoyo en el suelo (y=0)
                const topP = at(f, spigotH - lift);          // punta del poste
                const cx = floorP[0];
                const yF = floorP[1], yT = topP[1];          // yF (suelo) abajo, yT (punta) arriba
                const sw = Math.max(H * 0.06, 60), fw = sw * 1.6, fh = spigotH * 0.14, ch = sw * 0.4;
                const top = yT;
                const pts = [
                    [cx - fw / 2, yF], [cx + fw / 2, yF], [cx + fw / 2, yF - fh],
                    [cx + sw / 2, yF - fh], [cx + sw / 2, top + ch], [cx + sw / 2 - ch, top],
                    [cx - sw / 2 + ch, top], [cx - sw / 2, top + ch], [cx - sw / 2, yF - fh],
                    [cx - fw / 2, yF - fh]
                ];
                out += polyFrom(pts, `fill="${col.fill}" stroke="${col.stroke}" stroke-width="1" stroke-linejoin="round"`);
                out += `<line x1="${(cx - sw * 0.2).toFixed(1)}" y1="${(top + ch + 2).toFixed(1)}" x2="${(cx - sw * 0.2).toFixed(1)}" y2="${(yF - fh - 2).toFixed(1)}" stroke="${col.hi}" stroke-width="1.5" stroke-opacity="0.7"/>`;
            } else if (fij === 'conector_redondo') {
                const r = Math.max(4, H * 0.04);
                out += discFit(at(f, H * 0.30), r, col) + discFit(at(f, H * 0.12), r, col);
            } else if (fij === 'conector_cuadrado') {
                const sz = Math.max(7, H * 0.075);
                out += squareFit(at(f, H * 0.30), sz, col) + squareFit(at(f, H * 0.12), sz, col);
            } else if (fij === 'conector_doble') {
                const pw = Math.max(7, H * 0.05);
                const cTop = at(f, H * 0.34), cBot = at(f, H * 0.10);
                const yTop = Math.min(cTop[1], cBot[1]), hh = Math.abs(cBot[1] - cTop[1]);
                out += `<rect x="${(cTop[0] - pw / 2).toFixed(1)}" y="${yTop.toFixed(1)}" width="${pw.toFixed(1)}" height="${hh.toFixed(1)}" rx="${(pw * 0.3).toFixed(1)}" fill="${col.fill}" stroke="${col.stroke}" stroke-width="0.8"/>`;
                const br = pw * 0.2;
                const m1 = at(f, H * 0.16), m2 = at(f, H * 0.28);
                out += `<circle cx="${m1[0].toFixed(1)}" cy="${m1[1].toFixed(1)}" r="${br.toFixed(1)}" fill="${col.hi}"/>`;
                out += `<circle cx="${m2[0].toFixed(1)}" cy="${m2[1].toFixed(1)}" r="${br.toFixed(1)}" fill="${col.hi}"/>`;
            }
        }
        return out;
    }

    function barandaPlanSegs(tramos) {
        let x = 0, z = 0, h = 0;
        const segs = [];
        (tramos || []).forEach((t, i) => {
            // el giro se aplica también al primer tramo (orienta el inicio)
            const ang = ((parseFloat(t.angulo) || 90)) * Math.PI / 180;
            if (t.giro === 'der') h += ang;
            else if (t.giro === 'izq') h -= ang;
            const L = parseFloat(t.L) || 1000;
            const nx = x + Math.cos(h) * L;
            const nz = z + Math.sin(h) * L;
            segs.push({ x1: x, z1: z, x2: nx, z2: nz });
            x = nx; z = nz;
        });
        if (!segs.length) segs.push({ x1: 0, z1: 0, x2: 1000, z2: 0 });
        return segs;
    }

    // Vista plana (balcón) — proyección oblicua: tramos rectos = frontal; los giros se alejan hacia arriba-derecha
    function renderBarandaFlat(uid, segs, H, state) {
        const box = newBox();
        const P = (X, Y, Z) => oblPt(X, Y, Z);
        const gap = segs.length > 1 ? 0.025 : 0; // separación visible entre paños
        const order = segs.map((s, i) => i).sort((a, b) => {
            const za = segs[a].z1 + segs[a].z2, zb = segs[b].z1 + segs[b].z2;
            if (zb !== za) return zb - za;               // los lejanos (mayor z) primero
            return (segs[b].x1 + segs[b].x2) - (segs[a].x1 + segs[a].x2);
        });
        // prensa de suelo: el vidrio queda elevado y los postes llegan al suelo
        const lift = state.fijacion === 'prensa_suelo' ? Math.max(H * 0.09, 95) : 0;
        let inner = '';
        order.forEach(i => {
            const s = segs[i];
            const dx = s.x2 - s.x1, dz = s.z2 - s.z1;
            const ax = s.x1 + dx * gap, az = s.z1 + dz * gap;
            const bx = s.x2 - dx * gap, bz = s.z2 - dz * gap;
            const B1 = P(ax, lift, az), B2 = P(bx, lift, bz), T1 = P(ax, lift + H, az), T2 = P(bx, lift + H, bz);
            [B1, B2, T1, T2].forEach(p => extBox(box, p));
            if (lift) { extBox(box, P(ax, 0, az)); extBox(box, P(bx, 0, bz)); }
            // base de aluminio U: usa el tramo COMPLETO (corrida/continua, sin la separación del vidrio)
            inner += emitFixings(P, { x: s.x1, y: lift, z: s.z1 }, { x: s.x2, y: lift, z: s.z2 }, H, state, box, 'base', lift);
            inner += polyFrom([B1, B2, T2, T1], `fill="url(#glass-${uid})" stroke="#0A3D62" stroke-width="1.6" stroke-linejoin="round"`);
            inner += reflectionLine(B1, T1);
            inner += emitFixings(P, { x: ax, y: lift, z: az }, { x: bx, y: lift, z: bz }, H, state, box, 'conn', lift);
        });
        return { inner, box };
    }

    // Vista en escalera — ISOMÉTRICA 3D real: tramos en pendiente, plataformas planas (descansillo),
    // giros doblan en esquina. Sirve para escaleras rectas, con plataforma o de varios pisos.
    function renderBarandaStairs(uid, tramos, H, state) {
        const slope = 0.5;                       // pendiente de los tiros
        const OC = 0.55, OS = 0.32;              // proyección oblicua: X=horizontal, Y=altura, Z=profundidad
        const P = (X, Y, Z) => [X + Z * OC, Z * OS - Y];
        const lift = state.fijacion === 'prensa_suelo' ? Math.max(H * 0.09, 95) : 0;
        let x = 0, y = 0, z = 0, h = 0;
        const flights = [];
        tramos.forEach(t => {
            const ang = ((parseFloat(t.angulo) || 90)) * Math.PI / 180;
            if (t.giro === 'der') h += ang;
            else if (t.giro === 'izq') h -= ang;
            const L = parseFloat(t.L) || 1000;
            const rise = t.plataforma ? 0 : L * slope;
            const sx = x, sy = y, sz = z;
            const ex = x + Math.cos(h) * L, ey = y + rise, ez = z + Math.sin(h) * L;
            flights.push({ s: { x: sx, y: sy, z: sz }, e: { x: ex, y: ey, z: ez } });
            x = ex; y = ey; z = ez;
        });
        const box = newBox();
        let inner = '';
        // pintar en orden de recorrido (los tramos de profundidad quedan delante)
        for (let i = 0; i < flights.length; i++) {
            const f = flights[i];
            const sL = { x: f.s.x, y: f.s.y + lift, z: f.s.z }, eL = { x: f.e.x, y: f.e.y + lift, z: f.e.z };
            const B1 = P(sL.x, sL.y, sL.z), B2 = P(eL.x, eL.y, eL.z);
            const T1 = P(sL.x, sL.y + H, sL.z), T2 = P(eL.x, eL.y + H, eL.z);
            [B1, B2, T1, T2].forEach(p => extBox(box, p));
            if (lift) { extBox(box, P(f.s.x, f.s.y, f.s.z)); extBox(box, P(f.e.x, f.e.y, f.e.z)); }
            inner += emitFixings(P, sL, eL, H, state, box, 'base', lift);
            inner += polyFrom([B1, B2, T2, T1], `fill="url(#glass-${uid})" stroke="#0A3D62" stroke-width="1.6" stroke-linejoin="round"`);
            inner += reflectionLine(B1, T1);
            inner += emitFixings(P, sL, eL, H, state, box, 'conn', lift);
        }
        return { inner, box };
    }

    function renderBaranda(state, id) {
        const uid = id;
        const H = state.alto > 0 ? state.alto : 1200;
        const tramos = (state.tramos && state.tramos.length) ? state.tramos : [{ L: 2000 }];
        let r;
        if (state.pose === 'escalera') r = renderBarandaStairs(uid, tramos, H, state);
        else r = renderBarandaFlat(uid, barandaPlanSegs(tramos), H, state);
        return wrapIso(uid, r.inner, r.box, 90, state.color_vidrio);
    }

    // ---- CONSTRUCTOR DE BALCÓN 3D (UI) ----
    function getTramos(id) {
        if (!cardsState[id].tramos || !cardsState[id].tramos.length) cardsState[id].tramos = [{ L: 2000 }];
        return cardsState[id].tramos;
    }

    function barandaRecalc(id) {
        const st = cardsState[id];
        const tramos = getTramos(id);
        st.ancho = tramos.reduce((a, t) => a + (parseInt(t.L) || 0), 0);
        if (!st.alto) st.alto = 1200;
    }

    function refreshBaranda(id, rebuildUI) {
        barandaRecalc(id);
        const cont = document.getElementById('schematic-' + id);
        if (cont) cont.innerHTML = renderSVG(id);
        if (rebuildUI) {
            const b = document.getElementById('baranda-builder-' + id);
            if (b) b.innerHTML = renderBarandaBuilder(id);
        }
        if (cardsState[id].locked) generateSummary(id);
        saveProgress();
    }

    function renderBarandaBuilder(id) {
        const st = cardsState[id];
        const forma = st.forma || 'recto';
        const act = f => forma === f ? ' active' : '';
        let h = `<div class="forma-buttons">
            <button class="forma-btn${act('recto')}" onclick="barandaSetForma(${id}, 'recto')">— Recto</button>
            <button class="forma-btn${act('L')}" onclick="barandaSetForma(${id}, 'L')">⌐ Forma L</button>
            <button class="forma-btn${act('U')}" onclick="barandaSetForma(${id}, 'U')">⊔ Forma U</button>
        </div>`;
        const tramos = getTramos(id);
        h += '<div class="bar-box">';
        tramos.forEach((t, i) => {
            const g = t.giro || 'recto';
            h += `<div class="bar-row"><b>Tramo ${i + 1}:</b>
                <input type="number" value="${t.L != null ? t.L : ''}" placeholder="L (mm)" oninput="barandaUpdateTramo(${id}, ${i}, 'L', this.value)">
                <button class="bar-x" title="Borrar este tramo" onclick="barandaRemoveTramo(${id}, ${i})">X</button></div>`;
            h += `<div class="bar-giro">
                    <select onchange="barandaUpdateTramo(${id}, ${i}, 'giro', this.value)">
                        <option value="recto" ${g === 'recto' ? 'selected' : ''}>Recto (sin giro)</option>
                        <option value="der" ${g === 'der' ? 'selected' : ''}>Giro Der &#8635;</option>
                        <option value="izq" ${g === 'izq' ? 'selected' : ''}>Giro Izq &#8634;</option>
                    </select>
                    <input type="number" value="${t.angulo || 90}" title="Ángulo" oninput="barandaUpdateTramo(${id}, ${i}, 'angulo', this.value)"><span style="font-weight:bold;">&deg;</span>
                    <label class="bar-plat" title="Tramo plano (descansillo / balcón)"><input type="checkbox" ${t.plataforma ? 'checked' : ''} onchange="barandaUpdateTramo(${id}, ${i}, 'plataforma', this.checked)"> Plat.</label>
                </div>`;
        });
        h += `<button class="bar-add" onclick="barandaAddTramo(${id})">+ Añadir Tramo</button></div>`;
        if (st.pose === 'escalera') h += `<div style="font-size:10px; color:#777; margin-top:6px;">Pose en escalera: cada tramo es un tiro que sube. Usa Forma L/U y los giros para representar escaleras de varios pisos.</div>`;
        return h;
    }

    function barandaSetForma(id, forma) {
        const st = cardsState[id];
        st.forma = forma;
        let t = getTramos(id);
        if (forma === 'recto') {
            t.forEach((x, i) => { if (i >= 1) { x.giro = 'recto'; x.angulo = x.angulo || 90; } });
        } else if (forma === 'L') {
            while (t.length < 2) t.push({ L: 1500 });
            t[1].giro = 'der'; t[1].angulo = 90;
            for (let i = 2; i < t.length; i++) t[i].giro = 'recto';
        } else if (forma === 'U') {
            while (t.length < 3) t.push({ L: 1000 });
            t[1].giro = 'der'; t[1].angulo = 90;
            t[2].giro = 'der'; t[2].angulo = 90;
            for (let i = 3; i < t.length; i++) t[i].giro = 'recto';
        }
        cardsState[id].tramos = t;
        refreshBaranda(id, true);
    }
    function barandaAddTramo(id) {
        getTramos(id).push({ L: 1000, giro: 'recto', angulo: 90 });
        refreshBaranda(id, true);
    }
    function barandaRemoveTramo(id, idx) {
        const t = getTramos(id);
        if (t.length <= 1) { alert('Debe quedar al menos un tramo.'); return; }
        if (idx == null) idx = t.length - 1;
        t.splice(idx, 1);
        refreshBaranda(id, true);
    }
    function barandaUpdateTramo(id, idx, key, value) {
        const t = getTramos(id);
        if (!t[idx]) return;
        if (key === 'giro') t[idx].giro = value;
        else if (key === 'plataforma') t[idx].plataforma = !!value;
        else t[idx][key] = (value === '' ? '' : parseInt(value) || 0);
        refreshBaranda(id, false);
    }

    // ===== VISTA SUPERIOR (planta) de galandajes =====
    // Reglas validadas: el vidrio engancha del CONCRETO sin mosquitera, y del SHEETROCK con
    // mosquitera (la mosquitera ocupa el riel exterior, lado concreto). "Instalación por fuera"
    // es el espejo vertical (sheetrock afuera, concreto adentro). Sin sheetrock = solo concreto.
    function galandajePlan(state, uid) {
        const map = {
            gal1:     { kind: 'lateral', n: 1 },
            gal2_lat: { kind: 'lateral', n: 2 },
            gal3_3v:  { kind: 'lateral', n: 3 },
            gal4_4v:  { kind: 'lateral', n: 4 },
            gal2_cent:{ kind: 'central2', per: 1 },
            gal4_2v:  { kind: 'central', per: 2 },
            gal6_3v:  { kind: 'central', per: 3 }
        };
        const cfg = map[state.type];
        if (!cfg) return '';

        const install   = state.gal_install || 'dentro';
        const sheetrock  = (state.gal_sheetrock || 'si') === 'si';
        const mosq       = state.mosquitera === 'con';
        const pocketLeftDefault = state.orientacion !== 'D';

        const PT = 66, wbh = 3.2, gt = 3, mt = 2.4, dz = 2.0, vg = 2.4, X0 = 4, X1 = 96;
        const glassFill = `url(#glass-${uid})`;

        const leafG = (x, y, w) => `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${gt}" fill="${glassFill}" stroke="#0A3D62" stroke-width="1"/>`;
        const mosqG = (x, y, w) => {
            let s = `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${mt}" fill="none" stroke="#6f7984" stroke-width="0.7"/>`;
            for (let d = x + 1; d < x + w; d += 1.3) s += `<line x1="${d.toFixed(1)}" y1="${y.toFixed(1)}" x2="${(d + 0.9).toFixed(1)}" y2="${(y + mt).toFixed(1)}" stroke="#6f7984" stroke-width="0.35"/>`;
            return s;
        };
        const concreteG = (x, y, w) => {
            const cid = `gpc-${uid}-${Math.round(x)}-${Math.round(y)}`;
            let s = `<clipPath id="${cid}"><rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${wbh}"/></clipPath>`;
            s += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${wbh}" fill="#e7e9ec" stroke="#8b95a0" stroke-width="1"/>`;
            s += `<g clip-path="url(#${cid})">`;
            for (let d = -wbh; d <= w; d += 2.4) s += `<line x1="${(x + d).toFixed(1)}" y1="${(y + wbh).toFixed(1)}" x2="${(x + d + wbh).toFixed(1)}" y2="${y.toFixed(1)}" stroke="#aab2bb" stroke-width="0.5"/>`;
            s += `</g>`;
            return s;
        };
        const sheetG = (x, y, w) => `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${wbh}" fill="#f5f7f9" stroke="#aab2bb" stroke-width="0.9"/>`;
        const arrow = (cx, cy, w, dir) => {
            const half = w / 2 - 1.5;
            const ex = dir === 'L' ? cx - half : cx + half;
            const sx = dir === 'L' ? cx + half : cx - half;
            const hx = dir === 'L' ? ex + 1.6 : ex - 1.6;
            return `<g style="stroke:#111;stroke-width:1.1px;fill:none"><line x1="${sx.toFixed(1)}" y1="${cy.toFixed(1)}" x2="${ex.toFixed(1)}" y2="${cy.toFixed(1)}"/><polyline points="${hx.toFixed(1)},${(cy - 1.5).toFixed(1)} ${ex.toFixed(1)},${cy.toFixed(1)} ${hx.toFixed(1)},${(cy + 1.5).toFixed(1)}"/></g>`;
        };

        // Separador + título (común)
        const head = `<line x1="2" y1="61" x2="98" y2="61" stroke="#d3d8dd" stroke-width="0.7"/>` +
            `<text x="50" y="59.5" font-family="Arimo" font-size="3.4" font-weight="bold" fill="#9aa1a8" text-anchor="middle" stroke="none">VISTA SUPERIOR (planta)</text>`;
        const lbl = (x, y, t) => `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" font-family="Arimo" font-size="3" fill="#7a828a" text-anchor="middle" stroke="none">${t}</text>`;

        // ---- CENTRAL: hojas se encuentran en el centro y cascadean hacia los lados.
        // Mosquitera = solo 2 hojas centradas (riel exterior). Sin mosq el vidrio agarra el
        // concreto; con mosq las hojas exteriores agarran el sheetrock.
        if (cfg.kind === 'central' || cfg.kind === 'central2') {
            const ps = cfg.per, center = 50, Pw = 17;
            const pk = [[X0, Pw], [X1 - Pw, Pw]];
            const Lw = (center - (X0 + Pw)) / ps;   // ancho de hoja por lado

            const topIsConcrete = (install === 'dentro');
            // ¿el vidrio agarra la pared de arriba?  concreto->sin mosq, sheetrock->con mosq
            const glassGrabsTop = mosq ? (install === 'fuera') : (install === 'dentro');

            let cur = PT + wbh + vg, mosqY = null;
            if (mosq) { mosqY = cur; cur += mt + 1.4; }
            const glassTop = cur;
            const yGlass = k => glassGrabsTop ? (glassTop + (ps - 1 - k) * dz) : (glassTop + k * dz);
            const glassBottom = glassTop + (ps - 1) * dz + gt;
            const botWallY = glassBottom + vg;
            const planBottom = botWallY + wbh;

            let body = '';
            // Paredes: arriba = exterior, abajo = interior. Concreto siempre; sheetrock si aplica.
            if (topIsConcrete) { pk.forEach(p => body += concreteG(p[0], PT, p[1])); if (sheetrock) pk.forEach(p => body += sheetG(p[0], botWallY, p[1])); }
            else { if (sheetrock) pk.forEach(p => body += sheetG(p[0], PT, p[1])); pk.forEach(p => body += concreteG(p[0], botWallY, p[1])); }
            // Mosquitera: 2 hojas centradas
            if (mosq) { body += mosqG(center - Lw, mosqY, Lw) + mosqG(center, mosqY, Lw); }
            // Vidrio: k=0 hoja interior (centro), k creciente hacia los pockets
            for (let k = 0; k < ps; k++) {
                const y = yGlass(k);
                const lx = center - (k + 1) * Lw, rx = center + k * Lw;
                body += leafG(lx, y, Lw) + arrow(lx + Lw / 2, y + gt / 2, Lw, 'L');
                body += leafG(rx, y, Lw) + arrow(rx + Lw / 2, y + gt / 2, Lw, 'R');
            }
            // Etiquetas
            const topT = topIsConcrete ? 'concreto (ext)' : 'sheetrock (ext)';
            const botT = topIsConcrete ? (sheetrock ? 'sheetrock (int)' : '') : 'concreto (int)';
            let labels = lbl(pk[0][0] + Pw / 2, PT - 1, topT) + lbl(pk[1][0] + Pw / 2, PT - 1, topT);
            if (botT) labels += lbl(pk[0][0] + Pw / 2, planBottom + 3.4, botT) + lbl(pk[1][0] + Pw / 2, planBottom + 3.4, botT);
            if (mosq) labels += lbl(center, mosqY - 0.6, 'mosquitera (ext)');
            return head + body + labels;
        }

        // ---- LATERAL: hojas cascadean hacia un único pocket (lado de la orientación).
        const leaves = [], pockets = [];
        let maxd = 0;
        (function lateralRun(xa, xb, count, pocketLeft) {
            const Lw = (xb - xa) / (count + 1);
            pockets.push(pocketLeft ? [xa, Lw] : [xb - Lw, Lw]);
            for (let i = 0; i < count; i++) {
                const x = pocketLeft ? (xa + Lw + i * Lw) : (xa + i * Lw);
                const d = pocketLeft ? i : (count - 1 - i);
                maxd = Math.max(maxd, d);
                leaves.push({ x, w: Lw, d, dir: pocketLeft ? 'L' : 'R' });
            }
        })(X0, X1, cfg.n, pocketLeftDefault);

        const bandTop = PT + wbh + vg;
        const mosqOff = mosq ? (mt + 1) : 0;
        const glassY = d => bandTop + mosqOff + d * dz;
        const mosqYL = d => bandTop + d * dz;
        const bottomWallY = bandTop + mosqOff + maxd * dz + gt + vg;
        const planBottom = bottomWallY + wbh;

        let body = '';
        pockets.forEach(p => { body += concreteG(p[0], PT, p[1]); });
        if (sheetrock) pockets.forEach(p => { body += sheetG(p[0], bottomWallY, p[1]); });
        leaves.forEach(L => {
            if (mosq) body += mosqG(L.x, mosqYL(L.d), L.w);
            const gy = glassY(L.d);
            body += leafG(L.x, gy, L.w) + arrow(L.x + L.w / 2, gy + gt / 2, L.w, L.dir);
        });

        let plan = body;
        if (install === 'fuera') plan = `<g transform="matrix(1 0 0 -1 0 ${(PT + planBottom).toFixed(1)})">${body}</g>`;

        const concreteTopFinal = install !== 'fuera';
        const topLabel = concreteTopFinal ? 'concreto (ext)' : 'sheetrock (ext)';
        const botLabel = concreteTopFinal ? (sheetrock ? 'sheetrock (int)' : '') : 'concreto (int)';
        const lblX = pockets[0][0] + pockets[0][1] / 2;
        let labels = lbl(lblX, PT - 1, topLabel);
        if (botLabel) labels += lbl(lblX, planBottom + 3.4, botLabel);
        if (mosq) labels += lbl(50, install === 'fuera' ? (PT + 2.6) : (planBottom - 1), 'mosquitera (lado ext)');

        return head + plan + labels;
    }

    // Configuración de correderas: modo de planta y cantidad total de hojas por tipo.
    // "pair" = cor2 (1 riel c/hoja, lado interior elegible). "cent" = hojas centrales al riel
    // interior y laterales al exterior, agrupadas en pares por distancia al centro (n/2 rieles).
    // "stair" = una hoja por riel ("N vías"), en escalera, cascadeando hacia `orientacion`
    // (cor3 y las variantes "Lateral"). Reglas confirmadas por el usuario para las 6.
    const CORREDERA_CFG = {
        cor2: { mode: 'pair', n: 2 },
        cor3: { mode: 'stair', n: 3 },
        cor4_cent: { mode: 'cent', n: 4 },
        cor4_lat: { mode: 'stair', n: 4 },
        cor6_cent: { mode: 'cent', n: 6 },
        cor6_lat: { mode: 'stair', n: 6 },
    };
    // Cantidad de rieles ("vías") de cada tipo, para mostrar en la tarjeta: "cent" usa n/2
    // rieles (hojas en pares), "pair"/"stair" usan un riel por hoja. Con mosquitera se suma 1
    // vía (el riel extra donde va la mosquitera), salvo cor6_lat que no admite mosquitera.
    function correderaVias(type, mosq) {
        const cfg = CORREDERA_CFG[type];
        if (!cfg) return null;
        const base = cfg.mode === 'cent' ? cfg.n / 2 : cfg.n;
        return base + (mosq && type !== 'cor6_lat' ? 1 : 0);
    }

    // Cantidad de rieles ("vías") de cada galandaje: para los tipos "central" es la cantidad
    // de hojas cascadeando por lado (`per` en galandajePlan, ya está en el propio nombre del
    // tipo: gal4_2v, gal6_3v); para "lateral" es la cantidad total de hojas (cascadean todas
    // al mismo pocket, cada una con su propio riel/profundidad).
    const GALANDAJE_VIAS = { gal1: 1, gal2_lat: 2, gal3_3v: 3, gal4_4v: 4, gal2_cent: 1, gal4_2v: 2, gal6_3v: 3 };
    function galandajeVias(type) { return GALANDAJE_VIAS[type] || null; }

    // Vista de planta de correderas. A diferencia del galandaje (que pliega hojas contra un
    // bolsillo en la pared), la corredera va en un marco perimetral con varios rieles
    // paralelos ("vías"). La mosquitera (si aplica) siempre va en un riel adicional, el más
    // exterior de todos, y sus hojas replican la posición de las hojas que están en el riel
    // exterior (no es una sola pieza continua).
    function correderaPlan(state, uid) {
        const cfg = CORREDERA_CFG[state.type];
        if (!cfg) return '';

        // cor6_lat (6 vías) no admite mosquitera: ya usa las 6 vías disponibles.
        const mosq = state.mosquitera === 'con' && state.type !== 'cor6_lat';
        const X0 = 4, X1 = 96, gt = 3, PT = 66, OVERLAP = 3;
        const glassFill = `url(#glass-${uid})`;

        const leafG = (x, y, w) => `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${gt}" fill="${glassFill}" stroke="#0A3D62" stroke-width="1"/>`;
        const mosqG = (x, y, w) => {
            const mt = 2.4;
            let s = `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${mt}" fill="none" stroke="#6f7984" stroke-width="0.7"/>`;
            for (let d = x + 1; d < x + w; d += 1.3) s += `<line x1="${d.toFixed(1)}" y1="${y.toFixed(1)}" x2="${(d + 0.9).toFixed(1)}" y2="${(y + mt).toFixed(1)}" stroke="#6f7984" stroke-width="0.35"/>`;
            return s;
        };
        const arrow = (cx, cy, w, dir) => {
            const half = Math.min(w, 20) / 2 - 1.5;
            const ex = dir === 'L' ? cx - half : cx + half;
            const sx = dir === 'L' ? cx + half : cx - half;
            const hx = dir === 'L' ? ex + 1.6 : ex - 1.6;
            return `<g style="stroke:#111;stroke-width:1.1px;fill:none"><line x1="${sx.toFixed(1)}" y1="${cy.toFixed(1)}" x2="${ex.toFixed(1)}" y2="${cy.toFixed(1)}"/><polyline points="${hx.toFixed(1)},${(cy - 1.5).toFixed(1)} ${ex.toFixed(1)},${cy.toFixed(1)} ${hx.toFixed(1)},${(cy + 1.5).toFixed(1)}"/></g>`;
        };
        const head = `<line x1="2" y1="61" x2="98" y2="61" stroke="#d3d8dd" stroke-width="0.7"/>` +
            `<text x="50" y="59.5" font-family="Arimo" font-size="3.4" font-weight="bold" fill="#9aa1a8" text-anchor="middle" stroke="none">VISTA SUPERIOR (planta)</text>`;
        const lbl = (x, y, t, anchor) => `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" font-family="Arimo" font-size="3" fill="#7a828a" text-anchor="${anchor || 'middle'}" stroke="none">${t}</text>`;

        // n segmentos que cubren X0..X1 en partes iguales, superpuestos OVERLAP unidades con
        // su vecino (como se ven las hojas encimadas al cerrar en el boceto del usuario).
        const segs = n => {
            const segW = (X1 - X0) / n, out = [];
            for (let i = 0; i < n; i++) {
                let sx = X0 + i * segW, ex = X0 + (i + 1) * segW;
                if (i > 0) sx -= OVERLAP;
                if (i < n - 1) ex += OVERLAP;
                out.push({ x: sx, w: ex - sx });
            }
            return out;
        };

        let panels = [], mainRails = [], extKey, intKey;
        if (cfg.mode === 'pair') {
            // cor2: una hoja por riel; cor_interior elige qué lado (I/D) va al riel interior.
            const s = segs(2);
            const leftIsInt = (state.cor_interior || 'I') === 'I';
            mainRails = ['ext', 'int'];
            panels = [
                { x: s[0].x, w: s[0].w, rail: leftIsInt ? 'int' : 'ext', dir: 'R' },
                { x: s[1].x, w: s[1].w, rail: leftIsInt ? 'ext' : 'int', dir: 'L' },
            ];
            extKey = 'ext'; intKey = 'int';
        } else if (cfg.mode === 'cent') {
            // cor4_cent / cor6_cent: hojas agrupadas en pares por distancia al centro; el par
            // más próximo al centro va al riel interior, el más alejado al exterior (n/2 rieles).
            const n = cfg.n, s = segs(n), railsCount = n / 2;
            // pairRail[0] = riel interior (par más próximo al centro) ... pairRail[último] = exterior
            const pairRail = [];
            for (let j = 0; j < railsCount; j++) pairRail.push(j === 0 ? 'int' : (j === railsCount - 1 ? 'ext' : 'med' + j));
            mainRails = [...pairRail].reverse(); // de exterior (arriba) a interior (abajo)
            for (let i = 0; i < n; i++) {
                const half = i < n / 2 ? 'L' : 'R';
                const distFromCenter = half === 'L' ? (n / 2 - 1 - i) : (i - n / 2);
                panels.push({ x: s[i].x, w: s[i].w, rail: pairRail[distFromCenter], dir: half === 'L' ? 'R' : 'L' });
            }
            extKey = 'ext'; intKey = 'int';
        } else if (cfg.mode === 'stair') {
